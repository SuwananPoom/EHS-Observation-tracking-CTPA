  }).length;
  var mj = rows.filter(function (o) {
    return o.risk === "MAJOR" && o.status !== "CLOSED";
  }).length;
  var cl = rows.filter(function (o) {
    return o.status === "CLOSED";
  }).length;
  var clR = rows.length ? Math.round(cl / rows.length * 100) : 0;
  var tr = rows.map(function (o, i) {
    var rk = RISK[o.risk] || {
      label: o.risk,
      color: "#999"
    };
    var st = STATUS[o.status] || {
      label: o.status,
      color: "#999"
    };
    var ot = OBS_TYPE[o.obsType] || {
      label: ""
    };
    var ps = pStat(o);
    var bg = i % 2 === 0 ? "#fff" : "#F8FAFC";
    return "<tr style=\"background:".concat(bg, "\">\n      <td>").concat(o.id, "</td><td>").concat(o.date, "</td><td>").concat(o.zone, "</td>\n      <td>").concat(o.company || "-", "</td>\n      <td>").concat(o.cat.replace(" (HRA)", ""), "</td>\n      <td>").concat(ot.label, "</td>\n      <td style=\"max-width:180px;font-size:10px\">").concat(o.desc, "</td>\n      <td style=\"color:").concat(rk.color, ";font-weight:700\">").concat(rk.label, "</td>\n      <td style=\"color:").concat(st.color, ";font-weight:700\">").concat(st.label.replace(/_/g, " "), "</td>\n      <td>").concat(o.due, "</td><td>").concat(o.closed || "", "</td>\n      <td style=\"color:").concat(ps.c, ";font-weight:700\">").concat(ps.l, "</td>\n    </tr>");
  }).join("");
  var html = "<!DOCTYPE html><html><head><meta charset=\"UTF-8\"/>\n<title>EHS Register</title>\n<style>\n*{box-sizing:border-box;margin:0;padding:0}\nbody{font-family:Arial,sans-serif;font-size:11px;padding:20px;color:#0F172A}\n.h{display:flex;justify-content:space-between;align-items:center;padding-bottom:12px;border-bottom:3px solid #10B981;margin-bottom:12px}\n.k{display:flex;gap:8px;margin-bottom:12px}\n.kb{flex:1;padding:9px;border-radius:7px;text-align:center;border:1px solid #E2E8F0}\n.kn{font-size:20px;font-weight:800;line-height:1}.kl{font-size:9px;margin-top:3px;color:#64748B}\ntable{width:100%;border-collapse:collapse}\nth{background:#10B981;color:#fff;padding:6px 8px;text-align:left;font-size:10px}\ntd{padding:5px 8px;border-bottom:1px solid #E2E8F0;vertical-align:top;font-size:10px}\n.f{margin-top:10px;border-top:1px solid #E2E8F0;padding-top:8px;font-size:9px;color:#94A3B8;display:flex;justify-content:space-between}\n@media print{button{display:none!important}@page{size:A3 landscape;margin:10mm}}\n</style></head><body>\n<div class=\"h\">\n<div><strong style=\"font-size:18px\">EHS Safety Observation Register</strong><br/>\n<span style=\"color:#64748B;font-size:10px\">".concat(PROJECT, " &nbsp;|&nbsp; Printed: ").concat(now, "</span></div>\n<div style=\"text-align:right;font-size:10px;color:#475569\">").concat(rows.length, " records</div>\n</div>\n<div class=\"k\">\n<div class=\"kb\" style=\"background:#FEE2E2\"><div class=\"kn\" style=\"color:#EF4444\">").concat(sr, "</div><div class=\"kl\">Serious Open</div></div>\n<div class=\"kb\" style=\"background:#FEF3C7\"><div class=\"kn\" style=\"color:#F59E0B\">").concat(mj, "</div><div class=\"kl\">Major Open</div></div>\n<div class=\"kb\" style=\"background:#D1FAE5\"><div class=\"kn\" style=\"color:#10B981\">").concat(cl, "</div><div class=\"kl\">Closed</div></div>\n<div class=\"kb\" style=\"background:#D1FAE5\"><div class=\"kn\" style=\"color:#10B981\">").concat(clR, "%</div><div class=\"kl\">Closure Rate</div></div>\n<div class=\"kb\"><div class=\"kn\">").concat(rows.length, "</div><div class=\"kl\">Total</div></div>\n</div>\n<div style=\"text-align:right;margin-bottom:8px\">\n<button onclick=\"window.print()\" style=\"background:#10B981;color:#fff;border:none;padding:6px 16px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;margin-right:6px\">Print / PDF</button>\n<button onclick=\"window.close()\" style=\"background:#fff;color:#475569;border:1px solid #E2E8F0;padding:6px 12px;border-radius:6px;font-size:11px;cursor:pointer\">Close</button>\n</div>\n<table><thead><tr>\n<th>ID</th><th>Date</th><th>Zone</th><th>Responsible Company</th><th>Category</th><th>OBS Type</th><th>Description</th><th>Risk</th><th>Status</th><th>Due</th><th>Closed</th><th>Photo</th>\n</tr></thead><tbody>").concat(tr, "</tbody></table>\n<div class=\"f\"><span>").concat(PROJECT, " \xB7 EHS Register</span><span>").concat(now, " \xB7 ").concat(rows.length, " records</span></div>\n</body></html>");
  var w = window.open("", "_blank", "width=1200,height=800");
  w.document.open();
  w.document.write(html);
  w.document.close();
}

/* ── WEEKLY REPORT GENERATOR ──────────────────── */
var RPT_GREEN  = "00CC79";
var RPT_DARK   = "0A3D2B";
var RPT_RED    = "EF4444";
var RPT_AMBER  = "F59E0B";
var RPT_TEXT   = "0F172A";
var RPT_GRAY   = "64748B";
var RPT_LIGHT  = "F8FAFC";
var RPT_BORDER = "E2E8F0";

function rptNow() {
  return new Date().toLocaleDateString("en-GB", {day:"2-digit", month:"short", year:"numeric"});
}
function rptFilterObs(rows, dateFrom, dateTo) {
  return rows.filter(function(o) {
    if (!o.date) return false;
    if (dateFrom && o.date < dateFrom) return false;
    if (dateTo   && o.date > dateTo)   return false;
    return true;
  });
}

/* ── PowerPoint (.pptx) ── */
function generateWeeklyReportPPT(rows, dateFrom, dateTo) {
  if (!window.PptxGenJS) { alert("PptxGenJS library not loaded. Check your internet connection."); return; }
  var pptx  = new PptxGenJS();
  pptx.layout  = "LAYOUT_WIDE";
  pptx.title   = "EHS Weekly Safety Report";
  pptx.subject = PROJECT;

  var now         = rptNow();
  var periodLabel = (dateFrom || "—") + "  to  " + (dateTo || "—");
  var G = RPT_GREEN, DK = RPT_DARK, RED = RPT_RED, AMB = RPT_AMBER;

  /* helper: table header cell */
  function hCell(text, bg) {
    return { text: text, options: { bold: true, color: "FFFFFF", fill: { color: bg || DK }, fontSize: 9, fontFace: "Arial" } };
  }

  /* ── SLIDE 1 : COVER ── */
  var s1 = pptx.addSlide();
  s1.background = { color: DK };
  s1.addShape(pptx.ShapeType.rect, { x:0, y:0, w:0.5, h:5.625, fill:{ color:G } });
  s1.addShape(pptx.ShapeType.rect, { x:0.5, y:0,       w:9.5, h:0.06, fill:{ color:G } });
  s1.addShape(pptx.ShapeType.rect, { x:0.5, y:5.565,   w:9.5, h:0.06, fill:{ color:G } });
  s1.addText("EHS SAFETY", { x:1.1, y:0.85, w:8, h:0.9,  fontSize:42, bold:true, color:G,         fontFace:"Arial" });
  s1.addText("OBSERVATION REPORT", { x:1.1, y:1.7,  w:8, h:0.7,  fontSize:28, bold:true, color:"FFFFFF",  fontFace:"Arial" });
  s1.addText(PROJECT, { x:1.1, y:2.55, w:8, h:0.45, fontSize:14,            color:"CCCCCC",  fontFace:"Arial" });
  s1.addShape(pptx.ShapeType.rect, { x:1.1, y:3.1, w:5, h:0.04, fill:{ color:"334155" } });
  s1.addText("REPORTING PERIOD",  { x:1.1, y:3.25, w:4, h:0.3,  fontSize:9, bold:true, color:G,    fontFace:"Arial" });
  s1.addText(periodLabel,          { x:1.1, y:3.6,  w:7, h:0.45, fontSize:15, bold:true, color:"FFFFFF", fontFace:"Arial" });
  s1.addText("Generated: " + now,  { x:1.1, y:4.15, w:5, h:0.32, fontSize:10,            color:"94A3B8", fontFace:"Arial" });
  s1.addText("CONFIDENTIAL  ·  EHS DEPARTMENT", { x:1.1, y:5.15, w:8, h:0.25, fontSize:8, color:"334155", fontFace:"Arial" });

  /* ── SLIDE 2 : EXECUTIVE SUMMARY ── */
  var s2 = pptx.addSlide();
  s2.background = { color:"FFFFFF" };
  s2.addShape(pptx.ShapeType.rect, { x:0, y:0,    w:10, h:0.75, fill:{ color:DK } });
  s2.addShape(pptx.ShapeType.rect, { x:0, y:0.75, w:10, h:0.07, fill:{ color:G  } });
  s2.addText("EXECUTIVE SUMMARY", { x:0.3, y:0.1, w:8, h:0.55, fontSize:20, bold:true, color:"FFFFFF", fontFace:"Arial" });
  s2.addText(periodLabel,           { x:0.3, y:0.78, w:9, h:0.25, fontSize:9,            color:G,         fontFace:"Arial" });

  var total    = rows.length;
  var openC    = rows.filter(function(o){ return o.status === "OPEN"; }).length;
  var inprog   = rows.filter(function(o){ return o.status === "IN_PROGRESS"; }).length;
  var closed   = rows.filter(function(o){ return o.status === "CLOSED"; }).length;
  var overdue  = rows.filter(function(o){ return isOD(o); }).length;
  var serious  = rows.filter(function(o){ return o.risk === "SERIOUS" && o.status !== "CLOSED"; }).length;
  var goodObs  = rows.filter(function(o){ return o.obsType === "GOOD_OBS"; }).length;
  var unsafeA  = rows.filter(function(o){ return o.obsType === "UNSAFE_ACT"; }).length;
  var unsafeC  = rows.filter(function(o){ return o.obsType === "UNSAFE_CON"; }).length;

  var kpis = [
    { l:"Total OBS",    v:total,   c:RPT_TEXT, bg:RPT_LIGHT },
    { l:"Open",         v:openC,   c:openC  > 0 ? RED : RPT_TEXT, bg:openC  > 0 ? "FEE2E2" : RPT_LIGHT },
    { l:"In Progress",  v:inprog,  c:AMB,                          bg:"FEF3C7" },
    { l:"Closed",       v:closed,  c:G,                            bg:"D1FAE5" },
    { l:"Overdue ⚠",   v:overdue, c:overdue > 0 ? RED : RPT_TEXT, bg:overdue > 0 ? "FEE2E2" : RPT_LIGHT },
    { l:"Serious Open", v:serious, c:serious > 0 ? RED : RPT_TEXT, bg:serious > 0 ? "FEE2E2" : RPT_LIGHT }
  ];
  kpis.forEach(function(k, i) {
    var col = i % 3, row2 = Math.floor(i / 3);
    var kx = 0.22 + col * 3.22, ky = 1.1 + row2 * 2.05;
    s2.addShape(pptx.ShapeType.rect, { x:kx, y:ky, w:3.06, h:1.7, fill:{ color:k.bg }, line:{ color:RPT_BORDER, pt:1 } });
    s2.addText(String(k.v), { x:kx, y:ky+0.2,  w:3.06, h:0.9, fontSize:40, bold:true, color:k.c, align:"center", fontFace:"Arial" });
    s2.addText(k.l,          { x:kx, y:ky+1.2,  w:3.06, h:0.35, fontSize:10,            color:RPT_GRAY, align:"center", fontFace:"Arial" });
  });
  s2.addText(
    "Good Obs: " + goodObs + "   |   Unsafe Act: " + unsafeA + "   |   Unsafe Condition: " + unsafeC,
    { x:0.2, y:5.25, w:9.6, h:0.28, fontSize:10, color:RPT_GRAY, align:"center", fontFace:"Arial" }
  );

  /* ── SLIDES 3+ : PER OBSERVATION ── */
  rows.forEach(function(o) {
    var sl = pptx.addSlide();
    sl.background = { color:"FFFFFF" };
    var rk      = RISK[o.risk]      || { label: o.risk      || "" };
    var st      = STATUS[o.status]  || { label: o.status    || "" };
    var ot      = OBS_TYPE[o.obsType] || { label: o.obsType || "" };
    var rkColor = o.risk === "SERIOUS" ? RED : o.risk === "MAJOR" ? AMB : G;
    var stLbl   = (st.label || o.status || "").replace(/_/g, " ");

    /* header bar */
    sl.addShape(pptx.ShapeType.rect, { x:0, y:0,    w:10, h:0.65, fill:{ color:DK } });
    sl.addShape(pptx.ShapeType.rect, { x:0, y:0.65, w:10, h:0.05, fill:{ color:G  } });
    sl.addText(o.id, { x:0.25, y:0.05, w:1.4, h:0.55, fontSize:14, bold:true, color:G,        fontFace:"Arial" });
    sl.addText(" · " + ot.label, { x:1.6,  y:0.05, w:5.2, h:0.55, fontSize:11,           color:"CCCCCC",   fontFace:"Arial" });
    sl.addText(o.date + (o.week ? "  ·  " + o.week : ""), { x:6.9, y:0.05, w:2.2, h:0.55, fontSize:10, color:"94A3B8", align:"right", fontFace:"Arial" });
    /* risk badge */
    sl.addShape(pptx.ShapeType.rect, { x:9.2, y:0.1, w:0.72, h:0.44, fill:{ color:rkColor }, rounding:true });
    sl.addText((rk.label || "").slice(0,3).toUpperCase(), { x:9.2, y:0.1, w:0.72, h:0.44, fontSize:8, bold:true, color:"FFFFFF", align:"center", valign:"middle", fontFace:"Arial" });

    /* detail fields - left column */
    var fields = [
      ["Zone / Area",      o.zone    || "—"],
      ["Contractor",       o.company || "—"],
      ["Risk Level",       rk.label  || o.risk],
      ["Status",           stLbl],
      ["Due Date",         o.due     || "—"],
      ["Raised By",        o.by      || "—"],
      ["Closed Date",      o.closed  || "—"],
      ["Closed By",        o.status === "CLOSED" ? (o.closedBy || "—") : "—"]
    ];
    var detY = 0.82;
    fields.forEach(function(f, fi) {
      var fy = detY + fi * 0.54;
      if (fi % 2 === 0) sl.addShape(pptx.ShapeType.rect, { x:0.2, y:fy, w:5.55, h:0.51, fill:{ color:RPT_LIGHT } });
      sl.addText(f[0] + ":", { x:0.3,  y:fy+0.09, w:1.65, h:0.34, fontSize:8, bold:true, color:RPT_GRAY, fontFace:"Arial" });
      sl.addText(f[1],        { x:2.0,  y:fy+0.09, w:3.6,  h:0.34, fontSize:9,            color:RPT_TEXT, fontFace:"Arial" });
    });

    /* description & corrective action boxes */
    var descY = detY + fields.length * 0.54 + 0.04;
    sl.addShape(pptx.ShapeType.rect, { x:0.2, y:descY,      w:5.55, h:0.85, fill:{ color:"EFF6FF" }, line:{ color:"BFDBFE", pt:1 } });
    sl.addText("DESCRIPTION",        { x:0.3, y:descY+0.06, w:5.3,  h:0.22, fontSize:7, bold:true, color:"1E3A8A", fontFace:"Arial" });
    sl.addText(o.desc || "—",        { x:0.3, y:descY+0.26, w:5.3,  h:0.55, fontSize:8.5, color:RPT_TEXT, wrap:true, fontFace:"Arial" });

    /* photos - right column */
    var photoX = 5.9;
    sl.addShape(pptx.ShapeType.rect, { x:photoX, y:0.72, w:3.9, h:4.8, fill:{ color:RPT_LIGHT }, line:{ color:RPT_BORDER, pt:1 } });
    var bef = o.pb && o.pb.length ? o.pb[0] : null;
    var aft = o.pa && o.pa.length ? o.pa[0] : null;
    var hasPhotos = bef || aft;

    if (hasPhotos) {
      if (bef) {
        sl.addShape(pptx.ShapeType.rect, { x:photoX+0.1, y:0.82, w:1.82, h:0.29, fill:{ color:"1E3A8A" } });
        sl.addText("BEFORE", { x:photoX+0.1, y:0.82, w:1.82, h:0.29, fontSize:8, bold:true, color:"FFFFFF", align:"center", fontFace:"Arial" });
        try { sl.addImage({ data:bef, x:photoX+0.1, y:1.12, w:1.82, h:2.15 }); } catch(e) {}
      } else {
        sl.addShape(pptx.ShapeType.rect, { x:photoX+0.1, y:0.82, w:1.82, h:2.6, fill:{ color:"F1F5F9" } });
        sl.addText("No Before Photo", { x:photoX+0.1, y:1.7, w:1.82, h:0.5, fontSize:8, color:"CBD5E1", align:"center", fontFace:"Arial" });
      }
      if (aft) {
        var ax = bef ? photoX+2.05 : photoX+0.1;
        sl.addShape(pptx.ShapeType.rect, { x:ax, y:0.82, w:1.82, h:0.29, fill:{ color:G } });
        sl.addText("AFTER", { x:ax, y:0.82, w:1.82, h:0.29, fontSize:8, bold:true, color:"FFFFFF", align:"center", fontFace:"Arial" });
        try { sl.addImage({ data:aft, x:ax, y:1.12, w:1.82, h:2.15 }); } catch(e) {}
      } else {
        var ax2 = bef ? photoX+2.05 : photoX+0.1;
        sl.addShape(pptx.ShapeType.rect, { x:ax2, y:0.82, w:1.82, h:2.6, fill:{ color:"F1F5F9" } });
        sl.addText("No After Photo", { x:ax2, y:1.7, w:1.82, h:0.5, fontSize:8, color:"CBD5E1", align:"center", fontFace:"Arial" });
      }
      sl.addText("CORRECTIVE ACTION", { x:photoX+0.1, y:3.45, w:3.7, h:0.28, fontSize:7, bold:true, color:RPT_GRAY, fontFace:"Arial" });
      sl.addText(o.rect || "—",        { x:photoX+0.1, y:3.74, w:3.7, h:1.68, fontSize:8, color:RPT_TEXT, wrap:true, fontFace:"Arial" });
    } else {
      sl.addText("No Photos",          { x:photoX, y:1.85, w:3.9, h:0.5, fontSize:11, color:"CBD5E1", align:"center", fontFace:"Arial" });
      sl.addText("CORRECTIVE ACTION",  { x:photoX+0.15, y:2.55, w:3.6, h:0.28, fontSize:7, bold:true, color:RPT_GRAY, fontFace:"Arial" });
      sl.addText(o.rect || "—",        { x:photoX+0.15, y:2.84, w:3.6, h:2.55, fontSize:9, color:RPT_TEXT, wrap:true, fontFace:"Arial" });
    }

    /* footer */
    sl.addShape(pptx.ShapeType.rect, { x:0, y:5.5, w:10, h:0.125, fill:{ color:RPT_LIGHT } });
    sl.addText(PROJECT + "  ·  EHS Weekly Report  ·  " + now, { x:0.2, y:5.51, w:9.6, h:0.11, fontSize:7, color:"94A3B8", fontFace:"Arial" });
  });

  /* ── HIGH RISK SUMMARY ── */
  var hrObs = rows.filter(function(o){ return o.risk === "SERIOUS"; });
  if (hrObs.length > 0) {
    var hrs = pptx.addSlide();
    hrs.background = { color:"FFFFFF" };
    hrs.addShape(pptx.ShapeType.rect, { x:0, y:0,    w:10, h:0.75, fill:{ color:"7F1D1D" } });
    hrs.addShape(pptx.ShapeType.rect, { x:0, y:0.75, w:10, h:0.06, fill:{ color:RED } });
    hrs.addText("⚠  HIGH RISK FINDINGS — SERIOUS", { x:0.3, y:0.1, w:9.4, h:0.55, fontSize:18, bold:true, color:"FFFFFF", fontFace:"Arial" });
    var hrData = [
      [hCell("ID","7F1D1D"), hCell("Date","7F1D1D"), hCell("Zone / Area","7F1D1D"), hCell("Contractor","7F1D1D"), hCell("Description","7F1D1D"), hCell("Status","7F1D1D")]
    ].concat(hrObs.map(function(o) {
      var stC = o.status === "CLOSED" ? G : RED;
      var stL = (STATUS[o.status]||{label:o.status}).label.replace(/_/g," ");
      var desc = (o.desc||"").length > 85 ? (o.desc||"").slice(0,85)+"…" : (o.desc||"");
      return [
        { text:o.id,             options:{bold:true, fontSize:9, fontFace:"Arial"} },
        { text:o.date,           options:{fontSize:9, fontFace:"Arial"} },
        { text:o.zone||"—",     options:{fontSize:9, fontFace:"Arial"} },
        { text:o.company||"—",  options:{fontSize:9, fontFace:"Arial"} },
        { text:desc,             options:{fontSize:8, fontFace:"Arial"} },
        { text:stL,              options:{fontSize:9, bold:true, color:stC, fontFace:"Arial"} }
      ];
    }));
    hrs.addTable(hrData, {
      x:0.25, y:0.88, w:9.5,
      colW:[1.0, 0.95, 1.85, 1.35, 3.3, 1.05],
      border:{ type:"solid", color:RPT_BORDER, pt:0.5 },
      autoPage:true, autoPageRepeatHeader:true
    });
  }

  /* ── CONTRACTOR PERFORMANCE ── */
  var contMap = {};
  rows.forEach(function(o) {
    var co = o.company || "Unknown";
    if (!contMap[co]) contMap[co] = { total:0, open:0, closed:0, overdue:0 };
    contMap[co].total++;
    if (o.status === "CLOSED") contMap[co].closed++; else contMap[co].open++;
    if (isOD(o)) contMap[co].overdue++;
  });
  var ctKeys = Object.keys(contMap).sort();
  if (ctKeys.length > 0) {
    var cs = pptx.addSlide();
    cs.background = { color:"FFFFFF" };
    cs.addShape(pptx.ShapeType.rect, { x:0, y:0,    w:10, h:0.75, fill:{ color:DK } });
    cs.addShape(pptx.ShapeType.rect, { x:0, y:0.75, w:10, h:0.07, fill:{ color:G  } });
    cs.addText("CONTRACTOR PERFORMANCE SUMMARY", { x:0.3, y:0.1, w:9.4, h:0.55, fontSize:18, bold:true, color:"FFFFFF", fontFace:"Arial" });
    var ctData = [
      [hCell("Contractor"), hCell("Total"), hCell("Open"), hCell("Closed"), hCell("Overdue"), hCell("Closure %")]
    ].concat(ctKeys.map(function(co, idx) {
      var d   = contMap[co];
      var pct = d.total > 0 ? Math.round(d.closed / d.total * 100) : 0;
      var bg  = idx % 2 === 0 ? "FFFFFF" : RPT_LIGHT;
      var pctC = pct >= 80 ? G : pct >= 50 ? AMB : RED;
      return [
        { text:co,          options:{ bold:true, fill:{ color:bg }, fontSize:10, fontFace:"Arial" } },
        { text:String(d.total),   options:{ align:"center", fill:{ color:bg }, fontSize:10, fontFace:"Arial" } },
        { text:String(d.open),    options:{ align:"center", fill:{ color:bg }, color:d.open   > 0 ? RED : RPT_TEXT, bold:d.open   > 0, fontSize:10, fontFace:"Arial" } },
        { text:String(d.closed),  options:{ align:"center", fill:{ color:bg }, color:G,        bold:true,           fontSize:10, fontFace:"Arial" } },
        { text:String(d.overdue), options:{ align:"center", fill:{ color:bg }, color:d.overdue> 0 ? RED : RPT_TEXT, bold:d.overdue> 0, fontSize:10, fontFace:"Arial" } },
        { text:pct + "%",         options:{ align:"center", fill:{ color:bg }, color:pctC,     bold:true,           fontSize:10, fontFace:"Arial" } }
      ];
    }));
    cs.addTable(ctData, {
      x:1.5, y:0.88, w:7.0,
      colW:[2.2, 0.9, 0.9, 0.9, 0.9, 1.2],
      rowH:0.55,
      border:{ type:"solid", color:RPT_BORDER, pt:0.5 },
      autoPage:true
    });
  }

  /* ── CLOSING SLIDE ── */
  var cls = pptx.addSlide();
  cls.background = { color:DK };
  cls.addShape(pptx.ShapeType.rect, { x:0, y:0, w:0.5, h:5.625, fill:{ color:G } });
  cls.addText("Thank You", { x:1.1, y:1.75, w:8, h:0.85, fontSize:36, bold:true, color:"FFFFFF", fontFace:"Arial" });
  cls.addText("Report prepared by EHS Department  ·  " + PROJECT, { x:1.1, y:2.7, w:8, h:0.4, fontSize:13, color:"AAAAAA", fontFace:"Arial" });
  cls.addText(now, { x:1.1, y:3.2, w:5, h:0.35, fontSize:11, color:"94A3B8", fontFace:"Arial" });

  var fname = "EHS_Weekly_Report_" + (dateFrom||"").replace(/-/g,"") + "_" + (dateTo||"").replace(/-/g,"") + ".pptx";
  pptx.writeFile({ fileName: fname });
}

/* ── PDF (.pdf) ── */
function generateWeeklyReportPDF(rows, dateFrom, dateTo) {
  if (typeof window.jspdf === "undefined") { alert("jsPDF library not loaded. Check your internet connection."); return; }
  var jsPDF = window.jspdf.jsPDF;
  var doc = new jsPDF({ orientation:"landscape", unit:"mm", format:"a4" });
  var W = 297, H = 210;
  var now         = rptNow();
  var periodLabel = (dateFrom || "—") + "  to  " + (dateTo || "—");

  function hx(hex) {
    var h = (hex.charAt(0) === "#") ? hex.slice(1) : hex;
    return [ parseInt(h.slice(0,2),16), parseInt(h.slice(2,4),16), parseInt(h.slice(4,6),16) ];
  }
  function fill(hex)  { var c=hx(hex); doc.setFillColor(c[0],c[1],c[2]); }
  function draw(hex)  { var c=hx(hex); doc.setDrawColor(c[0],c[1],c[2]); }
  function color(hex) { var c=hx(hex); doc.setTextColor(c[0],c[1],c[2]); }
  function frect(x,y,w,h,hex) { fill(hex); doc.rect(x,y,w,h,"F"); }
  function txt(s,x,y,opts) {
    opts = opts || {};
    color(opts.color || "#0F172A");
    doc.setFontSize(opts.size || 10);
    doc.setFont("helvetica", opts.bold ? "bold" : "normal");
    var args = [String(s||""), x, y, { align: opts.align||"left" }];
    if (opts.maxW) args[3].maxWidth = opts.maxW;
    doc.text.apply(doc, args);
  }

  /* ── PAGE 1: COVER ── */
  frect(0,0,W,H,"#0A3D2B");
  frect(0,0,6,H,"#00CC79");
  frect(6,0,W-6,2,"#00CC79");
  frect(6,H-2,W-6,2,"#00CC79");
  txt("EHS SAFETY",                               18, 52, { size:38, bold:true, color:"#00CC79" });
  txt("OBSERVATION REPORT",                        18, 68, { size:26, bold:true, color:"#FFFFFF" });
  txt(PROJECT,                                     18, 84, { size:13,             color:"#AAAAAA" });
  frect(18,92,80,0.5,"#334155");
  txt("REPORTING PERIOD",                          18,103, { size:8, bold:true, color:"#00CC79" });
  txt(periodLabel,                                 18,113, { size:14, bold:true, color:"#FFFFFF" });
  txt("Generated: " + now,                         18,124, { size:10,             color:"#94A3B8" });
  txt("CONFIDENTIAL  ·  EHS DEPARTMENT",           18,H-5, { size:8,              color:"#334155" });

  /* ── PAGE 2: EXECUTIVE SUMMARY ── */
  doc.addPage();
  frect(0,0,W,18,"#0A3D2B");
  frect(0,18,W,1.5,"#00CC79");
  txt("EXECUTIVE SUMMARY",  8, 13, { size:18, bold:true, color:"#FFFFFF" });
  txt(periodLabel,           8, 22, { size:9,              color:"#00CC79" });

  var total    = rows.length;
  var openC    = rows.filter(function(o){ return o.status === "OPEN"; }).length;
  var inprog   = rows.filter(function(o){ return o.status === "IN_PROGRESS"; }).length;
  var closed   = rows.filter(function(o){ return o.status === "CLOSED"; }).length;
  var overdue  = rows.filter(function(o){ return isOD(o); }).length;
  var serious  = rows.filter(function(o){ return o.risk === "SERIOUS" && o.status !== "CLOSED"; }).length;
  var goodObs  = rows.filter(function(o){ return o.obsType === "GOOD_OBS"; }).length;
  var unsafeA  = rows.filter(function(o){ return o.obsType === "UNSAFE_ACT"; }).length;
  var unsafeC  = rows.filter(function(o){ return o.obsType === "UNSAFE_CON"; }).length;

  var kpis = [
    { l:"Total OBS",   v:total,   c:"#0F172A", bg:"#F8FAFC" },
    { l:"Open",        v:openC,   c:openC  >0?"#EF4444":"#0F172A", bg:openC  >0?"#FEE2E2":"#F8FAFC" },
    { l:"In Progress", v:inprog,  c:"#F59E0B",                     bg:"#FEF3C7" },
    { l:"Closed",      v:closed,  c:"#00CC79",                     bg:"#D1FAE5" },
    { l:"Overdue",     v:overdue, c:overdue >0?"#EF4444":"#0F172A", bg:overdue >0?"#FEE2E2":"#F8FAFC" },
    { l:"Serious",     v:serious, c:serious >0?"#EF4444":"#0F172A", bg:serious >0?"#FEE2E2":"#F8FAFC" }
  ];
  var kw=40, kh=28, km=8;
  var kstart = (W - (kpis.length * (kw+km) - km)) / 2;
  kpis.forEach(function(k,i) {
    var kx = kstart + i*(kw+km), ky = 26;
    frect(kx,ky,kw,kh,k.bg);
    draw("#E2E8F0"); doc.rect(kx,ky,kw,kh);
    txt(String(k.v), kx+kw/2, ky+14, { size:22, bold:true, color:k.c, align:"center" });
    txt(k.l,         kx+kw/2, ky+22, { size:7,              color:"#64748B", align:"center" });
  });

  /* OBS type breakdown */
  var obsY = 26+kh+10;
  [[goodObs,"Good Obs","#00CC79","#D1FAE5"],[unsafeA,"Unsafe Act","#EF4444","#FEE2E2"],[unsafeC,"Unsafe Cond","#F59E0B","#FEF3C7"]].forEach(function(t,i){
    var tx=20+i*90;
    frect(tx,obsY,85,16,t[3]);
    txt(String(t[0]), tx+14, obsY+10, { size:14, bold:true, color:t[2] });
    txt(t[1],         tx+30, obsY+10, { size:10,             color:"#334155" });
  });

  /* Contractor table */
  var contMap2 = {};
  rows.forEach(function(o) {
    var co=o.company||"Unknown";
    if (!contMap2[co]) contMap2[co]={total:0,open:0,closed:0,overdue:0};
    contMap2[co].total++;
    if (o.status==="CLOSED") contMap2[co].closed++; else contMap2[co].open++;
    if (isOD(o)) contMap2[co].overdue++;
  });
  var ct2Keys = Object.keys(contMap2).sort();
  if (ct2Keys.length > 0 && doc.autoTable) {
    doc.autoTable({
      startY: obsY+22,
      head:[["Contractor","Total","Open","Closed","Overdue","Closure %"]],
      body: ct2Keys.map(function(co) {
        var d=contMap2[co], pct=d.total>0?Math.round(d.closed/d.total*100):0;
        return [co, d.total, d.open, d.closed, d.overdue, pct+"%"];
      }),
      headStyles:{ fillColor:hx("#0A3D2B"), textColor:[255,255,255], fontStyle:"bold", fontSize:9 },
      bodyStyles:{ fontSize:9 },
      columnStyles:{ 0:{fontStyle:"bold"}, 1:{halign:"center"}, 2:{halign:"center"}, 3:{halign:"center"}, 4:{halign:"center"}, 5:{halign:"center"} },
      margin:{ left:20, right:20 },
      theme:"striped",
      didParseCell:function(data) {
        if (data.section==="body") {
          if (data.column.index===2 && parseInt(data.cell.raw)>0) data.cell.styles.textColor=hx("#EF4444");
          if (data.column.index===3) data.cell.styles.textColor=hx("#00CC79");
          if (data.column.index===4 && parseInt(data.cell.raw)>0) data.cell.styles.textColor=hx("#EF4444");
        }
      }
    });
  }

  /* ── PAGE PER OBSERVATION ── */
  rows.forEach(function(o) {
    doc.addPage();
    var rk  = RISK[o.risk]     || { label:o.risk    ||"" };
    var st  = STATUS[o.status] || { label:o.status   ||"" };
    var ot  = OBS_TYPE[o.obsType]||{ label:o.obsType||"" };
    var rkColor = o.risk==="SERIOUS"?"#EF4444":o.risk==="MAJOR"?"#F59E0B":"#00CC79";
    var stLbl   = (st.label||o.status||"").replace(/_/g," ");

    /* header */
    frect(0,0,W,16,"#0A3D2B");
    frect(0,16,W,1,"#00CC79");
    txt(o.id,  8, 11, { size:13, bold:true, color:"#00CC79" });
    txt("  ·  " + ot.label, 28, 11, { size:10, color:"#AAAAAA" });
    txt(o.date + (o.week ? "  ·  " + o.week : ""), W-8, 11, { size:9, color:"#94A3B8", align:"right" });
    /* risk badge */
    frect(W-34,3,30,10,rkColor);
    txt((rk.label||"").toUpperCase(), W-19, 10, { size:8, bold:true, color:"#FFFFFF", align:"center" });

    /* left column: fields */
    var leftW=155, leftX=8, fieldY=21;
    var fields=[
      ["Zone / Area", o.zone    || "—"],
      ["Contractor",  o.company || "—"],
      ["Risk Level",  rk.label  || o.risk],
      ["Status",      stLbl],
      ["Due Date",    o.due     || "—"],
      ["Raised By",   o.by      || "—"],
      ["Closed Date", o.closed  || "—"],
      ["Closed By",   o.status === "CLOSED" ? (o.closedBy || "—") : "—"]
    ];
    fields.forEach(function(f,fi) {
      var fy = fieldY + fi*12;
      if (fi%2===0) frect(leftX, fy-2, leftW, 11, "#F8FAFC");
      txt(f[0]+":", leftX+2,  fy+6, { size:8, bold:true, color:"#64748B" });
      txt(f[1],     leftX+50, fy+6, { size:8,             color:"#0F172A" });
    });

    /* description */
    var descY = fieldY + fields.length*12 + 3;
    frect(leftX, descY, leftW, 22, "#EFF6FF");
    txt("DESCRIPTION", leftX+2, descY+5, { size:7, bold:true, color:"#1E3A8A" });
    var dLines = doc.splitTextToSize(o.desc||"—", leftW-6);
    txt(dLines.slice(0,3).join("\n"), leftX+2, descY+11, { size:8, color:"#0F172A" });

    /* corrective action */
    var rectY = descY + 26;
    frect(leftX, rectY, leftW, 22, "#F0FDF4");
    txt("CORRECTIVE ACTION", leftX+2, rectY+5, { size:7, bold:true, color:"#065F46" });
    var rLines = doc.splitTextToSize(o.rect||"—", leftW-6);
    txt(rLines.slice(0,3).join("\n"), leftX+2, rectY+11, { size:8, color:"#0F172A" });

    /* photos */
    var photoX=170, photoW=120, photoH=(H-26)/2-3;
    frect(photoX,20,photoW,H-22,"#F8FAFC");
    draw("#E2E8F0"); doc.rect(photoX,20,photoW,H-22);

    var bef=o.pb&&o.pb.length?o.pb[0]:null;
    var aft=o.pa&&o.pa.length?o.pa[0]:null;

    if (bef) {
      frect(photoX+2,22,photoW-4,6,"#1E3A8A");
      txt("BEFORE", photoX+photoW/2, 27, { size:8, bold:true, color:"#FFFFFF", align:"center" });
      try { var bt=bef.indexOf("png")>-1?"PNG":"JPEG"; doc.addImage(bef,bt,photoX+2,29,photoW-4,photoH); } catch(e){}
    } else {
      frect(photoX+2,22,photoW-4,photoH+7,"#F1F5F9");
      txt("No Before Photo", photoX+photoW/2, 22+photoH/2, { size:8, color:"#CBD5E1", align:"center" });
    }

    var afy = 22+photoH+9;
    if (aft) {
      frect(photoX+2,afy,photoW-4,6,"#00CC79");
      txt("AFTER", photoX+photoW/2, afy+5, { size:8, bold:true, color:"#FFFFFF", align:"center" });
      try { var at2=aft.indexOf("png")>-1?"PNG":"JPEG"; doc.addImage(aft,at2,photoX+2,afy+7,photoW-4,photoH-3); } catch(e){}
    } else {
      frect(photoX+2,afy,photoW-4,photoH+5,"#F1F5F9");
      txt("No After Photo", photoX+photoW/2, afy+photoH/2, { size:8, color:"#CBD5E1", align:"center" });
    }

    /* footer */
    frect(0,H-7,W,7,"#F8FAFC");
    txt(PROJECT + "  ·  EHS Weekly Report  ·  " + now, 8, H-2, { size:7, color:"#94A3B8" });
    txt(o.id + "  ·  Page " + doc.internal.getCurrentPageInfo().pageNumber, W-8, H-2, { size:7, color:"#94A3B8", align:"right" });
  });

  /* ── HIGH RISK SUMMARY ── */
  var hrObs2 = rows.filter(function(o){ return o.risk==="SERIOUS"; });
  if (hrObs2.length > 0 && doc.autoTable) {
    doc.addPage();
    frect(0,0,W,18,"#7F1D1D");
    frect(0,18,W,1.5,"#EF4444");
    txt("⚠  HIGH RISK FINDINGS — SERIOUS", 8, 13, { size:16, bold:true, color:"#FFFFFF" });
    doc.autoTable({
      startY:22,
      head:[["ID","Date","Zone / Area","Contractor","Description","Status"]],
      body:hrObs2.map(function(o){
        return [
          o.id, o.date, o.zone||"—", o.company||"—",
          (o.desc||"").slice(0,100)+((o.desc||"").length>100?"…":""),
          (STATUS[o.status]||{label:o.status}).label.replace(/_/g," ")
        ];
      }),
      headStyles:{ fillColor:hx("#7F1D1D"), textColor:[255,255,255], fontStyle:"bold", fontSize:9 },
      bodyStyles:{ fontSize:9 },
      columnStyles:{ 0:{fontStyle:"bold",cellWidth:20}, 1:{cellWidth:22}, 2:{cellWidth:40}, 3:{cellWidth:30}, 4:{}, 5:{cellWidth:25, fontStyle:"bold"} },
      margin:{ left:8, right:8 },
      theme:"striped",
      didParseCell:function(data){
        if (data.section==="body" && data.column.index===5) {
          data.cell.styles.textColor = (data.cell.raw||"").toUpperCase()==="CLOSED" ? hx("#00CC79") : hx("#EF4444");
        }
      }
    });
    frect(0,H-7,W,7,"#F8FAFC");
    txt(PROJECT + "  ·  EHS Weekly Report  ·  " + now, 8, H-2, { size:7, color:"#94A3B8" });
  }

  var fname = "EHS_Weekly_Report_" + (dateFrom||"").replace(/-/g,"") + "_" + (dateTo||"").replace(/-/g,"") + ".pdf";
  doc.save(fname);
}

/* ── REPORT VIEW COMPONENT ── */
function ReportView(props) {
  var obs = props.obs || [];

  /* default date range: Mon–today of current week */
  function thisMonday() {
    var d = new Date(), dow = d.getDay();
    var mon = new Date(d); mon.setDate(d.getDate() - (dow === 0 ? 6 : dow - 1));
    return mon.toISOString().slice(0,10);
  }
  var _df  = React.useState(thisMonday());
  var dateFrom = _df[0], setDateFrom = _df[1];
  var _dt  = React.useState(td());
  var dateTo   = _dt[0], setDateTo   = _dt[1];
  var _gen = React.useState(false);
  var generating    = _gen[0], setGenerating    = _gen[1];
  var _gPdf = React.useState(false);
  var generatingPdf = _gPdf[0], setGeneratingPdf = _gPdf[1];

  /* available weeks for quick-select buttons */
  var weeks = React.useMemo(function() {
    var ws = {};
    obs.forEach(function(o){ if (o.week) ws[o.week] = true; });
    return Object.keys(ws).sort();
  }, [obs]);

  var filtered = React.useMemo(function() {
    return rptFilterObs(obs, dateFrom, dateTo);
  }, [obs, dateFrom, dateTo]);

  var totalF   = filtered.length;
  var openF    = filtered.filter(function(o){ return o.status==="OPEN"; }).length;
  var closedF  = filtered.filter(function(o){ return o.status==="CLOSED"; }).length;
  var overdueF = filtered.filter(function(o){ return isOD(o); }).length;
  var seriousF = filtered.filter(function(o){ return o.risk==="SERIOUS"&&o.status!=="CLOSED"; }).length;
  var photosF  = filtered.filter(function(o){ return (o.pb&&o.pb.length)||(o.pa&&o.pa.length); }).length;

  function setWeekRange(wk) {
    var wDates = obs.filter(function(o){ return o.week===wk&&o.date; }).map(function(o){ return o.date; }).sort();
    if (wDates.length) { setDateFrom(wDates[0]); setDateTo(wDates[wDates.length-1]); }
  }

  function handlePPT() {
    if (!totalF) { alert("No observations in the selected date range."); return; }
    setGenerating(true);
    setTimeout(function() {
      try { generateWeeklyReportPPT(filtered, dateFrom, dateTo); }
      catch(e) { console.error(e); alert("PowerPoint generation failed: " + e.message); }
      setGenerating(false);
    }, 80);
  }
  function handlePDF() {

      try { generateWeeklyReportPDF(filtered, dateFrom, dateTo); }
      catch(e) { console.error(e); alert("PDF generation failed: " + e.message); }
      setGeneratingPdf(false);
    }, 80);

  var kpis2 = [
    { l:"Total",     v:totalF,   c:C.text,  bg:"#F8FAFC" },
    { l:"Open",      v:openF,    c:openF    >0?C.red:C.text, bg:openF    >0?C.redBg :"#F8FAFC" },
    { l:"Closed",    v:closedF,  c:C.green,                  bg:C.greenBg },
    { l:"Overdue",   v:overdueF, c:overdueF >0?C.red:C.text, bg:overdueF >0?C.redBg :"#F8FAFC" },
    { l:"Serious",   v:seriousF, c:seriousF >0?C.red:C.text, bg:seriousF >0?C.redBg :"#F8FAFC" },
    { l:"With Photos",v:photosF, c:C.blue,                   bg:C.blueBg }
  ];

  return React.createElement("div", { className:"fade-in", style:{ maxWidth:720, margin:"0 auto" } },
    /* page title */
    React.createElement("div", { style:{ marginBottom:18 } },
      React.createElement("h2", { style:{ fontSize:20, fontWeight:800, color:C.text, margin:0 } }, "📊 Weekly Report Generator"),
      React.createElement("p",  { style:{ fontSize:12, color:C.slate, margin:"5px 0 0" } },
        "Select a reporting period, preview the data, then download as PowerPoint or PDF."
      )
    ),

    /* date range card */
    React.createElement("div", { style:cSt },
      React.createElement("div", { style:hSt }, "Reporting Period"),
      React.createElement("div", { style:{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom: weeks.length ? 12 : 0 } },
        React.createElement("div", null,
          React.createElement("label", { style:lSt }, "Date From"),
          React.createElement("input", { type:"date", value:dateFrom, onChange:function(e){ setDateFrom(e.target.value); }, style:iSt })
        ),
        React.createElement("div", null,
          React.createElement("label", { style:lSt }, "Date To"),
          React.createElement("input", { type:"date", value:dateTo,   onChange:function(e){ setDateTo(e.target.value); },   style:iSt })
        )
      ),
      weeks.length > 0 && React.createElement("div", null,
        React.createElement("div", { style:{ fontSize:11, fontWeight:600, color:C.slateMid, marginBottom:7 } }, "Quick select by week:"),

            }, wk);

        "Preview  ",
        React.createElement("span", { style:{ fontWeight:400, color:C.slate, fontSize:12 } },
          totalF === 0 ? "No observations match this period" : totalF + " observation" + (totalF===1?"":"s") + " will be included"
        )
      ),

ne B\nFl.1 - Building A","company":"Ritta","cat":"Access and Egress","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"17. Access Control – Ramp Zone 1B\nHard barricades have not been installed at Ramp Zone 1B, resulting in insufficient access control and increased risk exposure.","rect":"","risk":"MINOR","status":"OPEN","by":"MS (Rep)","due":"","closed":"","pb":[],"pa":[]},{"id":"OBS-104","date":"2026-04-28","week":"W18","zone":"Site Office - Rebar Yard","company":"Ritta","cat":"Electrical Safety (HRA)","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"Electrical Equipment Inspection – Spotlight, Zone Office\nInspection status stickers for electrical equipment (spotlights) are missing, indicating a lack of proper inspection and tracking system","rect":"Inspection status stickers were immediately issued and affixed to all spotlights after completing safety inspection. Unverified equipment was removed from use until inspected.","risk":"MINOR","status":"CLOSED","by":"MS (Rep)","due":"2026-04-28","closed":"2026-04-28","pb":[],"pa":[]},{"id":"OBS-105","date":"2026-04-24","week":"W17","zone":"Rebar Yard - Site Office","company":"Ritta","cat":"Lifting Operations (HRA)","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"Lifting Operations – Rebar Yard Area\nLifting activities at the rebar yard area were not properly barricaded to cover the lift radius. In addition, no warning signage was provided to alert unauthorized personnel of ongoing lifting operations.","rect":"The lifting area was immediately re-barricaded to fully cover the lift radius, warning signage was installed, and a safety standdown was conducted with all related workers to reinforce lifting safety requirements.","risk":"MINOR","status":"CLOSED","by":"MS (Rep)","due":"2026-04-27","closed":"2026-04-24","pb":[],"pa":[]},{"id":"OBS-106","date":"2026-04-24","week":"W17","zone":"Rebar Yard - Site Office","company":"Ritta","cat":"Electrical Safety (HRA)","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"Electrical Cable Condition\nThe electrical lead had loosed from electrical plug posing a potential to electrical hazard at the fabrication shop.","rect":"The loose electrical lead was immediately disconnected and repaired/replaced.","risk":"MINOR","status":"CLOSED","by":"MS (Rep)","due":"2026-04-27","closed":"2026-04-24","pb":[],"pa":[]},{"id":"OBS-107","date":"2026-04-24","week":"W17","zone":"Rebar Yard - Site Office","company":"Ritta","cat":"Electrical Safety (HRA)","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"Improper Electrical Connection\nUnsafe cable jointing and improper taping were observed for the connection to the spotlight at the rebar yard, posing a potential to electrical hazard","rect":"Immediately stop using the unsafe electrical connection. Replace the improper cable jointing with proper connectors and ensure all wiring is correctly insulated using approved materials. Inspect the spotlight connection and verify it is safe before re-energizing.","risk":"MINOR","status":"CLOSED","by":"MS (Rep)","due":"2026-04-27","closed":"2026-04-24","pb":[],"pa":[]},{"id":"OBS-108","date":"2026-04-24","week":"W17","zone":"External South side - Building A","company":"Ritta","cat":"Lifting Operations (HRA)","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_ACT","desc":"Lifting operation was operating while many unauthorized  persons were inside the lifting zone and no any cordoned off the lifting zone with proper signage. Lifting supervisor and signaling not cleared the unauthorized persons before lifting. (Repeated case) Stand down has been conducted to this group but the Disciplinary action should be issued to crane operator, lifting supervisor and signaling.","rect":"Immediately stop the lifting operation and clear all unauthorized persons from the lifting zone. Properly cordon off the entire lifting area with barricades and warning signage before resuming work.","risk":"MINOR","status":"CLOSED","by":"MS (Rep)","due":"2026-04-27","closed":"2026-04-24","pb":[],"pa":[]},{"id":"OBS-109","date":"2026-04-24","week":"W17","zone":"External South side - Building A","company":"Ritta","cat":"Lifting Operations (HRA)","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"Warning signage for lifting operations was not adequately displayed in all directions only 2 languages provided and missing Myanmar langue.Required signage must include:\nNo Unauthorized Entry & Only AuthorisedPersons Allowed Beyond This Area (Red Prohibition Sign)\nLifting Operation in Progress Do Not Enter and Beware Falling Object Hazard or Line of Fire Signage  (Yellow Warning Sign)\nAll signage must be provided in three languages.(Thai,Engllish and Myanmar Langue)","rect":"1. Immediately install sufficient warning signage around the lifting operation area in all access directions. Replace and update the existing signs to include three languages: Thai, English, and Myanmar. Required signage shall include: \n2. No Unauthorized Entry / Only Authorized Persons Allowed Beyond This Area (Red Prohibition Sign) and \n3. Lifting Operation in Progress – Do Not Enter / Beware of Falling Object Hazard / Line of Fire (Yellow Warning Sign).","risk":"MINOR","status":"CLOSED","by":"MS (Rep)","due":"2026-04-27","closed":"2026-04-24","pb":[],"pa":[]},{"id":"OBS-110","date":"2026-04-24","week":"W17","zone":"TC01\nFl.1 - Building A","company":"Ritta","cat":"Electrical Safety (HRA)","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"Electrical Panel Signage\nCPR procedure’s signage displayed at electrical panels across all areas are not provided in three languages, which may lead to misunderstanding among workers.","rect":"Immediately replace or update the CPR procedure signage displayed at all electrical panels to include three languages: Thai, English, and Myanmar. Ensure the content is clear, legible, and properly displayed at visible locations near each electrical panel.","risk":"MINOR","status":"CLOSED","by":"MS (Rep)","due":"2026-04-27","closed":"2026-04-24","pb":[],"pa":[]},{"id":"OBS-111","date":"2026-04-24","week":"W17","zone":"TC01\nFl.1 - Building A","company":"Ritta","cat":"Electrical Safety (HRA)","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"Electrician Responsibility Update on Electrical Distribution Boxes.\nThe list of certified electricians assigned displayed on electrical panels has not been updated.","rect":"Immediately review and update the list of certified electricians displayed on all electrical panels to ensure the names, qualifications, and contact details are current and accurate. Remove outdated information and replace it with the latest approved list.","risk":"MINOR","status":"CLOSED","by":"MS (Rep)","due":"2026-04-27","closed":"2026-04-24","pb":[],"pa":[]},{"id":"OBS-112","date":"2026-04-24","week":"W17","zone":"Zone A\nFl.1 - Building A","company":"Ritta","cat":"Documentation","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"Authorized Operator & Safety Signage (MEWP / Scissor Lift)\nAuthorized Operator list, including operator identification (photo and contact number), has not been provided. In addition, required safety instruction signage is insufficient and not available in three languages.","rect":"Immediately prepare and display the Authorized Operator list at the equipment location, including operator identification photo and contact number. Update and install all required safety instruction signage, ensuring the signs are sufficient, clearly visible, and provided in three languages: Thai, English, and Myanmar.","risk":"MINOR","status":"CLOSED","by":"MS (Rep)","due":"2026-04-27","closed":"2026-04-24","pb":[],"pa":[]},{"id":"OBS-113","date":"2026-04-24","week":"W17","zone":"Zone C\nST06 - Building A","company":"Ritta","cat":"Scaffold","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"Scaffolding Documentation\nThe Stair Tower Summary Report, including the SWL (Safe Working Load) calculation and wall tie point, shall be prepared and submitted accordingly.","rect":"Immediately prepare the Stair Tower Summary Report, including the Safe Working Load (SWL) calculation and wall tie point details, and submit it to the relevant parties for review and approval. Ensure all technical data and supporting calculations are complete and accurate.","risk":"MINOR","status":"CLOSED","by":"MS (Rep)","due":"2026-04-27","closed":"2026-04-24","pb":[],"pa":[]},{"id":"OBS-114","date":"2026-04-24","week":"W17","zone":"Zone C\nLower Roof - Building A","company":"Ritta","cat":"Scaffold","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"Scaffolding Tagging System\nScaffolding structures were found without scaffolding tags (Red Tag – Do Not Use / Green Tag – Safe for Use).","rect":"Immediately stop the use of all scaffolding structures found without scaffolding tags. Inspect the scaffolds by a competent person and install the appropriate scaffolding tags accordingly: Red Tag – Do Not Use for unsafe/incomplete scaffolds and Green Tag – Safe for Use for inspected and approved scaffolds.","risk":"MINOR","status":"CLOSED","by":"MS (Rep)","due":"2026-04-27","closed":"2026-04-24","pb":[],"pa":[]},{"id":"OBS-115","date":"2026-04-24","week":"W17","zone":"ST06 - Building A","company":"Ritta","cat":"Electrical Safety (HRA)","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"Cable Management – Rebar Contact\nElectrical cables were found laid directly on rebar without proper suspension using S-hooks.","rect":"Immediately remove the electrical cables from direct contact with the rebar and re-route them using proper suspension with approved S-hooks or suitable cable support systems.","risk":"MINOR","status":"CLOSED","by":"MS (Rep)","due":"2026-04-27","closed":"2026-04-24","pb":[],"pa":[]},{"id":"OBS-116","date":"2026-04-24","week":"W17","zone":"Zone D\nLower roof - Building A","company":"Ritta","cat":"Electrical Safety (HRA)","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"Cable Management – Ground Condition\nElectrical cables were found lying on the ground without being elevated above ground level, creating potential trip hazards.","rect":"Immediately lift and secure all electrical cables found lying on the ground using approved cable stands, hooks, or overhead support systems to maintain adequate clearance above ground level.","risk":"MINOR","status":"CLOSED","by":"MS (Rep)","due":"2026-04-27","closed":"2026-04-24","pb":[],"pa":[]},{"id":"OBS-117","date":"2026-04-24","week":"W17","zone":"Zone D\nLower roof - Building A","company":"Ritta","cat":"Equipment Safety","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"Rebar Protection\nExposed rebar was identified within working areas without protective caps, creating an unsafe condition.","rect":"Immediately install approved protective rebar caps or suitable covers on all exposed rebar located within working areas.","risk":"MINOR","status":"CLOSED","by":"MS (Rep)","due":"2026-04-27","closed":"2026-04-24","pb":[],"pa":[]},{"id":"OBS-118","date":"2026-04-24","week":"W17","zone":"Zone D\nLower roof - Building A","company":"Ritta","cat":"Access and Egress","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"Safe Access\nThe working area east side of second floor has not provided safe access & egress for workforce.","rect":"Immediately provide safe access and egress for the workforce at the east side working area on the second floor. Install suitable access routes such as secured stairways, ladders, or temporary walkways with proper handrails and stable footing.","risk":"MINOR","status":"CLOSED","by":"MS (Rep)","due":"2026-04-27","closed":"2026-04-24","pb":[],"pa":[]},{"id":"OBS-119","date":"2026-04-24","week":"W17","zone":"Zone D\nLower roof - Building A","company":"Ritta","cat":"Working from Heights (HRA)","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"Loose Materials at Height\nLoose materials were not properly secured in elevated work areas with openings or gaps, posing a risk of falling objects to lower levels.","rect":"Conduct an immediate standdown with the concerned work team to address the unsafe condition and reinforce falling object control requirements.\nRemove or properly secure all loose materials in elevated work areas, especially near openings or gaps. Install toe boards, edge protection, netting, or other containment measures where required to prevent materials from falling to lower levels. Barricade the area below until the hazard is eliminated.","risk":"MINOR","status":"CLOSED","by":"MS (Rep)","due":"2026-04-27","closed":"2026-04-24","pb":[],"pa":[]},{"id":"OBS-120","date":"2026-04-24","week":"W17","zone":"Zone D\nLower roof - Building A","company":"Ritta","cat":"Working from Heights (HRA)","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"WAH : \n15.1 Lifeline Inspection\nLifelines installed in work-at-height areas have not been inspected and verified by a responsible person and some of lifeline has been removed with out verification and permission. SWL,Lifeline Checklist,Maximum Persons to Hook Up on each anchorage point have not been displayed.","rect":"Conduct an immediate standdown with all concerned personnel regarding lifeline control and work-at-height safety requirements.\nReinspect all installed lifelines, verify their condition and anchorage points, and reapprove them before further use. Investigate any lifelines removed without verification or permission and reinstate only after proper authorization. Display the required information at each lifeline location, including SWL (Safe Working Load), Lifeline Checklist, and Maximum Persons All","risk":"MINOR","status":"CLOSED","by":"MS (Rep)","due":"2026-04-27","closed":"2026-04-24","pb":[],"pa":[]},{"id":"OBS-121", an support the required load.\nPlace clear warning signage around the opening area.\nRestrict access to the area until adequate protection is in place.","risk":"MINOR","status":"CLOSED","by":"DAYONE","due":"2026-03-17","closed":"2026-03-17","pb":[],"pa":[]},{"id":"OBS-214","date":"2026-03-17","week":"W12","zone":"Zone A - Building A","company":"Ritta","cat":"Material Storage","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"Scrap steel materials left over from work were found piled in the work area, creating a potential hazard.","rect":"Remove and clear all scrap steel materials from the work area immediately.\nDispose of or store the materials in designated storage or scrap areas.\nOrganize the work area to eliminate tripping and injury hazards.","risk":"MINOR","status":"CLOSED","by":"DAYONE","due":"2026-03-17","closed":"2026-03-17","pb":[],"pa":[]},{"id":"OBS-215","date":"2026-03-17","week":"W12","zone":"Zone A - Building A","company":"Ritta","cat":"Equipment Safety","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"Protruding steel bars were observed above the floor level, posing a tripping and impact hazard.","rect":"Immediately cover or cap the protruding steel bars with appropriate protective caps.\nBend, cut, or relocate the protruding steel where possible to eliminate the hazard.\nMark the area clearly and restrict access until the hazard is controlled.","risk":"MINOR","status":"CLOSED","by":"DAYONE","due":"2026-03-17","closed":"2026-03-17","pb":[],"pa":[]},{"id":"OBS-216","date":"2026-03-17","week":"W12","zone":"Zone A - Building A","company":"Ritta","cat":"Lifting Operations (HRA)","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"Concrete buckets used for lifting operations must have clearly indicated Safe Working Load (SWL) or load capacity markings.","rect":"Stop using any concrete bucket without a clearly visible load capacity marking.\nEnsure the concrete bucket is labeled with its SWL / load capacity before use.\nVerify the certification and condition of the concrete bucket with the Lifting Supervisor prior to operation.","risk":"MINOR","status":"CLOSED","by":"DAYONE","due":"2026-03-17","closed":"2026-03-17","pb":[],"pa":[]},{"id":"OBS-217","date":"2026-03-17","week":"W12","zone":"Zone A - Building A","company":"Ritta","cat":"Access and Egress","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"Tools and equipment were left scattered in the work area, obstructing walkways and creating a potential tripping hazard.","rect":"Immediately clear all tools and equipment from walkways and access routes.\nStore tools in designated storage areas or toolboxes after use.\nEnsure walkways are kept free from obstruction at all times.","risk":"MINOR","status":"CLOSED","by":"DAYONE","due":"2026-03-17","closed":"2026-03-17","pb":[],"pa":[]},{"id":"OBS-218","date":"2026-03-17","week":"W12","zone":"Zone A - Building A","company":"Ritta","cat":"Scaffold","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"Wooden planks used as scaffolding platforms were found in the work area. The use of wooden planks for scaffolding is not permitted and must be removed from the site.\nMaterials and equipment were not properly organized, resulting in poor housekeeping and an untidy work area.","rect":"Remove all non-compliant wooden planks from the work area.\nImmediately arrange and organize all materials and equipment in an orderly manner.\nRemove unnecessary items from the work area.\nStore materials and equipment in designated storage areas.","risk":"MINOR","status":"CLOSED","by":"DAYONE","due":"2026-03-17","closed":"2026-03-17","pb":[],"pa":[]},{"id":"OBS-219","date":"2026-03-17","week":"W12","zone":"Zone A - Building A","company":"Ritta","cat":"Scaffold","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"Scaffolding platforms were found to be rusted, which may deteriorate and fail under load","rect":"Im ure all lifting roles and responsibilities are clearly defined and communicated.\nThe Lifting Supervisor must verify that all required personnel are in place prior to lifting","risk":"MINOR","status":"CLOSED","by":"MS (Rep)","due":"2026-03-18","closed":"2026-03-18","pb":[],"pa":[]},{"id":"OBS-226","date":"2026-03-18","week":"W12","zone":"Zone A - Building A","company":"DayOne / Ritta","cat":"Lifting Operations (HRA)","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_ACT","desc":"Damaged tagline was using and short tagline was using during lifting activity carrying out.","rect":"Stop the lifting activity immediately.\nRemove the damaged tagline from service and tag it as “Do Not Use.”\nReplace with a properly sized and undamaged tagline suitable for the lifting operation.\nEnsure the tagline length is sufficient to maintain safe control and distance from the load.","risk":"MINOR","status":"CLOSED","by":"MS (Rep)","due":"2026-03-18","closed":"2026-03-18","pb":[],"pa":[]},{"id":"OBS-227","date":"2026-03-18","week":"W12","zone":"Zone A - Building A","company":"DayOne / Ritta","cat":"Driving & Traffic (HRA)","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_ACT","desc":"Untrained banksman present and signed to do this job.","rect":"Stop the activity immediately.\nRemove the untrained banksman from the task.\nAssign a trained and competent banksman/signalman to carry out the operation.\nVerify competency and authorization of personnel before allowing them to perform the task.","risk":"MINOR","status":"CLOSED","by":"MS (Rep)","due":"2026-03-18","closed":"2026-03-18","pb":[],"pa":[]},{"id":"OBS-228","date":"2026-03-20","week":"W12","zone":"Zone A - Building A","company":"Ritta","cat":"Lifting Operations (HRA)","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_ACT","desc":"A mobile crane operator was found not having attended the project Induction Training and Lifting Training.","rect":"Stop the operator from performing lifting operations immediately.\nEnsure the operator attends and completes the required Induction Training and Lifting Training before resuming work.\nVerify the operator’s competency and training records with the site management.","risk":"MINOR","status":"CLOSED","by":"MS (Rep)","due":"2026-02-20","closed":"2026-03-20","pb":[],"pa":[]},{"id":"OBS-229","date":"2026-03-20","week":"W12","zone":"Zone A - Building A","company":"Ritta","cat":"Scaffold","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"Gaps between the walkway planks of the access tower scaffolding were observed. These openings may allow materials to fall, creating a falling object hazard.","rect":"Immediately cover or close all gaps between the walkway planks.\nEnsure all planks are properly installed, aligned, and fully secured.\nInstall additional boards or toe boards where necessary to prevent materials from falling.","risk":"MINOR","status":"CLOSED","by":"MS (Rep)","due":"2026-02-20","closed":"2026-03-20","pb":[],"pa":[]},{"id":"OBS-230","date":"2026-03-20","week":"W12","zone":"Zone A - Building A","company":"Ritta","cat":"Equipment Safety","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"Exposed rebar ends at floor level were found without rebar caps, posing a risk of body contact, cuts, or impalement injuries.","rect":"Immediately install rebar caps on all exposed rebar ends.\nEnsure all exposed rebar ends are fitted with approved protective caps at all times","risk":"MINOR","status":"CLOSED","by":"MS (Rep)","due":"2026-02-20","closed":"2026-03-20","pb":[],"pa":[]},{"id":"OBS-231","date":"2026-03-20","week":"W12","zone":"Zone A - Building A","company":"Ritta","cat":"Working from Heights (HRA)","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"Sling lifeline systems were found without an inspection checklist and without clear labeling of the Safe Working Load (SWL) per span of the lifeline.","rect":"Prepare and implement an inspection checklist for uipment shall not be used for lifting operations.","rect":"Immediately remove any damaged or defective lifting equipment from service.\nReplace with certified and properly inspected lifting equipment before resuming lifting operations.\nReport the defective equipment to the Lifting Supervisor and tag it as “Do Not Use.”","risk":"MINOR","status":"CLOSED","by":"DAYONE","due":"","closed":"2026-03-13","pb":[],"pa":[]},{"id":"OBS-241","date":"2026-03-13","week":"W11","zone":"Zone A - Building A","company":"Ritta","cat":"Housekeeping","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"Poor housekeeping was observed. Personal belongings such as bags and water bottles were improperly stored and hung on the scaffolding, resulting in an untidy work area.","rect":"Remove all personal belongings from the scaffolding immediately.\nInstruct workers to store bags, water bottles, and personal items in the designated storage area.\nEnsure the work area is properly organized and maintained in a clean and orderly","risk":"MINOR","status":"CLOSED","by":"DAYONE","due":"","closed":"2026-03-13","pb":[],"pa":[]},{"id":"OBS-242","date":"2026-03-13","week":"W11","zone":"Zone A - Building A","company":"Ritta","cat":"Housekeeping","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"Waste was not properly segregated at the worksite. Construction debris such as broken bricks, concrete debris, and wood scraps should be separated and disposed of in the designated waste bins according to waste type.","rect":"Provide clearly labeled waste bins for different types of waste (e.g., concrete, wood, general waste).\nConduct toolbox talks to raise awareness about proper waste segregation and site housekeeping.","risk":"MINOR","status":"CLOSED","by":"DAYONE","due":"","closed":"2026-03-13","pb":[],"pa":[]},{"id":"OBS-243","date":"2026-03-13","week":"W11","zone":"Zone A - Building A","company":"Ritta","cat":"Health & Hygiene","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_ACT","desc":"Observed the workers were not sitting on the chairs and table having lunch.","rect":"Workers shall be instructed to use the designated dining area with the provided tables and chairs during meal breaks.","risk":"MINOR","status":"CLOSED","by":"MS (Rep)","due":"2026-03-13","closed":"2026-03-13","pb":[],"pa":[]},{"id":"OBS-244","date":"2026-03-13","week":"W11","zone":"Zone A - Building A","company":"Ritta","cat":"Lifting Operations (HRA)","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"Unsafe lifting and using un-certify of basket for lifting.","rect":"Stop using the equipment until certified equipment is provided.\nAll lifting equipment must have valid inspection certificates before use.","risk":"MINOR","status":"CLOSED","by":"MS (Rep)","due":"2026-03-13","closed":"2026-03-13","pb":[],"pa":[]},{"id":"OBS-245","date":"2026-03-13","week":"W11","zone":"Zone A - Building A","company":"Ritta","cat":"Lifting Operations (HRA)","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_ACT","desc":"Unauthorised riggers and no competent crane operator, lifting supervisor, rigger, signalman provided for lifting of chemical gallon which was contained 200 litters which was loading, and many workers were under the load at letdown area. Barricading, signage not provided","rect":"Only authorized and competent personnel (Crane Operator, Lifting Supervisor, Rigger, and Signalman) shall be assigned for lifting operations. Barricades and warning signage must be installed to restrict access to the lifting area, and workers must not stand or pass under suspended loads.","risk":"MINOR","status":"CLOSED","by":"MS (Rep)","due":"2026-03-13","closed":"2026-03-13","pb":[],"pa":[]},{"id":"OBS-246","date":"2026-03-13","week":"W11","zone":"Zone A - Building A","company":"Ritta","cat":"Electrical Safety (HRA)","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"Exposed electrical cables found at the security guard
