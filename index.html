<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#F0F4F8;min-height:100vh;color:#0F172A}
input,select,textarea,button{font-family:'Inter',sans-serif}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#F0F4F8}
::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:6px}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .25s ease}
html,body{max-width:100%;overflow-x:hidden;-webkit-text-size-adjust:100%}
@media(max-width:820px){
  /* prevent any horizontal overflow */
  #root,#root *{max-width:100%}
  /* header: allow it to grow and wrap instead of squashing */
  .topbar{height:auto!important;min-height:58px;flex-wrap:wrap;gap:8px;padding:10px 14px!important;padding-left:calc(14px + env(safe-area-inset-left))!important;padding-right:calc(14px + env(safe-area-inset-right))!important}
  .topbar-brand{flex:1 1 100%}
  /* action buttons row: wrap + full width so nothing overflows */
  .topbar-actions{flex-wrap:wrap!important;width:100%!important;gap:6px!important}
  /* every form/card grid becomes ONE column: each field on its own line */
  .grid3,.grid2{grid-template-columns:1fr!important;gap:12px!important}
  [style*="grid-template-columns"]:not(.kpigrid){grid-template-columns:1fr!important;gap:12px!important}
  /* only the small dashboard KPI tiles stay 2-up (compact) */
  .kpigrid{grid-template-columns:1fr 1fr!important;gap:8px!important}
  .kpigrid>div{padding:10px 11px!important;border-radius:11px!important}
  .kpigrid>div>div:nth-child(2){font-size:21px!important}
  .hidesm{display:none!important}
  .navbtn{padding:6px 10px!important;font-size:11px!important}
  /* inputs: full width, border-box, 16px to stop iOS auto-zoom */
  input,select,textarea{font-size:16px!important;width:100%!important;box-sizing:border-box!important;max-width:100%}
  /* tables scroll horizontally inside their own box instead of pushing the page */
  table{display:block;width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch}
  button{touch-action:manipulation}
  img{max-width:100%;height:auto}
}
/* ≤430px: tighten button padding so all 7 buttons fit in 2 rows comfortably */
@media(max-width:430px){
  .navbtn{padding:6px 8px!important;font-size:10px!important}
  .topbar-actions button{font-size:10px!important;padding:6px 8px!important}
}
/* ≤390px: further tighten */
@media(max-width:390px){
  .navbtn{padding:5px 7px!important;font-size:10px!important}
  .topbar-actions button{font-size:10px!important;padding:5px 7px!important}
}
/* ≤360px: smallest phones — nav buttons go 2-per-row, action buttons stack */
@media(max-width:360px){
  .navbtn{padding:5px 6px!important;font-size:9px!important;flex:1 1 calc(50% - 6px)!important}
  .topbar-actions button{font-size:9px!important;padding:5px 6px!important;flex:1 1 calc(50% - 6px)!important}
}
</style>

   ──────────────────────────────────────────────────────────────────────────── */

function storageObjectPath(obsId, slot, idx){
  /* deterministic path → re-uploads overwrite instead of duplicating */
  return CLOUD.row + "/" + obsId + "/" + slot + "-" + idx + ".jpg";
}
function storagePublicUrl(path){

/* Convert a data: URI to a Blob for binary upload */
function dataUriToBlob(dataUri){
  try {
    var comma = dataUri.indexOf(",");
    var meta = dataUri.slice(0, comma);
    var b64 = dataUri.slice(comma + 1);
    var mime = (meta.match(/data:([^;]+)/) || [])[1] || "image/jpeg";
    var bin = atob(b64), len = bin.length, bytes = new Uint8Array(len);
    for(var i=0;i<len;i++) bytes[i] = bin.charCodeAt(i);
    return new Blob([bytes], { type: mime });
  } catch(e){ console.warn("[CTPA] dataUriToBlob failed:", e && e.message); return null; }
}
/* Last Storage upload failure detail (HTTP status + message) — shown by Sync Photos. */
var __lastStorageErr = "";
function explainStorageErr(status, body){
  var msg; try { var p = JSON.parse(body); msg = p.message || p.error || body; } catch(_){ msg = body; }
  msg = (msg || "").slice(0, 160);
  if(status === 404) return "404 Bucket not found — create a PUBLIC bucket named 'ctpa-photos' in Supabase → Storage.";
  if(status === 403 || status === 401) return status + " Not allowed — add the storage.objects INSERT policy (see setup SQL). " + msg;
  if(status === 400 && /row-level security|policy/i.test(msg)) return "400 RLS policy missing — run the storage.objects policies SQL. " + msg;
  return "HTTP " + status + " — " + msg;
}
/* Upload one photo's image to Storage. Resolves to its public URL, or null on failure. */
function uploadPhotoToStorage(obsId, slot, idx, photo){
  if(!cloudOn() || !photo || !photo.src) return Promise.resolve(null);
  if(photo.src.indexOf("data:") !== 0) return Promise.resolve(null); /* already a URL */
  /* Prefer the ORIGINAL full-resolution image (held transiently in __ctpaOriginals)
     so Supabase Storage keeps the sharpest copy for PDF/PPT export. Falls back to the
     compressed display src for older photos / after a reload. */
  var original = (photo.id != null && __ctpaOriginals[photo.id]) ? __ctpaOriginals[photo.id] : null;
  var srcToUpload = original || photo.src;
  var blob = dataUriToBlob(srcToUpload);
  if(!blob){ __lastStorageErr = "Could not decode photo data (invalid base64)."; return Promise.resolve(null); }
  var path = storageObjectPath(obsId, slot, idx);
  var url = CLOUD.url.replace(/\/$/,"") + "/storage/v1/object/" + CLOUD.bucket + "/" + path.split("/").map(encodeURIComponent).join("/");
  return fetch(url, {
    method: "POST",
    headers: { "apikey": CLOUD.key, "Authorization": "Bearer " + CLOUD.key, "Content-Type": blob.type || "image/jpeg", "x-upsert": "true" },
    body: blob
  }).then(function(r){
    if(r.ok){ __lastStorageErr = ""; if(photo.id != null) delete __ctpaOriginals[photo.id]; return storagePublicUrl(path); }
    return r.text().then(function(t){
      __lastStorageErr = explainStorageErr(r.status, t);
      console.warn("[CTPA] Storage upload failed:", r.status, t.slice(0,200), "| URL:", url);
      return null;
    });
  }).catch(function(e){
    __lastStorageErr = "Network/CORS error: " + ((e && e.message) || "unknown");
    console.warn("[CTPA] Storage upload error:", e && e.message);
    return null;
  });
}

/* Save one photo: cache locally → upload to Storage (primary) → ctpa_photos table (fallback).

function savePhotoToCloud(obsId, slot, idx, photo){

  if(photo && photo.src) cachePhotoLocal(obsId, slot, idx, photo.src);

  /* If the photo is already a Storage URL, nothing to upload */
  if(photo.src.indexOf("data:") !== 0 && /^https?:/.test(photo.src)) return Promise.resolve(photo.src);
  return uploadPhotoToStorage(obsId, slot, idx, photo).then(function(storageUrl){

/* ── Local photo cache — separate from the main obs array ───────────────────
   Stores photo base64 in individual localStorage keys:
     ctpa_ph_{obsId}|{slot}|{idx}
   These keys are NEVER overwritten by pull() or cloudMergeSave, so photos
   added on this device always survive cloud sync cycles.
   ──────────────────────────────────────────────────────────────────────────── */
var PH_PREFIX = "ctpa_ph_";
function photoLocalKey(obsId, slot, idx){ return PH_PREFIX + obsId + "|" + slot + "|" + idx; }

/* In-memory fallback when localStorage is full or unavailable */
var _memPhotoCache = {};

function cachePhotoLocal(obsId, slot, idx, src){
  if(!src || src.length < 32) return;
  var key = photoLocalKey(obsId, slot, idx);
  /* Always write to memory cache as a reliable fallback */
  _memPhotoCache[key] = src;
  try {
    localStorage.setItem(key, src);
  } catch(e) {
    if(e && (e.name === "QuotaExceededError" || e.name === "NS_ERROR_DOM_QUOTA_REACHED" || e.code === 22)) {
      console.warn("[CTPA] localStorage quota exceeded — evicting oldest photo cache entries and retrying");
      /* Evict all photo cache entries (oldest strategy: remove all, keep only current) */
      try {
        var toRemove = [];
        for(var i = 0; i < localStorage.length; i++){
          var k = localStorage.key(i);
          if(k && k.indexOf(PH_PREFIX) === 0) toRemove.push(k);
        }
        toRemove.forEach(function(k){ try { localStorage.removeItem(k); } catch(_){} });
        /* Retry once after eviction */
        localStorage.setItem(key, src);
      } catch(e2){
        /* Still failing — memory cache is sufficient for this session */
        console.warn("[CTPA] localStorage still unavailable after eviction — using memory cache only");
      }
    }
    /* Non-quota errors: silently use memory cache */
  }
}
function getCachedPhotoSrc(obsId, slot, idx){
  var key = photoLocalKey(obsId, slot, idx);
  try {
    var v = localStorage.getItem(key);
    if(v) return v;
  } catch(e){}
  /* Fall back to memory cache */
  return _memPhotoCache[key] || null;
}

/* Displayable image source for a photo object: prefer the cross-device Storage URL,
   then a local/base64 src. Returns null when nothing is loadable (show warning). */
function photoSrc(p){
  if(!p) return null;
  if(p.url) return p.url;
  if(p.src && p.src.length > 32) return p.src;
  return null;
}
/* True when a photo can be displayed on THIS device right now (url or local src). */
function photoHas(p){ return !!photoSrc(p); }

/* Merge individually-cached photos back into an obs array.
   Called after restorePhotos so same-device photos always display. */
function mergeLocalPhotoCache(obsArr){
  return obsArr.map(function(o){
    var changed = false;
    var nb = (o.pb||[]).map(function(p, i){
      if(p && (!p.src || p.src.length < 32)){
        var cached = getCachedPhotoSrc(o.id, "pb", i);
        if(cached){ changed = true; return Object.assign({}, p, { src: cached }); }
      }
      return p;
    });
    var na = (o.pa||[]).map(function(p, i){
      if(p && (!p.src || p.src.length < 32)){
        var cached = getCachedPhotoSrc(o.id, "pa", i);
        if(cached){ changed = true; return Object.assign({}, p, { src: cached }); }
      }
      return p;
    });
    return changed ? Object.assign({}, o, { pb: nb, pa: na }) : o;
  });
}

/* Fetch a public URL and convert it to a base64 data URI (for PDF/PPT embedding). */
function urlToDataUri(url){
  return fetch(url, { cache: "no-store" })
    .then(function(r){ if(!r.ok) throw new Error("HTTP " + r.status); return r.blob(); })
    .then(function(blob){
      return new Promise(function(res, rej){
        var fr = new FileReader();
        fr.onload = function(){ res(fr.result); };
        fr.onerror = rej;
        fr.readAsDataURL(blob);
      });
    });

/* Read an image's natural pixel dimensions from a data URI / URL.
   Used by PDF/PPT export to preserve the original aspect ratio (no distortion). */
function imgNaturalSize(src){
  return new Promise(function(res){
    if(!src){ res(null); return; }
    var im = new Image();
    im.onload = function(){ res({ w: im.naturalWidth || im.width, h: im.naturalHeight || im.height }); };
    im.onerror = function(){ res(null); };
    im.src = src;
  });
}
/* Fit (w,h) of a box around a natural image size, preserving aspect ratio (contain).
   Returns { w, h, ox, oy } where ox/oy centre the image inside the box. */
function containFit(natW, natH, boxW, boxH){
  if(!natW || !natH){ return { w: boxW, h: boxH, ox: 0, oy: 0 }; }
  var scale = Math.min(boxW / natW, boxH / natH);
  var w = natW * scale, h = natH * scale;
  return { w: w, h: h, ox: (boxW - w) / 2, oy: (boxH - h) / 2 };
}

/* Before generating PDF/PPTX, fill in base64 src for any photo that lacks it.
   Source order: ctpa_photos table (pass 1), then Storage url → base64 (pass 2).

       Storage holds the full uploaded image. We do this WHENEVER a url exists — even if
       a compressed display copy is already in src — so the export always embeds the
       sharpest available picture (the in-app display copy is downscaled to 1920px). */
    var urlJobs = [];
    obsArr.forEach(function(o, oi){
      ["pb","pa"].forEach(function(slot){
        (o[slot] || []).forEach(function(p, pi){
          if(p && p.url){
            urlJobs.push(
              urlToDataUri(p.url).then(function(dataUri){
                if(dataUri && dataUri.length > 32) obsArr[oi][slot][pi] = Object.assign({}, obsArr[oi][slot][pi], { src: dataUri, _nw: null, _nh: null });
              }).catch(function(e){ console.warn("[CTPA export] storage url→base64 failed", o.id, slot, pi, e && e.message); })
            );

      /* Pass 2 (fallback): anything still without src → fill from ctpa_photos base64 table */
      obsArr.forEach(function(o, oi){
        ["pb","pa"].forEach(function(slot){
          (o[slot] || []).forEach(function(p, pi){
            var cur = obsArr[oi][slot][pi];
            var cloudSrc = photoMap[o.id + "|" + slot + "|" + pi];
            if(cur && (!cur.src || cur.src.length < 32) && cloudSrc && cloudSrc.length > 32){

      var sizeJobs = [];

                imgNaturalSize(cur.src).then(function(sz){

            }
          });

      });
      return Promise.all(sizeJobs).then(function(){ return obsArr; });
    });

/* Diagnostic access — compares SHA-256 of typed password against stored hash.
   Returns a Promise<boolean>. Never stores the plain-text password. */
function checkDiagPass(input){
  if(!input) return Promise.resolve(false);
  return crypto.subtle.digest("SHA-256", new TextEncoder().encode(input))
    .then(function(buf){
      var hex = Array.from(new Uint8Array(buf)).map(function(b){ return b.toString(16).padStart(2,"0"); }).join("");
      return hex === DIAG_PASS_HASH;
    })
    .catch(function(){ return false; });
}
function checkReportPass(input){
  if(!input) return Promise.resolve(false);
  return crypto.subtle.digest("SHA-256", new TextEncoder().encode(input))
    .then(function(buf){
      var hex = Array.from(new Uint8Array(buf)).map(function(b){ return b.toString(16).padStart(2,"0"); }).join("");
      return hex === REPORT_PASS_HASH;
    })
    .catch(function(){ return false; });
}

          console.error("[CTPA] cloudLoad SELECT failed | status:", r.status,
            "| code:", parsed && parsed.code,
            "| message:", parsed && parsed.message || t.slice(0,300),
            "| hint:", parsed && parsed.hint,

          return null;

}
/* stripPhotos: remove base64 src from photo arrays before sending to Supabase.
   Keeps metadata (id, name, at, count) but drops the data URI (can be 50-500 KB per photo).
   Photos are restored from localStorage when loading. Reduces payload from ~10 MB to ~50 KB. */
function stripPhotos(arr){
  var LEGACY_AP = { "MS": "GC Manager", "DAYONE": "GC Manager" };
  return arr.map(function(o){
    var o2 = Object.assign({}, o);
    /* Keep the small Storage `url` (a few bytes) so photos sync cross-device via ctpa_state.
       Only the large base64 `src` is dropped. */
    if(o2.pb && o2.pb.length) o2.pb = o2.pb.map(function(p){ return { id: p.id, name: p.name, at: p.at, url: p.url || undefined, _hasPhoto: true }; });
    if(o2.pa && o2.pa.length) o2.pa = o2.pa.map(function(p){ return { id: p.id, name: p.name, at: p.at, url: p.url || undefined, _hasPhoto: true }; });
    if(o2.approvedBy && LEGACY_AP[o2.approvedBy]) o2.approvedBy = LEGACY_AP[o2.approvedBy];
    if(o2.clientApprovedBy && LEGACY_AP[o2.clientApprovedBy]) o2.clientApprovedBy = LEGACY_AP[o2.clientApprovedBy];
    return o2;
  });
}
/* restorePhotos: after loading from cloud, merge back local photo src data
   for observations this device has cached. Photos from other devices remain as metadata only. */
function restorePhotos(cloudArr, localArr){
  if(!localArr || !localArr.length) return cloudArr;
  var localMap = {};
  localArr.forEach(function(o){ if(o.id) localMap[o.id] = o; });
  return cloudArr.map(function(o){
    var loc = localMap[o.id];
    if(!loc) return o;
    var o2 = Object.assign({}, o);
    /* Restore before-photos if cloud has stripped them but local has src */
    if(o2.pb && o2.pb.length && loc.pb && loc.pb.length){
      o2.pb = o2.pb.map(function(cp, i){
        var lp = loc.pb[i];
        return (lp && lp.src) ? Object.assign({}, cp, { src: lp.src }) : cp;
      });
    }
    /* Restore after-photos */
    if(o2.pa && o2.pa.length && loc.pa && loc.pa.length){
      o2.pa = o2.pa.map(function(cp, i){
        var lp = loc.pa[i];
        return (lp && lp.src) ? Object.assign({}, cp, { src: lp.src }) : cp;
      });
    }
    return o2;
  });
}
function cloudSave(arr){
  if(!cloudOn()) return Promise.resolve(false);
  var base = CLOUD.url.replace(/\/$/,"") + "/rest/v1/" + CLOUD.table;
  var patchUrl = base + "?id=eq." + CLOUD.row;
  /* Strip base64 photo data before sending — keeps payload ~50 KB instead of ~10 MB.
     Photos are restored from localStorage on load. */
  var stripped = stripPhotos(arr);
  var payload = { data: stripped };
  var payloadKB = Math.round(JSON.stringify(payload).length / 1024);
  console.log("[CTPA] cloudSave PATCH →", arr.length, "obs |", payloadKB, "KB (photos stripped)");
  function fmtSupaErr(status, t){
    var p; try { p = JSON.parse(t); } catch(_){ p = null; }
    var msg = (p && (p.message || p.error)) || t.slice(0,200) || "(empty body)";
    var hint = p && p.hint ? " | Hint: " + p.hint : "";
    var code = p && p.code ? " | code: " + p.code : "";
    return "HTTP " + status + code + " | " + msg + hint;
  }
  return fetch(patchUrl, {
    method: "PATCH",
    headers: Object.assign({ "Prefer": "return=minimal" }, cloudHeaders()),
    body: JSON.stringify(payload),
    cache: "no-store"
  }).then(function(r){
    console.log("[CTPA] cloudSave PATCH ←", r.status, r.statusText);
    if(r.ok){ __lastCloudSaveErr = ""; return true; }
    return r.text().then(function(t){
      var patchErr = fmtSupaErr(r.status, t);
      console.error("[CTPA] cloudSave PATCH failed:", patchErr);
      /* PATCH failed — try POST upsert as fallback (row may not exist yet) */
      var upsertUrl = base + "?on_conflict=id";
      return fetch(upsertUrl, {
        method: "POST",
        headers: Object.assign({ "Prefer": "resolution=merge-duplicates,return=minimal" }, cloudHeaders()),
        body: JSON.stringify([{ id: CLOUD.row, data: arr }]),
        cache: "no-store"
      }).then(function(r2){
        console.log("[CTPA] cloudSave POST ←", r2.status, r2.statusText);
        if(r2.ok){ __lastCloudSaveErr = ""; return true; }
        return r2.text().then(function(t2){
          var postErr = fmtSupaErr(r2.status, t2);
          console.error("[CTPA] cloudSave POST failed:", postErr);
          __lastCloudSaveErr = "PATCH: " + patchErr + " | POST: " + postErr;
          return false;
        });
      });
    });
  }).catch(function(e){
    var msg = "Network error: " + (e && e.message || "unknown");
    console.error("[CTPA] cloudSave NETWORK ERROR:", msg, e);
    __lastCloudSaveErr = msg;
    return false;
  });
}

/* cloudMergeSave: read current cloud data → merge localArr into it → write back.
   Prevents one device from overwriting observations added by other devices.
   Merge rule: localArr is authoritative for obs IDs it contains (edits/deletes/status).
   Cloud obs with IDs not in localArr are preserved (added by other devices).
   deletedIds: array of obs IDs intentionally deleted — NEVER re-added from cloud. */
function cloudMergeSave(localArr, deletedIds){
  if(!cloudOn()) return Promise.resolve({ ok: false, merged: localArr });
  var delSet = {};
  (deletedIds || []).forEach(function(id){ if(id) delSet[id] = true; });
  console.log("[CTPA] cloudMergeSave start | local obs:", localArr.length, "| deletedIds:", Object.keys(delSet));
  return cloudLoad().then(function(row){
    var cloudArr = (row && row.data && Array.isArray(row.data)) ? row.data : [];
    console.log("[CTPA] cloudMergeSave | cloud obs:", cloudArr.length);
    /* Build ID set from localArr */
    var localIdSet = {};
    localArr.forEach(function(o){ if(o.id) localIdSet[o.id] = true; });
    /* Keep cloud obs whose IDs are not present in localArr AND were not intentionally deleted */
    var cloudOnly = cloudArr.filter(function(o){ return o.id && !localIdSet[o.id] && !delSet[o.id] && !o.deleted; });
    /* Merged = local (authoritative for touched obs) + cloudOnly (other devices' new obs) */
    var merged = localArr.concat(cloudOnly);
    /* Sort by OBS number descending so newest appear first */
    merged.sort(function(a,b){
      var na = parseInt((a.id||"").replace(/[^0-9]/g,""),10)||0;
      var nb = parseInt((b.id||"").replace(/[^0-9]/g,""),10)||0;
      return nb - na;
    });
    console.log("[CTPA] cloudMergeSave | merged obs:", merged.length,
      "(local:", localArr.length, "+ cloud-only:", cloudOnly.length, ")");
    return cloudSave(merged).then(function(ok){
      return { ok: ok, merged: merged };
    });
  }).catch(function(e){
    console.error("[CTPA] cloudMergeSave ERROR:", e && e.message);
    /* Fall back to direct save so data is not lost */
    return cloudSave(localArr).then(function(ok){
      return { ok: ok, merged: localArr };
    });
  });
}

/* directDeleteFromCloud: read fresh from Supabase → remove obs → direct PATCH → verify.
   Uses raw fetch (not cloudSave) so we can inspect full HTTP response body on failure.
   Returns { ok, before, after, patchStatus, patchBody, verified, err } */
function directDeleteFromCloud(id){
  if(!cloudOn()) return Promise.resolve({ ok: false, err: "Cloud not configured" });
  var base = CLOUD.url.replace(/\/$/,"") + "/rest/v1/" + CLOUD.table;
  var patchUrl = base + "?id=eq." + CLOUD.row;
  var verifyUrl = base + "?id=eq." + CLOUD.row + "&select=data";
  var hdrs = cloudHeaders();

  console.log("[DELETE] ── Starting delete for:", id, "──");
  console.log("[DELETE] Supabase URL:", patchUrl.replace(CLOUD.url, "<supabase>"));

  /* Step 1: Read current data */
  return fetch(verifyUrl, { headers: hdrs, cache: "no-store" })
    .then(function(r){ return r.json(); })
    .then(function(rows){
      var arr = (rows && rows[0] && Array.isArray(rows[0].data)) ? rows[0].data : [];
      var before = arr.length;
      var found = arr.some(function(o){ return o.id === id; });
      console.log("[DELETE] Step 1 READ: Supabase has", before, "obs | target", id, found ? "FOUND ✅" : "NOT FOUND ⚠️");

      if(!found){
        console.warn("[DELETE]", id, "not in Supabase — already gone");
        return { ok: true, before: before, after: before, verified: true, alreadyGone: true, finalArr: arr };
      }

      /* Step 2: Build soft-deleted array (mark target deleted, strip photo src) */
      var now = new Date().toISOString();
      var filtered = arr.map(function(o){
        if(o.id !== id) return o;
        return Object.assign({}, o, { deleted: true, deletedAt: now, deletedBy: ctpaUser() || "Anonymous" });
      });
      var stripped = stripPhotos(filtered);
      var payloadStr = JSON.stringify({ data: stripped });
      console.log("[DELETE] Step 2 PATCH (soft-delete): marking", id, "as deleted | total obs:", filtered.length, "(" + Math.round(payloadStr.length/1024) + " KB)");

      /* Step 3: PATCH with return=minimal (same as cloudSave — avoids RLS SELECT requirement).
         Falls back to POST upsert if PATCH fails, matching cloudSave behaviour. */
      function doWriteAndVerify(writePromise){
        return writePromise.then(function(wOk){
          if(!wOk){
            return { ok: false, before: before, after: filtered.length, verified: false,
              err: "Both PATCH and POST upsert failed — check Supabase RLS UPDATE policy for ctpa_state." };
          }
          /* Step 4: Verify — read back and confirm soft-delete flag is present */
          return fetch(verifyUrl, { headers: hdrs, cache: "no-store" })
            .then(function(r2){ return r2.json(); })
            .then(function(rows2){
              var arr2 = (rows2 && rows2[0] && Array.isArray(rows2[0].data)) ? rows2[0].data : [];
              var target2 = arr2.find(function(o){ return o.id === id; });
              var isDeleted = target2 && target2.deleted === true;
              console.log("[DELETE] Step 4 VERIFY: Supabase has", arr2.length, "obs |",
                id, isDeleted ? "SOFT-DELETED ✅" : "NOT MARKED DELETED ❌");
              if(!isDeleted){
                return { ok: false, before: before, after: arr2.length, verified: false,
                  err: id + " not marked deleted after write — RLS may be blocking update." };
              }
              return { ok: true, before: before, after: arr2.length, verified: true, finalArr: arr2 };
            });
        });
      }

      var patchPromise = fetch(patchUrl, {
        method: "PATCH",
        headers: Object.assign({ "Content-Type": "application/json", "Prefer": "return=minimal" }, hdrs),
        body: payloadStr,
        cache: "no-store"
      }).then(function(r){
        console.log("[DELETE] Step 3 PATCH response: HTTP", r.status);
        if(r.ok) return true;
        return r.text().then(function(t){
          console.warn("[DELETE] PATCH failed HTTP", r.status, t.slice(0,200), "— trying POST upsert fallback");
          /* Fallback: POST upsert (same as cloudSave) */
          var upsertUrl = CLOUD.url.replace(/\/$/,"") + "/rest/v1/" + CLOUD.table + "?on_conflict=id";
          return fetch(upsertUrl, {
            method: "POST",
            headers: Object.assign({ "Content-Type": "application/json", "Prefer": "resolution=merge-duplicates,return=minimal" }, hdrs),
            body: JSON.stringify([{ id: CLOUD.row, data: stripped }]),
            cache: "no-store"
          }).then(function(r2){
            console.log("[DELETE] Step 3 POST upsert response: HTTP", r2.status);
            return r2.ok;
          });
        });
      });
      return doWriteAndVerify(patchPromise);
    }).catch(function(e){
      var msg = (e && e.message) || "Network error";
      console.error("[DELETE] directDeleteFromCloud error:", msg, e);
      return { ok: false, err: msg };
    });
}

/* ===== Supabase Realtime — WebSocket subscription for instant cross-device sync =====
   When any device saves to ctpa_state, Supabase emits a postgres_changes event.
   This device receives it and immediately calls pull() — no page refresh needed.
   Falls back to polling if WebSocket fails. */
function startRealtime(onUpdate) {
  if(!cloudOn()) return function(){};
  var wsUrl = CLOUD.url.replace(/^https?:\/\//, function(m){ return m === "https://" ? "wss://" : "ws://"; }) +
              "/realtime/v1/websocket?apikey=" + encodeURIComponent(CLOUD.key) + "&vsn=1.0.0";
  var ws, heartbeatIv, reconnectT, dead = false;

  function connect() {
    try { ws = new WebSocket(wsUrl); } catch(e) { return; }

    ws.onopen = function() {
      console.log("[CTPA] Realtime connected");
      /* Subscribe to all changes on ctpa_state table */
      ws.send(JSON.stringify({
        topic: "realtime:public:ctpa_state",
        event: "phx_join",
        payload: {
          config: {
            broadcast: { self: false },
            presence: { key: "" },
            postgres_changes: [{ event: "*", schema: "public", table: "ctpa_state" }]
          },
          access_token: CLOUD.key
        },
        ref: "1"
      }));
      /* Heartbeat every 25s to keep connection alive */
      clearInterval(heartbeatIv);
      heartbeatIv = setInterval(function(){
        if(ws && ws.readyState === 1) ws.send(JSON.stringify({ topic: "phoenix", event: "heartbeat", payload: {}, ref: null }));
      }, 25000);
    };

    ws.onmessage = function(e) {
      try {
        var msg = JSON.parse(e.data);
        /* postgres_changes event = another device saved data */
        if(msg.event === "postgres_changes") {
          console.log("[CTPA] Realtime: ctpa_state changed →", msg.payload && msg.payload.data && msg.payload.data.type);
          onUpdate();
        }
      } catch(_) {}
    };

    ws.onclose = function(ev) {
      clearInterval(heartbeatIv);
      if(dead) return;
      console.log("[CTPA] Realtime disconnected (code " + ev.code + "), reconnecting in 8s");
      reconnectT = setTimeout(connect, 8000);
    };

    ws.onerror = function() { try { ws.close(); } catch(_){} };
  }

  connect();
  return function() { dead = true; clearInterval(heartbeatIv); clearTimeout(reconnectT); try { ws && ws.close(); } catch(_){} };
}

/* ===== Activity / visit log (separate Supabase table: ctpa_log) ===== */
/* local fallback buffer so the activity log still shows events even when the
   cloud table is unreachable or blocked by RLS policies */
function logLocalPush(rec){
  try{
    var arr = JSON.parse(localStorage.getItem("ctpa_log_local") || "[]");
    if(!Array.isArray(arr)) arr = [];
    arr.unshift(rec);
    if(arr.length > 300) arr = arr.slice(0, 300);
    localStorage.setItem("ctpa_log_local", JSON.stringify(arr));
  }catch(e){}
}
function logLocalGet(){
  try{ var a = JSON.parse(localStorage.getItem("ctpa_log_local") || "[]"); return Array.isArray(a) ? a : []; }catch(e){ return []; }
}
function logEvent(action, obsId, detail){
  /* ctpa_log.obs_id has a FK constraint — storing a non-existent ID causes
     HTTP 409. Work around by keeping obs_id null and prepending the ID to
     detail as "OBS-NNN :: rest of detail" so the display can extract it. */
  var detailWithId = obsId ? (obsId + " :: " + (detail || "")) : (detail || null);
  var rec = {
    site: CLOUD.row,
    who: ctpaUser() || "Anonymous",
    action: action,
    obs_id: null,
    detail: detailWithId,
    device: ctpaDevice(),
    at: new Date().toISOString()
  };
  logLocalPush(rec);
  if(!cloudOn()) return Promise.resolve(false);
  var u = CLOUD.url.replace(/\/$/,"") + "/rest/v1/ctpa_log";
  return fetch(u, {
    method: "POST",
    headers: Object.assign({ "Prefer": "return=minimal" }, cloudHeaders()),
    body: JSON.stringify([rec])
  }).then(function(r){ return r.ok; }).catch(function(){ return false; });
}

/* Display transform: map legacy approver codes to current role labels.
   "MS" was used in seed/early data; current label is "GC". */
function fmtApprover(name){
  if(!name) return name;
  var map = { "MS": "GC", "DAYONE": "GC" };
  return map[name] || name;

function obsContext(o){
  if(!o) return "";
  var typeLabel = (OBS_TYPE[o.obsType] || {}).label || o.obsType || "";
  var pz = parseZone(o.zone || "");
  var area = (pz.area === "Other" ? pz.other : pz.area) || o.zone || "";
  var desc = (o.desc || "").slice(0, 80) + ((o.desc || "").length > 80 ? "…" : "");
  return [typeLabel, area, desc].filter(Boolean).join(" | ");
}
function logLoad(limit){
  /* Activity Log is Supabase-only (single source of truth).
     localStorage is only a write buffer \u2014 never shown in the UI.
     If cloud is unreachable, return empty rows + error message. */
  if(!cloudOn()) return Promise.resolve({ rows: [], error: "Cloud not configured \u2014 no Supabase URL/key set." });
  /* Server-side ORDER BY at DESC so all clients always see the same ordered list */
  var u = CLOUD.url.replace(/\/$/,"") + "/rest/v1/ctpa_log" +
          "?site=eq." + encodeURIComponent(CLOUD.row) +
          "&select=*" +
          "&order=at.desc" +
          "&limit=" + (limit || 300);
  return fetch(u, { headers: cloudHeaders(), cache: "no-store" })
    .then(function(r){
      if(!r.ok){ return r.text().then(function(t){ throw new Error("HTTP " + r.status + (t ? (" \u2014 " + t.slice(0,140)) : "")); }); }
      return r.json();
    })
    .then(function(rows){ return { rows: rows || [], error: null }; })
    .catch(function(e){ return { rows: [], error: (e && e.message) || "network error" }; });
}

/* ===== Closure Approval Workflow =====
   approvalStatus is the canonical workflow field. The legacy `status`
   field is kept in sync so all existing UI (KPIs, donut, export, print,
   overdue logic, badges) keeps working unchanged. */
var APPROVAL = {
  "OPEN":                  { label: "OPEN",                  color: C.red,   bg: C.redBg,   text: C.redDk   },
  "PENDING REVIEW":        { label: "PENDING VERIFY",        color: C.amber, bg: C.amberBg, text: C.amberDk },
  "PENDING PMC APPROVAL":  { label: "PENDING PMC APPROVAL",  color: C.blue,  bg: C.blueBg,  text: C.blueDk  },
  "APPROVED CLOSED":       { label: "APPROVED CLOSED",       color: C.green, bg: C.greenBg, text: C.greenDk },
  "REJECTED":              { label: "REJECTED",              color: C.red,   bg: C.redBg,   text: C.redDk   }
};
/* ===== APPROVAL WORKFLOW ENABLED ===== */
var APPROVAL_ENABLED = true;
/* derive the workflow status of an observation, defaulting from legacy `status` */
function apOf(o) {
  if (!APPROVAL_ENABLED) return null;
  if (o && o.approvalStatus && APPROVAL[o.approvalStatus]) return o.approvalStatus;
  if (!o) return "OPEN";
  if (o.status === "CLOSED") return "APPROVED CLOSED";
  if (o.status === "PENDING_VERIFY") return "PENDING REVIEW";
  return "OPEN"; // OPEN and IN_PROGRESS are both treated as not-closed / open
}
/* one-time, non-destructive migration: ensures every record carries the new
   approval fields without altering existing data. Existing CLOSED -> APPROVED
   CLOSED; existing OPEN stays OPEN. Run on every load (idempotent). */
function ctpaMigrate(arr) {
  if (!Array.isArray(arr)) return arr;
  return arr.filter(function(o){ return !o || !o.deleted; }).map(function (o) {
    if (!o || typeof o !== "object") return o;
    /* normalise Excel-imported obs fields to match app format */
    if (!o.obsType && o.type) {
      o = Object.assign({}, o, {
        obsType: o.type === "Unsafe Act" ? "UNSAFE_ACT" : "UNSAFE_CON",
        risk: o.severity === "High" ? "MAJOR" : o.severity === "Medium" ? "SERIOUS" : "MINOR",
        desc: o.desc || o.detail || "",
        rect: o.rect || o.correctiveAction || "",
        by: o.by || o.createdBy || "",
        cat: o.cat || o.category || "",

    dataLine(18,"Unsafe Act",nUA);
    dataLine(19,"Unsafe Condition",nUC);
    dataLine(20,"Good Observation",nGO);

    /* ═══ Data sheets ═══ */
    buildSheet("Observation Log", rows);
    buildSheet("Open Items", rows.filter(function(o){ return o.status !== "CLOSED"; }));
    buildSheet("Closed Items", rows.filter(function(o){ return o.status === "CLOSED"; }));

    /* ── download ── */
    var fileName = "CTPA_Observation_Report_" + dateStr + ".xlsx";
    return wb.xlsx.writeBuffer().then(function(buf){
      var blob = new Blob([buf], { type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
      var a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = fileName;
      document.body.appendChild(a); a.click();
      setTimeout(function(){ URL.revokeObjectURL(a.href); document.body.removeChild(a); }, 1500);
      console.log("[CTPA] exportExcel: wrote", fileName, "| rows:", rows.length, "| images:", Object.keys(imgId).length);
    });
  }).catch(function(e){
    var errMsg = "Excel export failed: " + (e && e.message ? e.message : String(e));
    console.error("[CTPA] exportExcel ERROR:", e);
    if (onErr) onErr(errMsg); else alert(errMsg);
  });
}

div></div>\n<div class=\"kb\"><div class=\"kn\">").concat(rows.length, "</div><div class=\"kl\">Total</div></div>\n</div>\n<div style=\"text-align:right;margin-bottom:8px\">\n<button onclick=\"window.print()\" style=\"background:#10B981;color:#fff;border:none;padding:6px 16px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;margin-right:6px\">Print / PDF</button>\n<button onclick=\"window.close()\" style=\"background:#fff;color:#475569;border:1px solid #E2E8F0;padding:6px 12px;border-radius:6px;font-size:11px;cursor:pointer\">Close</button>\n</div>\n<table><thead><tr>\n<th>ID</th><th>Date</th><th>Zone</th><th>Responsible Company</th><th>Category</th><th>OBS Type</th><th>Description</th><th>Risk</th><th>Status</th><th>Due</th><th>Closed</th><th>Photo</th>\n</tr></thead><tbody>").concat(tr, "</tbody></table>\n<div class=\"f\"><span>").concat(PROJECT, " \xB7 EHS Register</span><span>").concat(now, " \xB7 ").concat(rows.length, " records</span></div>\n</body></html>");

/* ── WEEKLY REPORT GENERATOR ──────────────────── */
var RPT_GREEN  = "00CC79";
var RPT_DARK   = "0A3D2B";
var RPT_RED    = "EF4444";
var RPT_AMBER  = "F59E0B";
var RPT_TEXT   = "0F172A";
var RPT_GRAY   = "64748B";
var RPT_LIGHT  = "F8FAFC";
var RPT_BORDER = "E2E8F0";

function rptNow() {
  return new Date().toLocaleDateString("en-GB", {day:"2-digit", month:"short", year:"numeric"});
}
function rptFilterObs(rows, dateFrom, dateTo) {
  return rows.filter(function(o) {
    if (!o.date) return false;
    if (dateFrom && o.date < dateFrom) return false;
    if (dateTo   && o.date > dateTo)   return false;
    return true;
  });
}

/* ── PowerPoint (.pptx) ── */
function generateWeeklyReportPPT(rows, dateFrom, dateTo) {
  if (!window.PptxGenJS) { alert("PptxGenJS library not loaded. Check your internet connection."); return; }

  fetchPhotosForExport(rows).then(function(){ _doGeneratePPT(rows, dateFrom, dateTo); });
}

    var detY = 0.82;

  /* ── CONTRACTOR PERFORMANCE ── */

  var ctKeys = Object.keys(contMap).sort();

        { text:String(d.overdue), options:{ align:"center", fill:{ color:bg }, color:d.overdue> 0 ? RED : RPT_TEXT, bold:d.overdue> 0, fontSize:10, fontFace:"Arial" } },
        { text:pct + "%",         options:{ align:"center", fill:{ color:bg }, color:pctC,     bold:true,           fontSize:10, fontFace:"Arial" } }

    cs.addTable(ctData, {

/* ── REPORT VIEW COMPONENT ── */
function ReportView(props) {
  var obs = props.obs || [];

  /* default date range: Mon–today of current week */
  function thisMonday() {
    var d = new Date(), dow = d.getDay();
    var mon = new Date(d); mon.setDate(d.getDate() - (dow === 0 ? 6 : dow - 1));
    return mon.toISOString().slice(0,10);
  }
  var _df  = React.useState(thisMonday());
  var dateFrom = _df[0], setDateFrom = _df[1];
  var _dt  = React.useState(td());
  var dateTo   = _dt[0], setDateTo   = _dt[1];
  var _gen = React.useState(false);
  var generating    = _gen[0], setGenerating    = _gen[1];
  var _gPdf = React.useState(false);
  var generatingPdf = _gPdf[0], setGeneratingPdf = _gPdf[1];

  /* available weeks for quick-select buttons */
  var weeks = React.useMemo(function() {
    var ws = {};
    obs.forEach(function(o){ if (o.week) ws[o.week] = true; });
    return Object.keys(ws).sort();
  }, [obs]);

  var filtered = React.useMemo(function() {
    return rptFilterObs(obs, dateFrom, dateTo);
  }, [obs, dateFrom, dateTo]);

  var totalF   = filtered.length;
  var openF    = filtered.filter(function(o){ return o.status==="OPEN"; }).length;
  var closedF  = filtered.filter(function(o){ return o.status==="CLOSED"; }).length;
  var overdueF = filtered.filter(function(o){ return isOD(o); }).length;
  var seriousF = filtered.filter(function(o){ return o.risk==="SERIOUS"&&o.status!=="CLOSED"; }).length;
  var photosF  = filtered.filter(function(o){ return (o.pb&&o.pb.length)||(o.pa&&o.pa.length); }).length;

  function setWeekRange(wk) {
    var wDates = obs.filter(function(o){ return o.week===wk&&o.date; }).map(function(o){ return o.date; }).sort();
    if (wDates.length) { setDateFrom(wDates[0]); setDateTo(wDates[wDates.length-1]); }
  }

  function handlePPT() {
    if (!totalF) { alert("No observations in the selected date range."); return; }
    setGenerating(true);
    setTimeout(function() {
      try { generateWeeklyReportPPT(filtered, dateFrom, dateTo); }
      catch(e) { console.error(e); alert("PowerPoint generation failed: " + e.message); }
      setGenerating(false);
    }, 80);
  }
  function handlePDF() {
    if (!totalF) { alert("No observations in the selected date range."); return; }
    setGeneratingPdf(true);
    setTimeout(function() {
      try { generateWeeklyReportPDF(filtered, dateFrom, dateTo); }
      catch(e) { console.error(e); alert("PDF generation failed: " + e.message); }
      setGeneratingPdf(false);
    }, 80);

  function mapExcelRow(raw) {
    var obsType = pickCol(raw, ["obsType","observation type","type","obs type"]);
    if (obsType === "Unsafe Act" || obsType === "UNSAFE_ACT" || /unsafe.?act/i.test(obsType)) obsType = "UNSAFE_ACT";
    else if (/unsafe.?con/i.test(obsType) || obsType === "UNSAFE_CON") obsType = "UNSAFE_CON";
    else if (/good/i.test(obsType) || obsType === "GOOD_OBS") obsType = "GOOD_OBS";

    var risk = pickCol(raw, ["risk","risk level","severity","riskLevel"]);
    if (/^(high|major)$/i.test(risk)) risk = "MAJOR";
    else if (/^(medium|serious)$/i.test(risk)) risk = "SERIOUS";
    else if (/^(low|minor)$/i.test(risk)) risk = "MINOR";

    var status = pickCol(raw, ["status"]);
    if (/^(open|pending)$/i.test(status)) status = "OPEN";
    else if (/^closed$/i.test(status)) status = "CLOSED";
    else status = "OPEN";

    return {
      obsType:  obsType,
      risk:     risk,
      status:   status,
      desc:     pickCol(raw, ["desc","description","detail","finding","observation"]),
      rect:     pickCol(raw, ["rect","rectification","corrective action","correctiveAction","action"]),
      by:       pickCol(raw, ["by","inspector","created by","createdBy","raised by"]),
      cat:      pickCol(raw, ["cat","category"]),
      fc:       pickCol(raw, ["fc","finding category","findingCategory","finding type"]),
      date:     fixDateFormat(pickCol(raw, ["date","observation date","ts","created","created date"])),

      closed:   fixDateFormat(pickCol(raw, ["closed","close date","closedAt","closed date","completion date"])),

  function validateMappedRow(o, rowNum) {
    var errs = [];
    /* Required */
    ["obsType","risk","status","desc","date","cat","fc","week"].forEach(function(f){
      if (!o[f]) errs.push("Row " + rowNum + ": missing '" + f + "'");
    });
    /* Enums */
    if (o.obsType && ["UNSAFE_ACT","UNSAFE_CON","GOOD_OBS"].indexOf(o.obsType) === -1)
      errs.push("Row " + rowNum + ": obsType='" + o.obsType + "' invalid (Unsafe Act / Unsafe Condition / Good Observation)");
    if (o.risk && ["MAJOR","SERIOUS","MINOR"].indexOf(o.risk) === -1)
      errs.push("Row " + rowNum + ": risk='" + o.risk + "' invalid (High/MAJOR · Medium/SERIOUS · Low/MINOR)");
    if (o.status && ["OPEN","CLOSED"].indexOf(o.status) === -1)
      errs.push("Row " + rowNum + ": status='" + o.status + "' invalid (Open / Closed)");

  function fixDateFormat(d) {
    if (!d) return "";
    /* DD/MM/YYYY → YYYY-MM-DD */
    var m = (d + "").match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
    if (m) return m[3] + "-" + m[2] + "-" + m[1];

    /* Enum checks */

      errors.push("Row " + rowIdx + ": invalid obsType '" + o.obsType + "' (must be UNSAFE_ACT / UNSAFE_CON / GOOD_OBS)");
    if (o.risk && VALID_RISKS.indexOf(o.risk) === -1)

    if (o.status && VALID_STATUSES.indexOf(o.status) === -1)
      errors.push("Row " + rowIdx + ": invalid status '" + o.status + "' (must be OPEN / CLOSED)");
