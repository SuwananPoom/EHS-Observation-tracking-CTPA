*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#F0F4F8;min-height:100vh;color:#0F172A}
input,select,textarea,button{font-family:'Inter',sans-serif}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#F0F4F8}
::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:6px}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .25s ease}
html,body{max-width:100%;overflow-x:hidden;-webkit-text-size-adjust:100%}
@media(max-width:820px){
  /* prevent any horizontal overflow */
  #root,#root *{max-width:100%}
  /* header: allow it to grow and wrap instead of squashing */
  .topbar{height:auto!important;min-height:58px;flex-wrap:wrap;gap:8px;padding:10px 14px!important;padding-left:calc(14px + env(safe-area-inset-left))!important;padding-right:calc(14px + env(safe-area-inset-right))!important}
  .topbar-brand{flex:1 1 100%}
  /* action buttons row: wrap + full width so nothing overflows */
  .topbar-actions{flex-wrap:wrap!important;width:100%!important;gap:6px!important}
  /* every form/card grid becomes ONE column: each field on its own line */
  .grid3,.grid2{grid-template-columns:1fr!important;gap:12px!important}
  [style*="grid-template-columns"]:not(.kpigrid){grid-template-columns:1fr!important;gap:12px!important}
  /* only the small dashboard KPI tiles stay 2-up (compact) */
  .kpigrid{grid-template-columns:1fr 1fr!important;gap:8px!important}
  .kpigrid>div{padding:10px 11px!important;border-radius:11px!important}
  .kpigrid>div>div:nth-child(2){font-size:21px!important}
  .hidesm{display:none!important}
  .navbtn{padding:6px 10px!important;font-size:11px!important}
  /* inputs: full width, border-box, 16px to stop iOS auto-zoom */
  input,select,textarea{font-size:16px!important;width:100%!important;box-sizing:border-box!important;max-width:100%}
  /* tables scroll horizontally inside their own box instead of pushing the page */
  table{display:block;width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch}
  button{touch-action:manipulation}
  img{max-width:100%;height:auto}
}
/* ≤430px: tighten button padding so all 7 buttons fit in 2 rows comfortably */
@media(max-width:430px){
  .navbtn{padding:6px 8px!important;font-size:10px!important}
  .topbar-actions button{font-size:10px!important;padding:6px 8px!important}
}
/* ≤390px: further tighten */
@media(max-width:390px){
  .navbtn{padding:5px 7px!important;font-size:10px!important}
  .topbar-actions button{font-size:10px!important;padding:5px 7px!important}
}
/* ≤360px: smallest phones — nav buttons go 2-per-row, action buttons stack */
@media(max-width:360px){
  .navbtn{padding:5px 6px!important;font-size:9px!important;flex:1 1 calc(50% - 6px)!important}
  .topbar-actions button{font-size:9px!important;padding:5px 6px!important;flex:1 1 calc(50% - 6px)!important}
}
</style>

/* Convert a data: URI to a Blob for binary upload */
function dataUriToBlob(dataUri){
  try {
    var comma = dataUri.indexOf(",");
    var meta = dataUri.slice(0, comma);
    var b64 = dataUri.slice(comma + 1);
    var mime = (meta.match(/data:([^;]+)/) || [])[1] || "image/jpeg";
    var bin = atob(b64), len = bin.length, bytes = new Uint8Array(len);
    for(var i=0;i<len;i++) bytes[i] = bin.charCodeAt(i);
    return new Blob([bytes], { type: mime });
  } catch(e){ console.warn("[CTPA] dataUriToBlob failed:", e && e.message); return null; }
}
/* Last Storage upload failure detail (HTTP status + message) — shown by Sync Photos. */
var __lastStorageErr = "";
function explainStorageErr(status, body){
  var msg; try { var p = JSON.parse(body); msg = p.message || p.error || body; } catch(_){ msg = body; }
  msg = (msg || "").slice(0, 160);
  if(status === 404) return "404 Bucket not found — create a PUBLIC bucket named 'ctpa-photos' in Supabase → Storage.";
  if(status === 403 || status === 401) return status + " Not allowed — add the storage.objects INSERT policy (see setup SQL). " + msg;
  if(status === 400 && /row-level security|policy/i.test(msg)) return "400 RLS policy missing — run the storage.objects policies SQL. " + msg;
  return "HTTP " + status + " — " + msg;
}
/* Upload one photo's image to Storage. Resolves to its public URL, or null on failure. */
function uploadPhotoToStorage(obsId, slot, idx, photo){
  if(!cloudOn() || !photo || !photo.src) return Promise.resolve(null);
  if(photo.src.indexOf("data:") !== 0) return Promise.resolve(null); /* already a URL */
  var blob = dataUriToBlob(photo.src);
  if(!blob){ __lastStorageErr = "Could not decode photo data (invalid base64)."; return Promise.resolve(null); }
  var path = storageObjectPath(obsId, slot, idx);
  var url = CLOUD.url.replace(/\/$/,"") + "/storage/v1/object/" + CLOUD.bucket + "/" + path.split("/").map(encodeURIComponent).join("/");
  return fetch(url, {
    method: "POST",
    headers: { "apikey": CLOUD.key, "Authorization": "Bearer " + CLOUD.key, "Content-Type": blob.type || "image/jpeg", "x-upsert": "true" },
    body: blob
  }).then(function(r){
    if(r.ok){ __lastStorageErr = ""; return storagePublicUrl(path); }
    return r.text().then(function(t){
      __lastStorageErr = explainStorageErr(r.status, t);
      console.warn("[CTPA] Storage upload failed:", r.status, t.slice(0,200), "| URL:", url);
      return null;
    });
  }).catch(function(e){
    __lastStorageErr = "Network/CORS error: " + ((e && e.message) || "unknown");
    console.warn("[CTPA] Storage upload error:", e && e.message);
    return null;
  });
}

/* Save one photo: cache locally → upload to Storage (primary) → ctpa_photos table (fallback).
   Resolves to the Storage public URL (string) when available, else null. */
function savePhotoToCloud(obsId, slot, idx, photo){

  if(photo && photo.src) cachePhotoLocal(obsId, slot, idx, photo.src);
  if(!cloudOn() || !photo || !photo.src) return Promise.resolve(null);
  /* If the photo is already a Storage URL, nothing to upload */
  if(photo.src.indexOf("data:") !== 0 && /^https?:/.test(photo.src)) return Promise.resolve(photo.src);
  return uploadPhotoToStorage(obsId, slot, idx, photo).then(function(storageUrl){
    /* Also write base64 to ctpa_photos table as a fallback (best-effort, fire-and-forget) */
    savePhotoToTable(obsId, slot, idx, photo);
    return storageUrl;
  });
}

/* Save one photo's base64 to ctpa_photos table (upsert by site+obs_id+slot+idx) */

function photoLocalKey(obsId, slot, idx){ return PH_PREFIX + obsId + "|" + slot + "|" + idx; }

function getCachedPhotoSrc(obsId, slot, idx){

/* Displayable image source for a photo object: prefer the cross-device Storage URL,
   then a local/base64 src. Returns null when nothing is loadable (show warning). */
function photoSrc(p){

/* Merge individually-cached photos back into an obs array.
   Called after restorePhotos so same-device photos always display. */
function mergeLocalPhotoCache(obsArr){
  return obsArr.map(function(o){
    var changed = false;
    var nb = (o.pb||[]).map(function(p, i){
      if(p && (!p.src || p.src.length < 32)){
        var cached = getCachedPhotoSrc(o.id, "pb", i);
        if(cached){ changed = true; return Object.assign({}, p, { src: cached }); }
      }
      return p;
    });
    var na = (o.pa||[]).map(function(p, i){
      if(p && (!p.src || p.src.length < 32)){
        var cached = getCachedPhotoSrc(o.id, "pa", i);
        if(cached){ changed = true; return Object.assign({}, p, { src: cached }); }
      }

    });
    return changed ? Object.assign({}, o, { pb: nb, pa: na }) : o;

/* Fetch a public URL and convert it to a base64 data URI (for PDF/PPT embedding). */
function urlToDataUri(url){
  return fetch(url, { cache: "no-store" })
    .then(function(r){ if(!r.ok) throw new Error("HTTP " + r.status); return r.blob(); })
    .then(function(blob){
      return new Promise(function(res, rej){
        var fr = new FileReader();
        fr.onload = function(){ res(fr.result); };
        fr.onerror = rej;
        fr.readAsDataURL(blob);
      });
    });
}

/* Before generating PDF/PPTX, fill in base64 src for any photo that lacks it.

   Returns the obs array (mutated in place) with src filled where possible. */
function fetchPhotosForExport(obsArr){
  if(!cloudOn()) return Promise.resolve(obsArr);
  /* obs IDs with photos lacking base64 src (PDF/PPT need base64 to embed) */
  var needIds = [];
  obsArr.forEach(function(o){
    var needsFetch = false;
    ["pb","pa"].forEach(function(slot){
      (o[slot] || []).forEach(function(p){
        if(p && (!p.src || p.src.length < 32)) needsFetch = true;
      });
    });
    if(needsFetch && o.id) needIds.push(o.id);
  });
  console.log("[CTPA export] fetchPhotosForExport: obs needing photo fetch:", needIds);
  if(!needIds.length) return Promise.resolve(obsArr);

  return fetchCloudPhotos(needIds).then(function(rows){
    console.log("[CTPA export] ctpa_photos rows returned:", rows.length);
    var photoMap = {};
    rows.forEach(function(r){ photoMap[r.obs_id + "|" + r.slot + "|" + r.idx] = r.src; });
    /* Pass 1: fill from ctpa_photos base64 table */
    obsArr.forEach(function(o, oi){
      ["pb","pa"].forEach(function(slot){
        (o[slot] || []).forEach(function(p, pi){
          var cloudSrc = photoMap[o.id + "|" + slot + "|" + pi];
          if(cloudSrc && cloudSrc.length > 32 && (!p.src || p.src.length < 32)){
            obsArr[oi][slot][pi] = Object.assign({}, p, { src: cloudSrc });
          }
        });
      });
    });
    /* Pass 2: anything still missing src but with a Storage url → fetch url → base64 */
    var urlJobs = [];
    obsArr.forEach(function(o, oi){
      ["pb","pa"].forEach(function(slot){
        (o[slot] || []).forEach(function(p, pi){
          var cur = obsArr[oi][slot][pi];
          if(cur && (!cur.src || cur.src.length < 32) && cur.url){
            urlJobs.push(
              urlToDataUri(cur.url).then(function(dataUri){
                obsArr[oi][slot][pi] = Object.assign({}, obsArr[oi][slot][pi], { src: dataUri });
              }).catch(function(e){ console.warn("[CTPA export] url→base64 failed", o.id, slot, pi, e && e.message); })
            );
          }
        });
      });
    });
    return Promise.all(urlJobs).then(function(){ return obsArr; });
  });
}

/* Diagnostic access — compares SHA-256 of typed password against stored hash.

    .then(function(buf){
      var hex = Array.from(new Uint8Array(buf)).map(function(b){ return b.toString(16).padStart(2,"0"); }).join("");
      return hex === DIAG_PASS_HASH;

    .catch(function(){ return false; });
}

/* stripPhotos: remove base64 src from photo arrays before sending to Supabase.
   Keeps metadata (id, name, at, count) but drops the data URI (can be 50-500 KB per photo).
   Photos are restored from localStorage when loading. Reduces payload from ~10 MB to ~50 KB. */
function stripPhotos(arr){
  var LEGACY_AP = { "MS": "GC Manager", "DAYONE": "GC Manager" };
  return arr.map(function(o){
    var o2 = Object.assign({}, o);
    /* Keep the small Storage `url` (a few bytes) so photos sync cross-device via ctpa_state.
       Only the large base64 `src` is dropped. */
    if(o2.pb && o2.pb.length) o2.pb = o2.pb.map(function(p){ return { id: p.id, name: p.name, at: p.at, url: p.url || undefined, _hasPhoto: true }; });
    if(o2.pa && o2.pa.length) o2.pa = o2.pa.map(function(p){ return { id: p.id, name: p.name, at: p.at, url: p.url || undefined, _hasPhoto: true }; });
    if(o2.approvedBy && LEGACY_AP[o2.approvedBy]) o2.approvedBy = LEGACY_AP[o2.approvedBy];
    if(o2.clientApprovedBy && LEGACY_AP[o2.clientApprovedBy]) o2.clientApprovedBy = LEGACY_AP[o2.clientApprovedBy];
    return o2;
  });
}
/* restorePhotos: after loading from cloud, merge back local photo src data
   for observations this device has cached. Photos from other devices remain as metadata only. */
function restorePhotos(cloudArr, localArr){
  if(!localArr || !localArr.length) return cloudArr;
  var localMap = {};
  localArr.forEach(function(o){ if(o.id) localMap[o.id] = o; });
  return cloudArr.map(function(o){
    var loc = localMap[o.id];
    if(!loc) return o;
    var o2 = Object.assign({}, o);
    /* Restore before-photos if cloud has stripped them but local has src */
    if(o2.pb && o2.pb.length && loc.pb && loc.pb.length){
      o2.pb = o2.pb.map(function(cp, i){
        var lp = loc.pb[i];
        return (lp && lp.src) ? Object.assign({}, cp, { src: lp.src }) : cp;
      });
    }
    /* Restore after-photos */
    if(o2.pa && o2.pa.length && loc.pa && loc.pa.length){
      o2.pa = o2.pa.map(function(cp, i){
        var lp = loc.pa[i];
        return (lp && lp.src) ? Object.assign({}, cp, { src: lp.src }) : cp;
      });
    }
    return o2;
  });
}
function cloudSave(arr){

     Photos are restored from localStorage on load. */

    var p; try { p = JSON.parse(t); } catch(_){ p = null; }

    var hint = p && p.hint ? " | Hint: " + p.hint : "";

    method: "PATCH",

        method: "POST",

        body: JSON.stringify([{ id: CLOUD.row, data: arr }]),

        if(r2.ok){ __lastCloudSaveErr = ""; return true; }
        return r2.text().then(function(t2){

  }).catch(function(e){

/* cloudMergeSave: read current cloud data → merge localArr into it → write back.
   Prevents one device from overwriting observations added by other devices.
   Merge rule: localArr is authoritative for obs IDs it contains (edits/deletes/status).
   Cloud obs with IDs not in localArr are preserved (added by other devices).
   deletedIds: array of obs IDs intentionally deleted — NEVER re-added from cloud. */
function cloudMergeSave(localArr, deletedIds){
  if(!cloudOn()) return Promise.resolve({ ok: false, merged: localArr });
  var delSet = {};
  (deletedIds || []).forEach(function(id){ if(id) delSet[id] = true; });
  console.log("[CTPA] cloudMergeSave start | local obs:", localArr.length, "| deletedIds:", Object.keys(delSet));
  return cloudLoad().then(function(row){
    var cloudArr = (row && row.data && Array.isArray(row.data)) ? row.data : [];
    console.log("[CTPA] cloudMergeSave | cloud obs:", cloudArr.length);
    /* Build ID set from localArr */
    var localIdSet = {};
    localArr.forEach(function(o){ if(o.id) localIdSet[o.id] = true; });
    /* Keep cloud obs whose IDs are not present in localArr AND were not intentionally deleted */
    var cloudOnly = cloudArr.filter(function(o){ return o.id && !localIdSet[o.id] && !delSet[o.id] && !o.deleted; });
    /* Merged = local (authoritative for touched obs) + cloudOnly (other devices' new obs) */
    var merged = localArr.concat(cloudOnly);
    /* Sort by OBS number descending so newest appear first */
    merged.sort(function(a,b){
      var na = parseInt((a.id||"").replace(/[^0-9]/g,""),10)||0;
      var nb = parseInt((b.id||"").replace(/[^0-9]/g,""),10)||0;
      return nb - na;
    });
    console.log("[CTPA] cloudMergeSave | merged obs:", merged.length,
      "(local:", localArr.length, "+ cloud-only:", cloudOnly.length, ")");
    return cloudSave(merged).then(function(ok){
      return { ok: ok, merged: merged };
    });
  }).catch(function(e){
    console.error("[CTPA] cloudMergeSave ERROR:", e && e.message);
    /* Fall back to direct save so data is not lost */
    return cloudSave(localArr).then(function(ok){
      return { ok: ok, merged: localArr };
    });
  });
}

/* directDeleteFromCloud: read fresh from Supabase → remove obs → direct PATCH → verify.
   Uses raw fetch (not cloudSave) so we can inspect full HTTP response body on failure.
   Returns { ok, before, after, patchStatus, patchBody, verified, err } */
function directDeleteFromCloud(id){
  if(!cloudOn()) return Promise.resolve({ ok: false, err: "Cloud not configured" });
  var base = CLOUD.url.replace(/\/$/,"") + "/rest/v1/" + CLOUD.table;
  var patchUrl = base + "?id=eq." + CLOUD.row;
  var verifyUrl = base + "?id=eq." + CLOUD.row + "&select=data";
  var hdrs = cloudHeaders();

  console.log("[DELETE] ── Starting delete for:", id, "──");
  console.log("[DELETE] Supabase URL:", patchUrl.replace(CLOUD.url, "<supabase>"));

  /* Step 1: Read current data */
  return fetch(verifyUrl, { headers: hdrs, cache: "no-store" })
    .then(function(r){ return r.json(); })
    .then(function(rows){
      var arr = (rows && rows[0] && Array.isArray(rows[0].data)) ? rows[0].data : [];
      var before = arr.length;
      var found = arr.some(function(o){ return o.id === id; });
      console.log("[DELETE] Step 1 READ: Supabase has", before, "obs | target", id, found ? "FOUND ✅" : "NOT FOUND ⚠️");

      if(!found){
        console.warn("[DELETE]", id, "not in Supabase — already gone");
        return { ok: true, before: before, after: before, verified: true, alreadyGone: true, finalArr: arr };
      }

      /* Step 2: Build soft-deleted array (mark target deleted, strip photo src) */
      var now = new Date().toISOString();
      var filtered = arr.map(function(o){
        if(o.id !== id) return o;
        return Object.assign({}, o, { deleted: true, deletedAt: now, deletedBy: ctpaUser() || "Anonymous" });
      });
      var stripped = stripPhotos(filtered);
      var payloadStr = JSON.stringify({ data: stripped });
      console.log("[DELETE] Step 2 PATCH (soft-delete): marking", id, "as deleted | total obs:", filtered.length, "(" + Math.round(payloadStr.length/1024) + " KB)");

      /* Step 3: PATCH with return=minimal (same as cloudSave — avoids RLS SELECT requirement).
         Falls back to POST upsert if PATCH fails, matching cloudSave behaviour. */
      function doWriteAndVerify(writePromise){
        return writePromise.then(function(wOk){
          if(!wOk){
            return { ok: false, before: before, after: filtered.length, verified: false,
              err: "Both PATCH and POST upsert failed — check Supabase RLS UPDATE policy for ctpa_state." };
          }
          /* Step 4: Verify — read back and confirm soft-delete flag is present */
          return fetch(verifyUrl, { headers: hdrs, cache: "no-store" })
            .then(function(r2){ return r2.json(); })
            .then(function(rows2){
              var arr2 = (rows2 && rows2[0] && Array.isArray(rows2[0].data)) ? rows2[0].data : [];
              var target2 = arr2.find(function(o){ return o.id === id; });
              var isDeleted = target2 && target2.deleted === true;
              console.log("[DELETE] Step 4 VERIFY: Supabase has", arr2.length, "obs |",
                id, isDeleted ? "SOFT-DELETED ✅" : "NOT MARKED DELETED ❌");
              if(!isDeleted){
                return { ok: false, before: before, after: arr2.length, verified: false,
                  err: id + " not marked deleted after write — RLS may be blocking update." };
              }
              return { ok: true, before: before, after: arr2.length, verified: true, finalArr: arr2 };
            });
        });
      }

      var patchPromise = fetch(patchUrl, {
        method: "PATCH",
        headers: Object.assign({ "Content-Type": "application/json", "Prefer": "return=minimal" }, hdrs),
        body: payloadStr,
        cache: "no-store"
      }).then(function(r){
        console.log("[DELETE] Step 3 PATCH response: HTTP", r.status);
        if(r.ok) return true;
        return r.text().then(function(t){
          console.warn("[DELETE] PATCH failed HTTP", r.status, t.slice(0,200), "— trying POST upsert fallback");
          /* Fallback: POST upsert (same as cloudSave) */
          var upsertUrl = CLOUD.url.replace(/\/$/,"") + "/rest/v1/" + CLOUD.table + "?on_conflict=id";
          return fetch(upsertUrl, {
            method: "POST",
            headers: Object.assign({ "Content-Type": "application/json", "Prefer": "resolution=merge-duplicates,return=minimal" }, hdrs),
            body: JSON.stringify([{ id: CLOUD.row, data: stripped }]),
            cache: "no-store"
          }).then(function(r2){
            console.log("[DELETE] Step 3 POST upsert response: HTTP", r2.status);
            return r2.ok;
          });
        });
      });
      return doWriteAndVerify(patchPromise);
    }).catch(function(e){
      var msg = (e && e.message) || "Network error";
      console.error("[DELETE] directDeleteFromCloud error:", msg, e);
      return { ok: false, err: msg };
    });
}

/* ===== Supabase Realtime — WebSocket subscription for instant cross-device sync =====
   When any device saves to ctpa_state, Supabase emits a postgres_changes event.
   This device receives it and immediately calls pull() — no page refresh needed.
   Falls back to polling if WebSocket fails. */
function startRealtime(onUpdate) {
  if(!cloudOn()) return function(){};
  var wsUrl = CLOUD.url.replace(/^https?:\/\//, function(m){ return m === "https://" ? "wss://" : "ws://"; }) +
              "/realtime/v1/websocket?apikey=" + encodeURIComponent(CLOUD.key) + "&vsn=1.0.0";
  var ws, heartbeatIv, reconnectT, dead = false;

  function connect() {
    try { ws = new WebSocket(wsUrl); } catch(e) { return; }

    ws.onopen = function() {
      console.log("[CTPA] Realtime connected");
      /* Subscribe to all changes on ctpa_state table */
      ws.send(JSON.stringify({
        topic: "realtime:public:ctpa_state",
        event: "phx_join",
        payload: {
          config: {
            broadcast: { self: false },
            presence: { key: "" },
            postgres_changes: [{ event: "*", schema: "public", table: "ctpa_state" }]
          },
          access_token: CLOUD.key
        },
        ref: "1"
      }));
      /* Heartbeat every 25s to keep connection alive */
      clearInterval(heartbeatIv);
      heartbeatIv = setInterval(function(){
        if(ws && ws.readyState === 1) ws.send(JSON.stringify({ topic: "phoenix", event: "heartbeat", payload: {}, ref: null }));
      }, 25000);
    };

    ws.onmessage = function(e) {
      try {
        var msg = JSON.parse(e.data);
        /* postgres_changes event = another device saved data */
        if(msg.event === "postgres_changes") {
          console.log("[CTPA] Realtime: ctpa_state changed →", msg.payload && msg.payload.data && msg.payload.data.type);
          onUpdate();
        }
      } catch(_) {}
    };

    ws.onclose = function(ev) {
      clearInterval(heartbeatIv);
      if(dead) return;
      console.log("[CTPA] Realtime disconnected (code " + ev.code + "), reconnecting in 8s");
      reconnectT = setTimeout(connect, 8000);
    };

    ws.onerror = function() { try { ws.close(); } catch(_){} };
  }

  connect();
  return function() { dead = true; clearInterval(heartbeatIv); clearTimeout(reconnectT); try { ws && ws.close(); } catch(_){} };
}

      return r(fr.result);
    };
    fr.onerror = j;
    fr.readAsDataURL(f);
  });
};
var isOD = function isOD(o) {

};
var pStat = function pStat(o) {

/* ── EXCEL (.xlsx) EXPORT — styled headers + colour-coded rows + embedded Before/After photos (ExcelJS) ── */
function exportExcel(rows, onErr, onProgress) {
  if (typeof ExcelJS === "undefined") {
    var m0 = "ExcelJS library not loaded. Check internet connection and reload the page.";
    if (onErr) onErr(m0); else alert(m0); return;
  }
  if (!rows || rows.length === 0) {
    var m1 = "No observations to export.";
    if (onErr) onErr(m1); else alert(m1); return;
  }

  var today = new Date();
  var dateStr = today.getFullYear() + "-" + String(today.getMonth()+1).padStart(2,"0") + "-" + String(today.getDate()).padStart(2,"0");
  var dateFmt = String(today.getDate()).padStart(2,"0") + "/" + String(today.getMonth()+1).padStart(2,"0") + "/" + today.getFullYear();
  var v    = function(x){ return (x==null?"":String(x)).trim() || "-"; };
  var fmtD = function(d){ if(!d) return "-"; var p=String(d).split("-"); return p.length===3 ? p[2]+"/"+p[1]+"/"+p[0] : d; };

  /* ── colour palette (ARGB) ── */
  var C = {
    navy:"FF1E3A5F", navyDk:"FF0F2744", blue:"FF1D4ED8", sub:"FFE0E7F0",
    serBg:"FFFEE2E2", serTx:"FFB91C1C", majBg:"FFFEF9C3", majTx:"FFB45309",
    minBg:"FFDCFCE7", minTx:"FF166534", openBg:"FFFFF7ED", openTx:"FFC2410C",
    closeBg:"FFF0FDF4", closeTx:"FF166534", pendBg:"FFEFF6FF", pendTx:"FF1D4ED8",
    even:"FFF8FAFC", odd:"FFFFFFFF", txt:"FF1E293B", white:"FFFFFFFF"
  };
  function fill(argb){ return {type:"pattern",pattern:"solid",fgColor:{argb:argb}}; }
  var thin = {style:"thin",color:{argb:"FFD0D7DE"}};
  var allBorder = {top:thin,bottom:thin,left:thin,right:thin};

  /* ── columns ── */
  var COLDEF = [
    {h:"OBS ID",        w:10},
    {h:"Date",          w:12},
    {h:"Week",          w:7},
    {h:"OBS Type",      w:16},
    {h:"Company",       w:18},
    {h:"Floor",         w:8},
    {h:"Area",          w:18},
    {h:"Category",      w:24},
    {h:"Finding Category", w:22},
    {h:"Risk",          w:11},
    {h:"Status",        w:16},
    {h:"Raised By",     w:14},
    {h:"Due Date",      w:12},
    {h:"Closed Date",   w:12},
    {h:"Closed By",     w:16},
    {h:"GC Approved By",w:16},
    {h:"PMC Approved By",w:16},
    {h:"Hazard Description", w:48},
    {h:"Corrective Action",  w:48},
    {h:"Before Photo",  w:22},
    {h:"After Photo",   w:22}
  ];
  var CI_RISK=10, CI_STATUS=11, CI_DESC=18, CI_RECT=19, CI_BEFORE=20, CI_AFTER=21; /* 1-based */
  var NPHOTO_COLS = 2;

  function obsRowVals(o){
    var pz = parseZone(o.zone || "");
    return [
      v(o.id), fmtD(o.date), v(o.week),
      v((OBS_TYPE[o.obsType]||{}).label),
      v(o.company), v(pz.floor),
      v(pz.area === "Other" ? pz.other : pz.area),
      v(o.cat), v(o.fc),
      v((RISK[o.risk]||{}).label),
      v((STATUS[o.status]||{}).label),
      v(o.by), fmtD(o.due), fmtD(o.closed), v(o.closedBy),
      v(fmtApprover(o.clientApprovedBy)),
      v(fmtApprover(o.lpApprovedBy)),
      v(o.desc), v(o.rect),
      "", ""  /* photo cells filled with images */
    ];
  }

  /* ── load + downscale one image to a small JPEG (reduces file size) ── */
  var MAXDIM = 150, JPEG_Q = 0.6;
  function loadScaled(src){
    return new Promise(function(resolve){
      if(!src){ resolve(null); return; }
      var img = new Image();
      img.crossOrigin = "anonymous";
      var done = false;
      var t = setTimeout(function(){ if(!done){ done=true; resolve(null); } }, 12000);
      img.onload = function(){
        if(done) return; done=true; clearTimeout(t);
        try{
          var w=img.naturalWidth||img.width, h=img.naturalHeight||img.height;
          if(!w||!h){ resolve(null); return; }
          var sc = Math.min(1, MAXDIM/Math.max(w,h));
          var cw=Math.max(1,Math.round(w*sc)), ch=Math.max(1,Math.round(h*sc));
          var cv=document.createElement("canvas"); cv.width=cw; cv.height=ch;
          var cx=cv.getContext("2d"); cx.fillStyle="#fff"; cx.fillRect(0,0,cw,ch);
          cx.drawImage(img,0,0,cw,ch);
          var durl=cv.toDataURL("image/jpeg",JPEG_Q);
          resolve({ b64: durl.split(",")[1], w:cw, h:ch });
        }catch(e){ resolve(null); /* tainted canvas / CORS */ }
      };
      img.onerror = function(){ if(!done){ done=true; clearTimeout(t); resolve(null); } };
      img.src = src;
    });
  }

  /* ── resolve first before/after photo source per obs ── */
  function firstSrc(arr){
    if(!arr || !arr.length) return null;
    for(var i=0;i<arr.length;i++){ var s=photoSrc(arr[i]); if(s) return s; }
    return null;
  }

  /* ── gather + scale all photos up front (dedupe by src) ── */
  var jobs = [];
  rows.forEach(function(o){
    o.__bSrc = firstSrc(o.pb);
    o.__aSrc = firstSrc(o.pa);
    if(o.__bSrc) jobs.push(o.__bSrc);
    if(o.__aSrc) jobs.push(o.__aSrc);
  });
  var uniq = jobs.filter(function(s,i){ return jobs.indexOf(s)===i; });
  var totalJobs = uniq.length;
  if(onProgress) onProgress(0, totalJobs);

  var imgCache = {};
  var loaded = 0;
  function runQueue(){
    /* limit concurrency to 6 */
    var idx = 0;
    function next(){
      if(idx >= uniq.length) return Promise.resolve();
      var myIdx = idx++; var src = uniq[myIdx];
      return loadScaled(src).then(function(res){
        imgCache[src] = res;
        loaded++; if(onProgress) onProgress(loaded, totalJobs);
        return next();
      });
    }
    var workers = [];
    for(var k=0;k<Math.min(6, uniq.length);k++) workers.push(next());
    return Promise.all(workers);
  }

  return runQueue().then(function(){
    var wb = new ExcelJS.Workbook();
    wb.creator = "CTPA EHS Tracker";
    wb.created = today;

    /* register images on the workbook (reused across sheets) */
    var imgId = {};
    Object.keys(imgCache).forEach(function(src){
      var r = imgCache[src];
      if(r && r.b64){ imgId[src] = wb.addImage({ base64: r.b64, extension: "jpeg" }); }
    });

    /* ── helper: build a data sheet ── */
    function buildSheet(name, dataRows){
      var ws = wb.addWorksheet(name, { views:[{state:"frozen", ySplit:1}] });
      ws.columns = COLDEF.map(function(c){ return { header:c.h, width:c.w }; });

      /* header styling */
      var hr = ws.getRow(1);
      hr.height = 24;
      hr.eachCell(function(cell){
        cell.fill = fill(C.navy);
        cell.font = { bold:true, color:{argb:C.white}, name:"Calibri", size:11 };
        cell.alignment = { horizontal:"center", vertical:"middle", wrapText:true };
        cell.border = { top:{style:"thin",color:{argb:C.white}}, bottom:{style:"thin",color:{argb:C.white}}, left:{style:"thin",color:{argb:C.white}}, right:{style:"thin",color:{argb:C.white}} };
      });

      /* data rows */
      dataRows.forEach(function(o, i){
        var vals = obsRowVals(o);
        var rowNum = i + 2;
        var row = ws.getRow(rowNum);
        row.values = vals;
        var hasPhoto = !!(o.__bSrc || o.__aSrc);
        row.height = hasPhoto ? 74 : 18;
        var even = (i % 2 === 0);
        var baseBg = even ? C.even : C.odd;
        var riskLabel = vals[CI_RISK-1], statLabel = vals[CI_STATUS-1];
        row.eachCell({ includeEmpty:true }, function(cell, col){
          if(col > COLDEF.length) return;
          cell.border = allBorder;
          if(col === CI_RISK){
            var rb = riskLabel==="Serious"?C.serBg : riskLabel==="Major"?C.majBg : riskLabel==="Minor"?C.minBg : baseBg;
            var rt = riskLabel==="Serious"?C.serTx : riskLabel==="Major"?C.majTx : riskLabel==="Minor"?C.minTx : C.txt;
            cell.fill = fill(rb); cell.font = { bold:true, color:{argb:rt}, name:"Calibri", size:10 };
            cell.alignment = { horizontal:"center", vertical:"middle" };
          } else if(col === CI_STATUS){
            var sb = statLabel==="Closed"?C.closeBg : statLabel==="Open"?C.openBg : C.pendBg;
            var st = statLabel==="Closed"?C.closeTx : statLabel==="Open"?C.openTx : C.pendTx;
            cell.fill = fill(sb); cell.font = { color:{argb:st}, name:"Calibri", size:10, bold:true };
            cell.alignment = { horizontal:"center", vertical:"middle" };
          } else {
            cell.fill = fill(baseBg);
            cell.font = { color:{argb:C.txt}, name:"Calibri", size:10 };
            var wrap = (col===CI_DESC || col===CI_RECT);
            cell.alignment = { vertical:"top", wrapText:wrap };
          }
        });

        /* embed photos anchored to their cells (col is 0-based in anchor) */
        function place(src, colIdx0){
          if(!src) return;
          var id = imgId[src]; if(id===undefined) return;
          var meta = imgCache[src];
          var maxW = 140, maxH = 92;
          var iw = meta ? meta.w : maxW, ih = meta ? meta.h : maxH;
          var sc = Math.min(maxW/iw, maxH/ih, 1);
          ws.addImage(id, {
            tl: { col: colIdx0 + 0.1, row: (rowNum-1) + 0.08 },
            ext: { width: Math.round(iw*sc), height: Math.round(ih*sc) },
            editAs: "oneCell"
          });
        }
        place(o.__bSrc, CI_BEFORE-1);
        place(o.__aSrc, CI_AFTER-1);
      });

      ws.autoFilter = { from:{row:1,column:1}, to:{row:1,column:COLDEF.length} };
      return ws;
    }

    /* ═══ SHEET 1: Summary ═══ */
    var total=rows.length;
    var nOpen=rows.filter(function(o){return o.status==="OPEN";}).length;
    var nIP=rows.filter(function(o){return o.status==="IN_PROGRESS";}).length;
    var nPV=rows.filter(function(o){return o.status==="PENDING_VERIFY";}).length;
    var nClosed=rows.filter(function(o){return o.status==="CLOSED";}).length;
    var nOD=rows.filter(function(o){return isOD(o);}).length;
    var nSer=rows.filter(function(o){return o.risk==="SERIOUS";}).length;
    var nMaj=rows.filter(function(o){return o.risk==="MAJOR";}).length;
    var nMin=rows.filter(function(o){return o.risk==="MINOR";}).length;
    var nUA=rows.filter(function(o){return o.obsType==="UNSAFE_ACT";}).length;
    var nUC=rows.filter(function(o){return o.obsType==="UNSAFE_CON";}).length;
    var nGO=rows.filter(function(o){return o.obsType==="GOOD_OBS";}).length;

    var sm = wb.addWorksheet("Summary");
    sm.columns = [{width:38},{width:12}];
    function smRow(r, a, b){ var row=sm.getRow(r); row.getCell(1).value=a; row.getCell(2).value=(b==null?"":b); return row; }
    sm.mergeCells("A1:B1"); sm.mergeCells("A2:B2");
    var t1=sm.getCell("A1"); t1.value="CTPA BKK22 — EHS Observation Report";
    t1.fill=fill(C.navyDk); t1.font={bold:true,color:{argb:C.white},name:"Calibri",size:14}; t1.alignment={vertical:"middle"};
    sm.getRow(1).height=28;
    var t2=sm.getCell("A2"); t2.value="Export Date: "+dateFmt+"     |     Observations exported: "+rows.length;
    t2.fill=fill(C.sub); t2.font={italic:true,color:{argb:C.navy},name:"Calibri",size:10}; t2.alignment={vertical:"middle"};
    sm.getRow(2).height=18;

    function section(r, title){ var row=smRow(r,title,"Count"); [1,2].forEach(function(c){ var cl=row.getCell(c); cl.fill=fill(C.blue); cl.font={bold:true,color:{argb:C.white},name:"Calibri",size:11}; }); }
    function dataLine(r, label, val){ var row=smRow(r,label,val); row.getCell(2).alignment={horizontal:"center"}; return row; }
    function colourLine(r, label, val, bg, tx){ var row=dataLine(r,label,val); [1,2].forEach(function(c){ var cl=row.getCell(c); cl.fill=fill(bg); cl.font={color:{argb:tx},name:"Calibri",size:10,bold:c===2}; }); }

    section(4,"SUMMARY");
    dataLine(5,"Total Observations",total);
    dataLine(6,"Open",nOpen);
    dataLine(7,"In Progress",nIP);
    dataLine(8,"Pending GC Verify",nPV);
    dataLine(9,"Closed",nClosed);
    dataLine(10,"Overdue (open past due date)",nOD);
    section(12,"BY RISK LEVEL");
    colourLine(13,"Serious",nSer,C.serBg,C.serTx);
    colourLine(14,"Major",nMaj,C.majBg,C.majTx);
    colourLine(15,"Minor",nMin,C.minBg,C.minTx);
    section(17,"BY OBSERVATION TYPE");
    dataLine(18,"Unsafe Act",nUA);
    dataLine(19,"Unsafe Condition",nUC);
    dataLine(20,"Good Observation",nGO);

    /* ═══ Data sheets ═══ */
    buildSheet("Observation Log", rows);
    buildSheet("Open Items", rows.filter(function(o){ return o.status !== "CLOSED"; }));
    buildSheet("Closed Items", rows.filter(function(o){ return o.status === "CLOSED"; }));

    /* ── download ── */
    var fileName = "CTPA_Observation_Report_" + dateStr + ".xlsx";
    return wb.xlsx.writeBuffer().then(function(buf){
      var blob = new Blob([buf], { type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
      var a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = fileName;
      document.body.appendChild(a); a.click();
      setTimeout(function(){ URL.revokeObjectURL(a.href); document.body.removeChild(a); }, 1500);
      console.log("[CTPA] exportExcel: wrote", fileName, "| rows:", rows.length, "| images:", Object.keys(imgId).length);
    });
  }).catch(function(e){
    var errMsg = "Excel export failed: " + (e && e.message ? e.message : String(e));
    console.error("[CTPA] exportExcel ERROR:", e);
    if (onErr) onErr(errMsg); else alert(errMsg);
  });
}

div></div>\n<div class=\"kb\"><div class=\"kn\">").concat(rows.length, "</div><div class=\"kl\">Total</div></div>\n</div>\n<div style=\"text-align:right;margin-bottom:8px\">\n<button onclick=\"window.print()\" style=\"background:#10B981;color:#fff;border:none;padding:6px 16px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;margin-right:6px\">Print / PDF</button>\n<button onclick=\"window.close()\" style=\"background:#fff;color:#475569;border:1px solid #E2E8F0;padding:6px 12px;border-radius:6px;font-size:11px;cursor:pointer\">Close</button>\n</div>\n<table><thead><tr>\n<th>ID</th><th>Date</th><th>Zone</th><th>Responsible Company</th><th>Category</th><th>OBS Type</th><th>Description</th><th>Risk</th><th>Status</th><th>Due</th><th>Closed</th><th>Photo</th>\n</tr></thead><tbody>").concat(tr, "</tbody></table>\n<div class=\"f\"><span>").concat(PROJECT, " \xB7 EHS Register</span><span>").concat(now, " \xB7 ").concat(rows.length, " records</span></div>\n</body></html>");

/* ── WEEKLY REPORT GENERATOR ──────────────────── */
var RPT_GREEN  = "00CC79";
var RPT_DARK   = "0A3D2B";
var RPT_RED    = "EF4444";
var RPT_AMBER  = "F59E0B";
var RPT_TEXT   = "0F172A";
var RPT_GRAY   = "64748B";
var RPT_LIGHT  = "F8FAFC";
var RPT_BORDER = "E2E8F0";

function rptNow() {
  return new Date().toLocaleDateString("en-GB", {day:"2-digit", month:"short", year:"numeric"});
}
function rptFilterObs(rows, dateFrom, dateTo) {
  return rows.filter(function(o) {
    if (!o.date) return false;
    if (dateFrom && o.date < dateFrom) return false;
    if (dateTo   && o.date > dateTo)   return false;
    return true;
  });
}

/* ── PowerPoint (.pptx) ── */
function generateWeeklyReportPPT(rows, dateFrom, dateTo) {
  if (!window.PptxGenJS) { alert("PptxGenJS library not loaded. Check your internet connection."); return; }
  /* pre-fetch photos from Supabase Storage for cross-device export */
  fetchPhotosForExport(rows).then(function(){ _doGeneratePPT(rows, dateFrom, dateTo); });
}
function _doGeneratePPT(rows, dateFrom, dateTo) {
  var pptx  = new PptxGenJS();
  pptx.layout  = "LAYOUT_WIDE";
  pptx.title   = "EHS Weekly Safety Report";
  pptx.subject = PROJECT;

  var now         = rptNow();
  var periodLabel = (dateFrom || "—") + "  to  " + (dateTo || "—");
  var G = RPT_GREEN, DK = RPT_DARK, RED = RPT_RED, AMB = RPT_AMBER;

  /* helper: table header cell */
  function hCell(text, bg) {
    return { text: text, options: { bold: true, color: "FFFFFF", fill: { color: bg || DK }, fontSize: 9, fontFace: "Arial" } };
  }

  /* ── SLIDE 1 : COVER ── */
  var s1 = pptx.addSlide();
  s1.background = { color: DK };
  s1.addShape(pptx.ShapeType.rect, { x:0, y:0, w:0.5, h:5.625, fill:{ color:G } });
  s1.addShape(pptx.ShapeType.rect, { x:0.5, y:0,       w:9.5, h:0.06, fill:{ color:G } });
  s1.addShape(pptx.ShapeType.rect, { x:0.5, y:5.565,   w:9.5, h:0.06, fill:{ color:G } });
  s1.addText("EHS SAFETY", { x:1.1, y:0.85, w:8, h:0.9,  fontSize:42, bold:true, color:G,         fontFace:"Arial" });
  s1.addText("OBSERVATION REPORT", { x:1.1, y:1.7,  w:8, h:0.7,  fontSize:28, bold:true, color:"FFFFFF",  fontFace:"Arial" });
  s1.addText(PROJECT, { x:1.1, y:2.55, w:8, h:0.45, fontSize:14,            color:"CCCCCC",  fontFace:"Arial" });
  s1.addShape(pptx.ShapeType.rect, { x:1.1, y:3.1, w:5, h:0.04, fill:{ color:"334155" } });
  s1.addText("REPORTING PERIOD",  { x:1.1, y:3.25, w:4, h:0.3,  fontSize:9, bold:true, color:G,    fontFace:"Arial" });
  s1.addText(periodLabel,          { x:1.1, y:3.6,  w:7, h:0.45, fontSize:15, bold:true, color:"FFFFFF", fontFace:"Arial" });
  s1.addText("Generated: " + now,  { x:1.1, y:4.15, w:5, h:0.32, fontSize:10,            color:"94A3B8", fontFace:"Arial" });
  s1.addText("CONFIDENTIAL  ·  EHS DEPARTMENT", { x:1.1, y:5.15, w:8, h:0.25, fontSize:8, color:"334155", fontFace:"Arial" });

  /* ── SLIDE 2 : EXECUTIVE SUMMARY ── */
  var s2 = pptx.addSlide();
  s2.background = { color:"FFFFFF" };
  s2.addShape(pptx.ShapeType.rect, { x:0, y:0,    w:10, h:0.75, fill:{ color:DK } });
  s2.addShape(pptx.ShapeType.rect, { x:0, y:0.75, w:10, h:0.07, fill:{ color:G  } });
  s2.addText("EXECUTIVE SUMMARY", { x:0.3, y:0.1, w:8, h:0.55, fontSize:20, bold:true, color:"FFFFFF", fontFace:"Arial" });
  s2.addText(periodLabel,           { x:0.3, y:0.78, w:9, h:0.25, fontSize:9,            color:G,         fontFace:"Arial" });

  var total    = rows.length;
  var openC    = rows.filter(function(o){ return o.status === "OPEN"; }).length;
  var inprog   = rows.filter(function(o){ return o.status === "IN_PROGRESS"; }).length;
  var closed   = rows.filter(function(o){ return o.status === "CLOSED"; }).length;
  var overdue  = rows.filter(function(o){ return isOD(o); }).length;
  var serious  = rows.filter(function(o){ return o.risk === "SERIOUS" && o.status !== "CLOSED"; }).length;
  var goodObs  = rows.filter(function(o){ return o.obsType === "GOOD_OBS"; }).length;
  var unsafeA  = rows.filter(function(o){ return o.obsType === "UNSAFE_ACT"; }).length;
  var unsafeC  = rows.filter(function(o){ return o.obsType === "UNSAFE_CON"; }).length;

  var kpis = [
    { l:"Total OBS",    v:total,   c:RPT_TEXT, bg:RPT_LIGHT },
    { l:"Open",         v:openC,   c:openC  > 0 ? RED : RPT_TEXT, bg:openC  > 0 ? "FEE2E2" : RPT_LIGHT },
    { l:"In Progress",  v:inprog,  c:AMB,                          bg:"FEF3C7" },
    { l:"Closed",       v:closed,  c:G,                            bg:"D1FAE5" },
    { l:"Overdue ⚠",   v:overdue, c:overdue > 0 ? RED : RPT_TEXT, bg:overdue > 0 ? "FEE2E2" : RPT_LIGHT },
    { l:"Serious Open", v:serious, c:serious > 0 ? RED : RPT_TEXT, bg:serious > 0 ? "FEE2E2" : RPT_LIGHT }
  ];
  kpis.forEach(function(k, i) {
    var col = i % 3, row2 = Math.floor(i / 3);
    var kx = 0.22 + col * 3.22, ky = 1.1 + row2 * 2.05;
    s2.addShape(pptx.ShapeType.rect, { x:kx, y:ky, w:3.06, h:1.7, fill:{ color:k.bg }, line:{ color:RPT_BORDER, pt:1 } });
    s2.addText(String(k.v), { x:kx, y:ky+0.2,  w:3.06, h:0.9, fontSize:40, bold:true, color:k.c, align:"center", fontFace:"Arial" });
    s2.addText(k.l,          { x:kx, y:ky+1.2,  w:3.06, h:0.35, fontSize:10,            color:RPT_GRAY, align:"center", fontFace:"Arial" });
  });
  s2.addText(
    "Good Obs: " + goodObs + "   |   Unsafe Act: " + unsafeA + "   |   Unsafe Condition: " + unsafeC,
    { x:0.2, y:5.25, w:9.6, h:0.28, fontSize:10, color:RPT_GRAY, align:"center", fontFace:"Arial" }
  );

  /* ── SLIDES 3+ : PER OBSERVATION ── */
  rows.forEach(function(o) {
    var sl = pptx.addSlide();
    sl.background = { color:"FFFFFF" };
    var rk      = RISK[o.risk]      || { label: o.risk      || "" };
    var st      = STATUS[o.status]  || { label: o.status    || "" };
    var ot      = OBS_TYPE[o.obsType] || { label: o.obsType || "" };
    var rkColor = o.risk === "SERIOUS" ? RED : o.risk === "MAJOR" ? AMB : G;
    var stLbl   = (st.label || o.status || "").replace(/_/g, " ");

    /* header bar */
    sl.addShape(pptx.ShapeType.rect, { x:0, y:0,    w:10, h:0.65, fill:{ color:DK } });
    sl.addShape(pptx.ShapeType.rect, { x:0, y:0.65, w:10, h:0.05, fill:{ color:G  } });
    sl.addText(o.id, { x:0.25, y:0.05, w:1.4, h:0.55, fontSize:14, bold:true, color:G,        fontFace:"Arial" });
    sl.addText(" · " + ot.label, { x:1.6,  y:0.05, w:5.2, h:0.55, fontSize:11,           color:"CCCCCC",   fontFace:"Arial" });
    sl.addText(o.date + (o.week ? "  ·  " + o.week : ""), { x:6.9, y:0.05, w:2.2, h:0.55, fontSize:10, color:"94A3B8", align:"right", fontFace:"Arial" });
    /* risk badge */
    sl.addShape(pptx.ShapeType.rect, { x:9.2, y:0.1, w:0.72, h:0.44, fill:{ color:rkColor }, rounding:true });
    sl.addText((rk.label || "").slice(0,3).toUpperCase(), { x:9.2, y:0.1, w:0.72, h:0.44, fontSize:8, bold:true, color:"FFFFFF", align:"center", valign:"middle", fontFace:"Arial" });

    /* detail fields - left column */
    var fields = [
      ["Zone / Area",      o.zone    || "—"],
      ["Contractor",       o.company || "—"],
      ["Risk Level",       rk.label  || o.risk],
      ["Status",           stLbl],
      ["Due Date",         o.due     || "—"],
      ["Raised By",        o.by      || "—"],
      ["Closed Date",      o.closed  || "—"],
      ["Closed By",        o.status === "CLOSED" ? (o.closedBy || "—") : "—"]
    ];
    var detY = 0.82;
    fields.forEach(function(f, fi) {
      var fy = detY + fi * 0.54;
      if (fi % 2 === 0) sl.addShape(pptx.ShapeType.rect, { x:0.2, y:fy, w:5.55, h:0.51, fill:{ color:RPT_LIGHT } });
      sl.addText(f[0] + ":", { x:0.3,  y:fy+0.09, w:1.65, h:0.34, fontSize:8, bold:true, color:RPT_GRAY, fontFace:"Arial" });
      sl.addText(f[1],        { x:2.0,  y:fy+0.09, w:3.6,  h:0.34, fontSize:9,            color:RPT_TEXT, fontFace:"Arial" });
    });

    /* description & corrective action boxes */
    var descY = detY + fields.length * 0.54 + 0.04;
    sl.addShape(pptx.ShapeType.rect, { x:0.2, y:descY,      w:5.55, h:0.85, fill:{ color:"EFF6FF" }, line:{ color:"BFDBFE", pt:1 } });
    sl.addText("DESCRIPTION",        { x:0.3, y:descY+0.06, w:5.3,  h:0.22, fontSize:7, bold:true, color:"1E3A8A", fontFace:"Arial" });
    sl.addText(o.desc || "—",        { x:0.3, y:descY+0.26, w:5.3,  h:0.55, fontSize:8.5, color:RPT_TEXT, wrap:true, fontFace:"Arial" });

    /* photos - right column */
    var photoX = 5.9;
    sl.addShape(pptx.ShapeType.rect, { x:photoX, y:0.72, w:3.9, h:4.8, fill:{ color:RPT_LIGHT }, line:{ color:RPT_BORDER, pt:1 } });
    /* src is stripped from cloud payload to save bandwidth — only devices
       that originally uploaded the photo retain the base64 in localStorage */
    var befSrc = o.pb && o.pb.length && typeof o.pb[0].src === "string" && o.pb[0].src.length > 32 ? o.pb[0].src : null;
    var aftSrc = o.pa && o.pa.length && typeof o.pa[0].src === "string" && o.pa[0].src.length > 32 ? o.pa[0].src : null;
    var befMeta = o.pb && o.pb.length > 0;   /* photo recorded but src not local */
    var aftMeta = o.pa && o.pa.length > 0;
    var hasPhotos = befMeta || aftMeta;

    if (hasPhotos) {
      if (befSrc) {
        sl.addShape(pptx.ShapeType.rect, { x:photoX+0.1, y:0.82, w:1.82, h:0.29, fill:{ color:"1E3A8A" } });
        sl.addText("BEFORE", { x:photoX+0.1, y:0.82, w:1.82, h:0.29, fontSize:8, bold:true, color:"FFFFFF", align:"center", fontFace:"Arial" });
        try { sl.addImage({ data:befSrc, x:photoX+0.1, y:1.12, w:1.82, h:2.15 }); } catch(e) {}
      } else if (befMeta) {
        sl.addShape(pptx.ShapeType.rect, { x:photoX+0.1, y:0.82, w:1.82, h:2.6, fill:{ color:"F1F5F9" } });
        sl.addText("Before photo\nuploaded on\nanother device", { x:photoX+0.1, y:1.55, w:1.82, h:0.8, fontSize:7, color:"94A3B8", align:"center", fontFace:"Arial" });
      } else {
        sl.addShape(pptx.ShapeType.rect, { x:photoX+0.1, y:0.82, w:1.82, h:2.6, fill:{ color:"F1F5F9" } });
        sl.addText("No Before Photo", { x:photoX+0.1, y:1.7, w:1.82, h:0.5, fontSize:8, color:"CBD5E1", align:"center", fontFace:"Arial" });
      }
      if (aftSrc) {
        var ax = befMeta ? photoX+2.05 : photoX+0.1;
        sl.addShape(pptx.ShapeType.rect, { x:ax, y:0.82, w:1.82, h:0.29, fill:{ color:G } });
        sl.addText("AFTER", { x:ax, y:0.82, w:1.82, h:0.29, fontSize:8, bold:true, color:"FFFFFF", align:"center", fontFace:"Arial" });
        try { sl.addImage({ data:aftSrc, x:ax, y:1.12, w:1.82, h:2.15 }); } catch(e) {}
      } else if (aftMeta) {
        var ax2b = befMeta ? photoX+2.05 : photoX+0.1;
        sl.addShape(pptx.ShapeType.rect, { x:ax2b, y:0.82, w:1.82, h:2.6, fill:{ color:"F1F5F9" } });
        sl.addText("After photo\nuploaded on\nanother device", { x:ax2b, y:1.55, w:1.82, h:0.8, fontSize:7, color:"94A3B8", align:"center", fontFace:"Arial" });
      } else {
        var ax2 = befMeta ? photoX+2.05 : photoX+0.1;
        sl.addShape(pptx.ShapeType.rect, { x:ax2, y:0.82, w:1.82, h:2.6, fill:{ color:"F1F5F9" } });
        sl.addText("No After Photo", { x:ax2, y:1.7, w:1.82, h:0.5, fontSize:8, color:"CBD5E1", align:"center", fontFace:"Arial" });
      }
      sl.addText("CORRECTIVE ACTION", { x:photoX+0.1, y:3.45, w:3.7, h:0.28, fontSize:7, bold:true, color:RPT_GRAY, fontFace:"Arial" });
      sl.addText(o.rect || "—",        { x:photoX+0.1, y:3.74, w:3.7, h:1.68, fontSize:8, color:RPT_TEXT, wrap:true, fontFace:"Arial" });
    } else {
      sl.addText("No Photos",          { x:photoX, y:1.85, w:3.9, h:0.5, fontSize:11, color:"CBD5E1", align:"center", fontFace:"Arial" });
      sl.addText("CORRECTIVE ACTION",  { x:photoX+0.15, y:2.55, w:3.6, h:0.28, fontSize:7, bold:true, color:RPT_GRAY, fontFace:"Arial" });
      sl.addText(o.rect || "—",        { x:photoX+0.15, y:2.84, w:3.6, h:2.55, fontSize:9, color:RPT_TEXT, wrap:true, fontFace:"Arial" });
    }

    /* footer */
    sl.addShape(pptx.ShapeType.rect, { x:0, y:5.5, w:10, h:0.125, fill:{ color:RPT_LIGHT } });
    sl.addText(PROJECT + "  ·  EHS Weekly Report  ·  " + now, { x:0.2, y:5.51, w:9.6, h:0.11, fontSize:7, color:"94A3B8", fontFace:"Arial" });
  });

  /* ── HIGH RISK SUMMARY ── */
  var hrObs = rows.filter(function(o){ return o.risk === "SERIOUS"; });
  if (hrObs.length > 0) {
    var hrs = pptx.addSlide();
    hrs.background = { color:"FFFFFF" };
    hrs.addShape(pptx.ShapeType.rect, { x:0, y:0,    w:10, h:0.75, fill:{ color:"7F1D1D" } });
    hrs.addShape(pptx.ShapeType.rect, { x:0, y:0.75, w:10, h:0.06, fill:{ color:RED } });
    hrs.addText("⚠  HIGH RISK FINDINGS — SERIOUS", { x:0.3, y:0.1, w:9.4, h:0.55, fontSize:18, bold:true, color:"FFFFFF", fontFace:"Arial" });
    var hrData = [
      [hCell("ID","7F1D1D"), hCell("Date","7F1D1D"), hCell("Zone / Area","7F1D1D"), hCell("Contractor","7F1D1D"), hCell("Description","7F1D1D"), hCell("Status","7F1D1D")]
    ].concat(hrObs.map(function(o) {
      var stC = o.status === "CLOSED" ? G : RED;
      var stL = (STATUS[o.status]||{label:o.status}).label.replace(/_/g," ");
      var desc = (o.desc||"").length > 85 ? (o.desc||"").slice(0,85)+"…" : (o.desc||"");
      return [
        { text:o.id,             options:{bold:true, fontSize:9, fontFace:"Arial"} },
        { text:o.date,           options:{fontSize:9, fontFace:"Arial"} },
        { text:o.zone||"—",     options:{fontSize:9, fontFace:"Arial"} },
        { text:o.company||"—",  options:{fontSize:9, fontFace:"Arial"} },
        { text:desc,             options:{fontSize:8, fontFace:"Arial"} },
        { text:stL,              options:{fontSize:9, bold:true, color:stC, fontFace:"Arial"} }
      ];
    }));
    hrs.addTable(hrData, {
      x:0.25, y:0.88, w:9.5,
      colW:[1.0, 0.95, 1.85, 1.35, 3.3, 1.05],
      border:{ type:"solid", color:RPT_BORDER, pt:0.5 },
      autoPage:true, autoPageRepeatHeader:true
    });
  }

  /* ── CONTRACTOR PERFORMANCE ── */
  var contMap = {};
  rows.forEach(function(o) {
    var co = o.company || "Unknown";
    if (!contMap[co]) contMap[co] = { total:0, open:0, closed:0, overdue:0 };
    contMap[co].total++;
    if (o.status === "CLOSED") contMap[co].closed++; else contMap[co].open++;
    if (isOD(o)) contMap[co].overdue++;
  });
  var ctKeys = Object.keys(contMap).sort();
  if (ctKeys.length > 0) {
    var cs = pptx.addSlide();
    cs.background = { color:"FFFFFF" };
    cs.addShape(pptx.ShapeType.rect, { x:0, y:0,    w:10, h:0.75, fill:{ color:DK } });
    cs.addShape(pptx.ShapeType.rect, { x:0, y:0.75, w:10, h:0.07, fill:{ color:G  } });
    cs.addText("CONTRACTOR PERFORMANCE SUMMARY", { x:0.3, y:0.1, w:9.4, h:0.55, fontSize:18, bold:true, color:"FFFFFF", fontFace:"Arial" });
    var ctData = [
      [hCell("Contractor"), hCell("Total"), hCell("Open"), hCell("Closed"), hCell("Overdue"), hCell("Closure %")]
    ].concat(ctKeys.map(function(co, idx) {
      var d   = contMap[co];
      var pct = d.total > 0 ? Math.round(d.closed / d.total * 100) : 0;
      var bg  = idx % 2 === 0 ? "FFFFFF" : RPT_LIGHT;
      var pctC = pct >= 80 ? G : pct >= 50 ? AMB : RED;
      return [
        { text:co,          options:{ bold:true, fill:{ color:bg }, fontSize:10, fontFace:"Arial" } },
        { text:String(d.total),   options:{ align:"center", fill:{ color:bg }, fontSize:10, fontFace:"Arial" } },
        { text:String(d.open),    options:{ align:"center", fill:{ color:bg }, color:d.open   > 0 ? RED : RPT_TEXT, bold:d.open   > 0, fontSize:10, fontFace:"Arial" } },
        { text:String(d.closed),  options:{ align:"center", fill:{ color:bg }, color:G,        bold:true,           fontSize:10, fontFace:"Arial" } },
        { text:String(d.overdue), options:{ align:"center", fill:{ color:bg }, color:d.overdue> 0 ? RED : RPT_TEXT, bold:d.overdue> 0, fontSize:10, fontFace:"Arial" } },
        { text:pct + "%",         options:{ align:"center", fill:{ color:bg }, color:pctC,     bold:true,           fontSize:10, fontFace:"Arial" } }
      ];
    }));
    cs.addTable(ctData, {
      x:1.5, y:0.88, w:7.0,
      colW:[2.2, 0.9, 0.9, 0.9, 0.9, 1.2],
      rowH:0.55,
      border:{ type:"solid", color:RPT_BORDER, pt:0.5 },
      autoPage:true
    });
  }

  /* ── CLOSING SLIDE ── */
  var cls = pptx.addSlide();
  cls.background = { color:DK };
  cls.addShape(pptx.ShapeType.rect, { x:0, y:0, w:0.5, h:5.625, fill:{ color:G } });
  cls.addText("Thank You", { x:1.1, y:1.75, w:8, h:0.85, fontSize:36, bold:true, color:"FFFFFF", fontFace:"Arial" });
  cls.addText("Report prepared by EHS Department  ·  " + PROJECT, { x:1.1, y:2.7, w:8, h:0.4, fontSize:13, color:"AAAAAA", fontFace:"Arial" });
  cls.addText(now, { x:1.1, y:3.2, w:5, h:0.35, fontSize:11, color:"94A3B8", fontFace:"Arial" });

  var fname = "EHS_Weekly_Report_" + (dateFrom||"").replace(/-/g,"") + "_" + (dateTo||"").replace(/-/g,"") + ".pptx";
  pptx.writeFile({ fileName: fname });
}

/* ── PDF (.pdf) ── */
function generateWeeklyReportPDF(rows, dateFrom, dateTo) {
  if (typeof window.jspdf === "undefined") { alert("jsPDF library not loaded. Check your internet connection."); return; }
  /* pre-fetch photos from Supabase Storage for cross-device export */
  fetchPhotosForExport(rows).then(function(){ _doGeneratePDF(rows, dateFrom, dateTo); });
}
function _doGeneratePDF(rows, dateFrom, dateTo) {
  if (typeof window.jspdf === "undefined") { return; }
  var jsPDF = window.jspdf.jsPDF;
  var doc = new jsPDF({ orientation:"landscape", unit:"mm", format:"a4" });
  var W = 297, H = 210;
  var now         = rptNow();
  var periodLabel = (dateFrom || "—") + "  to  " + (dateTo || "—");

  function hx(hex) {
    var h = (hex.charAt(0) === "#") ? hex.slice(1) : hex;
    return [ parseInt(h.slice(0,2),16), parseInt(h.slice(2,4),16), parseInt(h.slice(4,6),16) ];
  }
  function fill(hex)  { var c=hx(hex); doc.setFillColor(c[0],c[1],c[2]); }
  function draw(hex)  { var c=hx(hex); doc.setDrawColor(c[0],c[1],c[2]); }
  function color(hex) { var c=hx(hex); doc.setTextColor(c[0],c[1],c[2]); }
  function frect(x,y,w,h,hex) { fill(hex); doc.rect(x,y,w,h,"F"); }
  function txt(s,x,y,opts) {
    opts = opts || {};
    color(opts.color || "#0F172A");
    doc.setFontSize(opts.size || 10);
    doc.setFont("helvetica", opts.bold ? "bold" : "normal");
    var args = [String(s||""), x, y, { align: opts.align||"left" }];
    if (opts.maxW) args[3].maxWidth = opts.maxW;
    doc.text.apply(doc, args);
  }

  /* ── PAGE 1: COVER ── */
  frect(0,0,W,H,"#0A3D2B");
  frect(0,0,6,H,"#00CC79");
  frect(6,0,W-6,2,"#00CC79");
  frect(6,H-2,W-6,2,"#00CC79");
  txt("EHS SAFETY",                               18, 52, { size:38, bold:true, color:"#00CC79" });
  txt("OBSERVATION REPORT",                        18, 68, { size:26, bold:true, color:"#FFFFFF" });
  txt(PROJECT,                                     18, 84, { size:13,             color:"#AAAAAA" });
  frect(18,92,80,0.5,"#334155");
  txt("REPORTING PERIOD",                          18,103, { size:8, bold:true, color:"#00CC79" });
  txt(periodLabel,                                 18,113, { size:14, bold:true, color:"#FFFFFF" });
  txt("Generated: " + now,                         18,124, { size:10,             color:"#94A3B8" });
  txt("CONFIDENTIAL  ·  EHS DEPARTMENT",           18,H-5, { size:8,              color:"#334155" });

  /* ── PAGE 2: EXECUTIVE SUMMARY ── */
  doc.addPage();
  frect(0,0,W,18,"#0A3D2B");
  frect(0,18,W,1.5,"#00CC79");
  txt("EXECUTIVE SUMMARY",  8, 13, { size:18, bold:true, color:"#FFFFFF" });
  txt(periodLabel,           8, 22, { size:9,              color:"#00CC79" });

  var total    = rows.length;
  var openC    = rows.filter(function(o){ return o.status === "OPEN"; }).length;
  var inprog   = rows.filter(function(o){ return o.status === "IN_PROGRESS"; }).length;
  var closed   = rows.filter(function(o){ return o.status === "CLOSED"; }).length;
  var overdue  = rows.filter(function(o){ return isOD(o); }).length;
  var serious  = rows.filter(function(o){ return o.risk === "SERIOUS" && o.status !== "CLOSED"; }).length;
  var goodObs  = rows.filter(function(o){ return o.obsType === "GOOD_OBS"; }).length;
  var unsafeA  = rows.filter(function(o){ return o.obsType === "UNSAFE_ACT"; }).length;
  var unsafeC  = rows.filter(function(o){ return o.obsType === "UNSAFE_CON"; }).length;

  var kpis = [

/* ── Low-level fetch helper that captures ALL error detail ── */
function diagFetch(url, opts) {
  var start = Date.now();
  return fetch(url, opts).then(function(r) {
    return r.text().then(function(body) {
      return {
        ok: r.ok,
        status: r.status,
        statusText: r.statusText,
        body: body,
        ms: Date.now() - start,
        url: url.replace(CLOUD.url, "<supabase>"),
        method: (opts && opts.method) || "GET"
      };
    });
  }).catch(function(e) {
    return {
      ok: false,
      status: 0,
      statusText: "Network error",
      body: e && e.message || String(e),
      ms: Date.now() - start,
      url: url.replace(CLOUD.url, "<supabase>"),
      method: (opts && opts.method) || "GET"
    };
  });
}

/* ── Parse Supabase error body into human-readable message ── */
function parseSupaErr(body) {
  try {
    var j = JSON.parse(body);
    var msg = j.message || j.hint || j.details || j.error || body;
    if (j.code) msg = "[" + j.code + "] " + msg;
    if (j.hint) msg += " | Hint: " + j.hint;
    return msg;
  } catch(e) { return body || "empty response"; }
}
