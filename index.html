e. Properly cordon off the entire lifting area with barricades and warning signage before resuming work.","risk":"SERIOUS","status":"CLOSED","by":"MS (Rep)","due":"2026-04-27","closed":"2026-04-24","pb":[],"pa":[]},{"id":"OBS-109","date":"2026-04-24","week":"W17","zone":"External South side - Building A","company":"Ritta","cat":"Lifting Operations (HRA)","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"Warning signage for lifting operations was not adequately displayed in all directions only 2 languages provided and missing Myanmar langue.Required signage must include:\nNo Unauthorized Entry & Only AuthorisedPersons Allowed Beyond This Area (Red Prohibition Sign)\nLifting Operation in Progress Do Not Enter and Beware Falling Object Hazard or Line of Fire Signage  (Yellow Warning Sign)\nAll signage must be provided in three languages.(Thai,Engllish and Myanmar Langue)","rect":"1. Immediately install sufficient warning signage around the lifting operation area in all access directions. Replace and update the existing signs to include three languages: Thai, English, and Myanmar. Required signage shall include: \n2. No Unauthorized Entry / Only Authorized Persons Allowed Beyond This Area (Red Prohibition Sign) and \n3. Lifting Operation in Progress – Do Not Enter / Beware of Falling Object Hazard / Line of Fire (Yellow Warning Sign).","risk":"MINOR","status":"CLOSED","by":"MS (Rep)","due":"2026-04-27","closed":"2026-04-24","pb":[],"pa":[]},{"id":"OBS-110","date":"2026-04-24","week":"W17","zone":"TC01\nFl.1 - Building A","company":"Ritta","cat":"Electrical Safety (HRA)","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"Electrical Panel Signage\nCPR procedure’s signage displayed at electrical panels across all areas are not provided in three languages, which may lead to misunderstanding among workers.","rect":"Immediately replace or update the CPR procedure signage displayed at all electrical panels to include three languages: Thai, English, and Myanmar. Ensure the content is clear, legible, and properly displayed at visible locations near each electrical panel.","risk":"MINOR","status":"CLOSED","by":"MS (Rep)","due":"2026-04-27","closed":"2026-04-24","pb":[],"pa":[]},{"id":"OBS-111","date":"2026-04-24","week":"W17","zone":"TC01\nFl.1 - Building A","company":"Ritta","cat":"Electrical Safety (HRA)","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"Electrician Responsibility Update on Electrical Distribution Boxes.\nThe list of certified electricians assigned displayed on electrical panels has not been updated.","rect":"Immediately review and update the list of certified electricians displayed on all electrical panels to ensure the names, qualifications, and contact details are current and accurate. Remove outdated information and replace it with the latest approved list.","risk":"MAJOR","status":"CLOSED","by":"MS (Rep)","due":"2026-04-27","closed":"2026-04-24","pb":[],"pa":[]},{"id":"OBS-112","date":"2026-04-24","week":"W17","zone":"Zone A\nFl.1 - Building A","company":"Ritta","cat":"Documentation","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"Authorized Operator & Safety Signage (MEWP / Scissor Lift)\nAuthorized Operator list, including operator identification (photo and contact number), has not been provided. In addition, required safety instruction signage is insufficient and not available in three languages.","rect":"Immediately prepare and display the Authorized Operator list at the equipment location, including operator identification photo and contact number. Update and install all required safety instruction signage, ensuring the signs are sufficient, clearly visible, and provided in three languages: Thai, English, and Myanmar.","risk":"MINOR","status":"CLOSED","by":"MS (Rep)","due":"2026-04-27","closed":"2026-04-24","pb":[],"pa":[]},{"id":"OBS-113","date":"2026-04-24","week":"W17","zone":"Zone C\nST06 - Building A","company":"Ritta","cat":"Scaffold","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"Scaffolding Documentation\nThe Stair Tower Summary Report, including the SWL (Safe Working Load) calculation and wall tie point, shall be prepared and submitted accordingly.","rect":"Immediately prepare the Stair Tower Summary Report, including the Safe Working Load (SWL) calculation and wall tie point details, and submit it to the relevant parties for review and approval. Ensure all technical data and supporting calculations are complete and accurate.","risk":"MINOR","status":"CLOSED","by":"MS (Rep)","due":"2026-04-27","closed":"2026-04-24","pb":[],"pa":[]},{"id":"OBS-114","date":"2026-04-24","week":"W17","zone":"Zone C\nLower Roof - Building A","company":"Ritta","cat":"Scaffold","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"Scaffolding Tagging System\nScaffolding structures were found without scaffolding tags (Red Tag – Do Not Use / Green Tag – Safe for Use).","rect":"Immediately stop the use of all scaffolding structures found without scaffolding tags. Inspect the scaffolds by a competent person and install the appropriate scaffolding tags accordingly: Red Tag – Do Not Use for unsafe/incomplete scaffolds and Green Tag – Safe for Use for inspected and approved scaffolds.","risk":"MINOR","status":"CLOSED","by":"MS (Rep)","due":"2026-04-27","closed":"2026-04-24","pb":[],"pa":[]},{"id":"OBS-115","date":"2026-04-24","week":"W17","zone":"ST06 - Building A","company":"Ritta","cat":"Electrical Safety (HRA)","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"Cable Management – Rebar Contact\nElectrical cables were found laid directly on rebar without proper suspension using S-hooks.","rect":"Immediately remove the electrical cables from direct contact with the rebar and re-route them using proper suspension with approved S-hooks or suitable cable support systems.","risk":"MAJOR","status":"CLOSED","by":"MS (Rep)","due":"2026-  ensure all workers understand.\nBrief workers on heat stress prevention and response measures.","risk":"MINOR","status":"CLOSED","by":"MS (Rep)","due":"","closed":"2026-04-03","pb":[],"pa":[]},{"id":"OBS-190","date":"2026-04-03","week":"W14","zone":"Zone A - Building A","company":"Ritta","cat":"Other","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"LP was recommended to provided the umbellar and chair to a banksman(Lady).","rect":"Provide a sunshade/umbrella and chair for the Flagman at the intersection immediately.\nEnsure the resting setup does not obstruct visibility or traffic control duties.","risk":"MINOR","status":"CLOSED","by":"MS (Rep)","due":"","closed":"2026-04-03","pb":[],"pa":[]},{"id":"OBS-191","date":"2026-04-03","week":"W14","zone":"Zone A - Building A","company":"Ritta","cat":"Other","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"No night work PTW provided for night work. LP was recommended to request GC to provide PTW system and supervision plan for night work to be implemented at the project.","rect":"","risk":"MINOR","status":"OPEN","by":"MS (Rep)","due":"2026-04-10","closed":"","pb":[],"pa":[]},{"id":"OBS-192","date":"2026-03-24","week":"W13","zone":"Zone A - Rebar yard","company":"Ritta","cat":"Signage & Barricade","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"The rebar bending machine was found without warning signage indicating machinery hazards.","rect":"- Install appropriate warning signage on or near the rebar bending machine immediately.\n- Ensure the signage clearly indicates potential hazards (e.g., pinch points, moving parts).\n- Brief workers on the hazards associated with the machine before use.","risk":"MINOR","status":"CLOSED","by":"DAYONE","due":"2026-03-25","closed":"2026-03-24","pb":[],"pa":[]},{"id":"OBS-193","date":"2026-03-24","week":"W13","zone":"Zone A - Chemical storage","company":"Ritta","cat":"Fire Protection","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"CO₂ fire extinguishers were found without inspection tags indicating size/weight for periodic checks.","rect":"- Install proper inspection tags on all CO₂ fire extinguishers immediately.\n- Ensure the tag includes extinguisher size/capacity, weight, and inspection record.\n- Verify the condition and weight of the extinguishers during inspection.","risk":"MAJOR","status":"CLOSED","by":"DAYONE","due":"2026-03-25","closed":"2026-03-24","pb":[],"pa":[]},{"id":"OBS-194","date":"2026-03-24","week":"W13","zone":"Zone A - Building A","company":"Ritta","cat":"Access and Egress","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"No designated walkway was provided for workers to access and exit the work area, creating an unsafe condition.","rect":"- Provide a designated and safe access/egress walkway for workers immediately.\n- Ensure the walkway is clearly defined, unobstructed, and safe to use.\n- Install temporary pathways or barriers to guide safe movement.","risk":"MAJOR","status":"CLOSED","by":"DAYONE","due":"2026-03-25","closed":"2026-03-24","pb":[],"pa":[]},{"id":"OBS-195","date":"2026-03-24","week":"W13","zone":"Zone A - Building A","company":"Ritta","cat":"Electrical Safety (HRA)","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"Electrical cables were laid on the ground and loosely hung in an unsafe manner. No S-hooks were provided for proper cable management and storage.","rect":"- Immediately remove cables from the ground and organize them properly.\n- Install S-hooks or cable hangers to secure and manage electrical cables safely.\n- Ensure cables are routed in a way that avoids tripping hazards and damage.","risk":"MAJOR","status":"CLOSED","by":"DAYONE","due":"2026-03-25","closed":"2026-03-24","pb":[],"pa":[]},{"id":"OBS-196","date":"2026-03-24","week":"W13","zone":"Zone A - Building A","company":"Ritta","cat":"Housekeeping","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"No housekeeping or cleaning activities were carried out in the work area, resulting in an untidy and unsafe condition.","rect":"- Immediately clean and organize the work area.\n- Remove all debris, waste, and unnecessary materials from the area.\n- Assign responsible personnel to carry out housekeeping activities.","risk":"MINOR","status":"CLOSED","by":"DAYONE","due":"2026-03-25","closed":"2026-03-24","pb":[],"pa":[]},{"id":"OBS-197","date":"2026-03-24","week":"W13","zone":"Zone A - Building A","company":"Ritta","cat":"Documentation","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"Damaged information boards were observed in the work areas. Unused boards were not properly removed, resulting in an untidy condition.","rect":"- Repair or replace all damaged information boards immediately.\n- Remove and properly store any unused boards from the work area.\n- Ensure all boards are in good condition and clearly visible.","risk":"MINOR","status":"CLOSED","by":"DAYONE","due":"2026-03-25","closed":"2026-03-24","pb":[],"pa":[]},{"id":"OBS-198","date":"2026-03-24","week":"W13","zone":"Zone A - Building A","company":"Ritta","cat":"Material Storage","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"Drinking water stations were not properly maintained in a clean condition, and work materials/equipment were found stored in the area.","rect":"- Immediately clean and sanitize the drinking water station.\n- Remove all work-related materials and equipment from the area.\n- Ensure the area is used only for drinking and rest purposes.","risk":"MINOR","status":"CLOSED","by":"DAYONE","due":"2026-03-25","closed":"2026-03-24","pb":[],"pa":[]},{"id":"OBS-199","date":"2026-03-24","week":"W13","zone":"Zone A - Building A","company":"Ritta","cat":"Scaffold","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"The scaffolding was found to be unsafe or incompletely installed.","rect":"- Stop work on the ge.","risk":"MINOR","status":"CLOSED","by":"MS (Rep)","due":"2026-03-28","closed":"2026-03-27","pb":[],"pa":[]},{"id":"OBS-203","date":"2026-03-27","week":"W13","zone":"Zone A - Building A","company":"Ritta","cat":"Other","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"No red tag has been provided for unsafe scaffolding platform.","rect":"Install appropriate warning signage at all access points of the scaffolding immediately.\nClearly indicate that the scaffolding is under modification / not safe for use.\nRestrict access to the affected scaffolding until it is inspected and approved.","risk":"MAJOR","status":"CLOSED","by":"MS (Rep)","due":"2026-03-29","closed":"2026-03-27","pb":[],"pa":[]},{"id":"OBS-204","date":"2026-03-27","week":"W13","zone":"Zone A - Building A","company":"Ritta","cat":"Other","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"Barricading and signage have not provided for temporary storage area.","rect":"Install proper barricades around the temporary storage area immediately.\nOrganize and control access to the area to prevent unauthorized entry.","risk":"MINOR","status":"CLOSED","by":"MS (Rep)","due":"2026-03-28","closed":"2026-03-27","pb":[],"pa":[]},{"id":"OBS-205","date":"2026-03-27","week":"W13","zone":"Zone A - Building A","company":"DayOne / Ritta","cat":"Other","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"No tower cranes no signage displayed and tower crane’s board has been relocated in another location.","rect":"Immediately reinstall proper signage for the tower crane at the designated and visible location.\nEnsure all required information boards (e.g., load chart, safety instructions, inspection status) are clearly displayed at the crane base.","risk":"MINOR","status":"CLOSED","by":"MS (Rep)","due":"2026-03-29","closed":"2026-03-27","pb":[],"pa":[]},{"id":"OBS-206","date":"2026-03-27","week":"W13","zone":"Zone A - Building A","company":"DayOne / Ritta","cat":"Other","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"Observed hand tools have not provided tool lanyard to secure it when working at height","rect":"Provide appropriate tool lanyards for all tools and equipment used at height. \nEnsure all personnel working at height attach their tools securely before starting work. \nConduct immediate inspection to verify compliance at the work area","risk":"MINOR","status":"CLOSED","by":"MS (Rep)","due":"2026-03-29","closed":"2026-03-27","pb":[],"pa":[]},{"id":"OBS-207","date":"2026-03-27","week":"W13","zone":"Zone A - Building A","company":"Ritta","cat":"Other","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_ACT","desc":"Observed there were many workers not put on hand gloves","rect":"Immediately enforce the use of appropriate hand gloves for all relevant tasks.","risk":"MINOR","status":"CLOSED","by":"MS (Rep)","due":"2026-03-28","closed":"2026-03-27","pb":[],"pa":[]},{"id":"OBS-208","date":"2026-03-27","week":"W13","zone":"Zone A - Building A","company":"Ritta","cat":"Other","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_ACT","desc":"not maintained 3 points of contract when using the staircase.","rect":"Instruct workers to maintain three-point contact and hold the handrail while ascending/descending. \nStop unsafe behavior immediately and re-brief workers on safe access procedures. \nSupervisors to closely monitor compliance during access/egress.","risk":"MINOR","status":"CLOSED","by":"MS (Rep)","due":"2026-03-28","closed":"2026-03-27","pb":[],"pa":[]},{"id":"OBS-209","date":"2026-03-27","week":"W13","zone":"Zone A - Building A","company":"Ritta","cat":"Other","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"A lot of scaffolding platforms have not maintained the mandatory signage such as SWL, Level of platform, full body harness and 100 % tie off, beware of drop object hazard are required as required by law.","rect":"Immediately install all mandatory scaffolding signage, including SWL, platform level identification, full body harness requirement, and 100% tie-off notices.","risk":"MAJOR","status":"CLOSED","by":"MS (Rep)","due":"2026-03-28","closed":"2026-03-27","pb":[],"pa":[]},{"id":"OBS-210","date":"2026-03-27","week":"W13","zone":"Zone A - Building A","company":"Ritta","cat":"Documentation","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"Final revision of WAH,SIC and scaffolding training slide have not been submitted.","rect":"The training slides are currently being revised to align specifically with the project requirements.\nThey are expected to be completed by Thursday, April 3.","risk":"MINOR","status":"OPEN","by":"MS (Rep)","due":"2026-04-03","closed":"","pb":[],"pa":[]},{"id":"OBS-211","date":"2026-03-27","week":"W13","zone":"Zone A - Building A","company":"Ritta","cat":"Lifting Operations (HRA)","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"Observed lifting operation zone was using the soft barricading. LP was recommended to consider using hard barricading because it is lifting work activity.","rect":"For lifting operations at fixed locations without movement, hard barricades are used in some areas. \nHowever, for lifting activities that require relocation on a daily basis, hard barricades cannot be applied.","risk":"MAJOR","status":"CLOSED","by":"MS (Rep)","due":"2026-03-27","closed":"2026-03-27","pb":[],"pa":[]},{"id":"OBS-212","date":"2026-03-27","week":"W13","zone":"Dormitory - Dormitory","company":"Ritta","cat":"Access and Egress","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"Damaged fencing.","rect":"Immediately repair or replace the damaged fencing to restore site security and safety.","risk":"MAJOR","status":"CLOSED","by":"MS (Rep)","due":"2026-03-27","closed":"2026-03-27","pb":[],"pa":[]},{"id":"OBS-213","date":"2026-03-17","week":"W12","zone":"Zone A - Building A","company":"Ritta","cat":"Access and Egress","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"An open hole/deep opening was observed, posing a risk of falling and potential injury.","rect":"Immediately barricade the opening with proper guardrails or hard barriers.\nInstall a secure and properly fixed cover that can support the required load.\nPlace clear warning signage around the opening area.\nRestrict access to the area until adequate protection is in place.","risk":"MAJOR","status":"CLOSED","by":"DAYONE","due":"2026-03-17","closed":"2026-03-17","pb":[],"pa":[]},{"id":"OBS-214","date":"2026-03-17","week":"W12","zone":"Zone A - Building A","company":"Ritta","cat":"Material Storage","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"Scrap steel materials left over from work were found piled in the work area, creating a potential hazard.","rect":"Remove and clear all scrap steel materials from the work area immediately.\nDispose of or store the materials in designated storage or scrap areas.\nOrganize the work area to eliminate tripping and injury hazards.","risk":"MINOR","status":"CLOSED","by":"DAYONE","due":"2026-03-17","closed":"2026-03-17","pb":[],"pa":[]},{"id":"OBS-215","date":"2026-03-17","week":"W12","zone":"Zone A - Building A","company":"Ritta","cat":"Equipment Safety","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"Protruding steel bars were observed above the floor level, posing a tripping and impact hazard.","rect":"Immediately cover or cap the protruding steel bars with appropriate protective caps.\nBend, cut, or relocate the protruding steel where possible to eliminate the hazard.\nMark the area clearly and restrict access until the hazard is controlled.","risk":"MAJOR","status":"CLOSED","by":"DAYONE","due":"2026-03-17","closed":"2026-03-17","pb":[],"pa":[]},{"id":"OBS-216","date":"2026-03-17","week":"W12","zone":"Zone A - Building A","company":"Ritta","cat":"Lifting Operations (HRA)","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"Concrete buckets used for lifting operations must have clearly indicated Safe Working Load (SWL) or load capacity markings.","rect":"Stop using any concrete bucket without a clearly visible load capacity marking.\nEnsure the concrete bucket is labeled with its SWL / load capacity before use.\nVerify the certification and condition of the concrete bucket with the Lifting Supervisor prior to operation.","risk":"MAJOR","status":"CLOSED","by":"DAYONE","due":"2026-03-17","closed":"2026-03-17","pb":[],"pa":[]},{"id":"OBS-217","date":"2026-03-17","week":"W12","zone":"Zone A - Building A","company":"Ritta","cat":"Access and Egress","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"Tools and equipment were left scattered in the work area, obstructing walkways and creating a potential tripping hazard.","rect":"Immediately clear all tools and equipment from walkways and access routes.\nStore tools in designated storage areas or toolboxes after use.\nEnsure walkways are kept free from obstruction at all times.","risk":"MAJOR","status":"CLOSED","by":"DAYONE","due":"2026-03-17","closed":"2026-03-17","pb":[],"pa":[]},{"id":"OBS-218","date":"2026-03-17","week":"W12","zone":"Zone A - Building A","company":"Ritta","cat":"Scaffold","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"Wooden planks used as scaffolding platforms were found in the work area. The use of wooden planks for scaffolding is not permitted and must be removed from the site.\nMaterials and equipment were not properly organized, resulting in poor housekeeping and an untidy work area.","rect":"Remove all non-compliant wooden planks from the work area.\nImmediately arrange and organize all materials and equipment in an orderly manner.\nRemove unnecessary items from the work area.\nStore materials and equipment in designated storage areas.","risk":"MAJOR","status":"CLOSED","by":"DAYONE","due":"2026-03-17","closed":"2026-03-17","pb":[],"pa":[]},{"id":"OBS-219","date":"2026-03-17","week":"W12","zone":"Zone A - Building A","company":"Ritta","cat":"Scaffold","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"Scaffolding platforms were found to be rusted, which may deteriorate and fail under load","rect":"Immediately stop using the rusted scaffolding platforms.\nRemove and replace with sound and certified scaffolding platforms.\nInspect all scaffolding components to ensure they are in safe condition before use.","risk":"MAJOR","status":"CLOSED","by":"DAYONE","due":"2026-03-17","closed":"2026-03-17","pb":[],"pa":[]},{"id":"OBS-220","date":"2026-03-17","week":"W12","zone":"Zone A - Building A","company":"Ritta","cat":"Other","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"No patrol route plan and inspection schedule were established for security guards.","rect":"Develop and implement a patrol route plan indicating designated checkpoints.\nEstablish a clear inspection schedule for security guards.\nCommunicate the patrol plan and schedule to all security personnel and ensure immediate implementation.","risk":"MINOR","status":"CLOSED","by":"DAYONE","due":"2026-03-17","closed":"2026-03-17","pb":[],"pa":[]},{"id":"OBS-221","date":"2026-03-17","week":"W12","zone":"Zone A - Building A","company":"Ritta","cat":"PPE","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_ACT","desc":"Workers were observed wearing PPE that does not comply with the project safety standards.","rect":"Security guards (security personnel) should verify that all workers are wearing proper PPE before entering the work area.\nInstruct security guards to conduct PPE checks at the site entrance immediately.\nSupervisors to check and ensure all workers are wearing correct PPE before resuming work.","risk":"MINOR","status":"CLOSED","by":"DAYONE","due":"2026-03-17","closed":"2026-03-17","pb":[],"pa":[]},{"id":"OBS-222","date":"2026-03-18","week":"W12","zone":"Zone A - Building A","company":"Ritta","cat":"Working from Heights (HRA)","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_ACT","desc":"Many opened wholes and workers not hooked up with 100% tied off.","rect":"Stop work at height activities immediately until proper safety measures are in place.\nInstall secure covers or guardrails for all floor openings.\nEnsure all workers use full body harnesses and are properly tied off at all times.\nAssign a competent supervisor to monitor and enforce compliance.","risk":"SERIOUS","status":"CLOSED","by":"MS (Rep)","due":"2026-03-18","closed":"2026-03-18","pb":[],"pa":[]},{"id":"OBS-223","date":"2026-03-18","week":"W12","zone":"Zone A - Building A","company":"Ritta","cat":"Lifting Operations (HRA)","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"Lifting supervisor not provided in PTW and signaling name has been indicated on PTW.","rect":"Update the PTW to include the assigned Lifting Supervisor and Signalman.\nEnsure all required personnel are clearly identified and present before resuming work.\nRe-brief the team on roles and responsibilities as per the PTW.","risk":"MINOR","status":"CLOSED","by":"MS (Rep)","due":"2026-03-18","closed":"2026-03-18","pb":[],"pa":[]},{"id":"OBS-224","date":"2026-03-18","week":"W12","zone":"Zone A - Building A","company":"Ritta","cat":"Lifting Operations (HRA)","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"Lifting area was improper barricading and no signage provided.","rect":"Stop the lifting activity until proper safety controls are in place. \nInstall adequate barricading around the lifting area to restrict unauthorized access. \nProvide clear and visible warning signage indicating lifting operations and restricted zones.","risk":"MINOR","status":"CLOSED","by":"MS (Rep)","due":"2026-03-18","closed":"2026-03-18","pb":[],"pa":[]},{"id":"OBS-225","date":"2026-03-18","week":"W12","zone":"Zone A - Building A","company":"Ritta","cat":"Lifting Operations (HRA)","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"Authorized rigger and signal man have not provided. Only 2 concrete workers were working","rect":"Stop the lifting activity immediately.\nAssign authorized and competent Rigger and Signalman before resuming the operation.\nEnsure all lifting roles and responsibilities are clearly defined and communicated.\nThe Lifting Supervisor must verify that all required personnel are in place prior to lifting","risk":"MINOR","status":"CLOSED","by":"MS (Rep)","due":"2026-03-18","closed":"2026-03-18","pb":[],"pa":[]},{"id":"OBS-226","date":"2026-03-18","week":"W12","zone":"Zone A - Building A","company":"DayOne / Ritta","cat":"Lifting Operations (HRA)","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_ACT","desc":"Damaged tagline was using and short tagline was using during lifting activity carrying out.","rect":"Stop the lifting activity immediately.\nRemove the damaged tagline from service and tag it as “Do Not Use.”\nReplace with a properly sized and undamaged tagline suitable for the lifting operation.\nEnsure the tagline length is sufficient to maintain safe control and distance from the load.","risk":"MAJOR","status":"CLOSED","by":"MS (Rep)","due":"2026-03-18","closed":"2026-03-18","pb":[],"pa":[]},{"id":"OBS-227","date":"2026-03-18","week":"W12","zone":"Zone A - Building A","company":"DayOne / Ritta","cat":"Driving & Traffic (HRA)","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_ACT","desc":"Untrained banksman present and signed to do this job.","rect":"Stop the activity immediately.\nRemove the untrained banksman from the task.\nAssign a trained and competent banksman/signalman to carry out the operation.\nVerify competency and authorization of personnel before allowing them to perform the task.","risk":"MAJOR","status":"CLOSED","by":"MS (Rep)","due":"2026-03-18","closed":"2026-03-18","pb":[],"pa":[]},{"id":"OBS-228","date":"2026-03-20","week":"W12","zone":"Zone A - Building A","company":"Ritta","cat":"Lifting Operations (HRA)","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_ACT","desc":"A mobile crane operator was found not having attended the project Induction Training and Lifting Training.","rect":"Stop the operator from performing lifting operations immediately.\nEnsure the operator attends and completes the required Induction Training and Lifting Training before resuming work.\nVerify the operator’s competency and training records with the site management.","risk":"MINOR","status":"CLOSED","by":"MS (Rep)","due":"2026-02-20","closed":"2026-03-20","pb":[],"pa":[]},{"id":"OBS-229","date":"2026-03-20","week":"W12","zone":"Zone A - Building A","company":"Ritta","cat":"Scaffold","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"Gaps between the walkway planks of the access tower scaffolding were observed. These openings may allow materials to fall, creating a falling object hazard.","rect":"Immediately cover or close all gaps between the walkway planks.\nEnsure all planks are properly installed, aligned, and fully secured.\nInstall additional boards or toe boards where necessary to prevent materials from falling.","risk":"MAJOR","status":"CLOSED","by":"MS (Rep)","due":"2026-02-20","closed":"2026-03-20","pb":[],"pa":[]},{"id":"OBS-230","date":"2026-03-20","week":"W12","zone":"Zone A - Building A","company":"Ritta","cat":"Equipment Safety","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"Exposed rebar ends at floor level were found without rebar caps, posing a risk of body contact, cuts, or impalement injuries.","rect":"Immediately install rebar caps on all exposed rebar ends.\nEnsure all exposed rebar ends are fitted with approved protective caps at all times","risk":"MAJOR","status":"CLOSED","by":"MS (Rep)","due":"2026-02-20","closed":"2026-03-20","pb":[],"pa":[]},{"id":"OBS-231","date":"2026-03-20","week":"W12","zone":"Zone A - Building A","company":"Ritta","cat":"Working from Heights (HRA)","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"Sling lifeline systems were found without an inspection checklist and without clear labeling of the Safe Working Load (SWL) per span of the lifeline.","rect":"Prepare and implement an inspection checklist for the sling lifeline system.\nInstall clear tags/labels indicating the SWL per lifeline span.\nEnsure the lifeline is inspected and approved by a competent person before us","risk":"MAJOR","status":"CLOSED","by":"MS (Rep)","due":"2026-02-20","closed":"2026-03-20","pb":[],"pa":[]},{"id":"OBS-232","date":"2026-03-20","week":"W12","zone":"Zone A - Building A","company":"Ritta","cat":"Material Storage","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"Materials on the 2nd floor work area were improperly stacked and stored, creating a risk of falling objects.","rect":"Immediately reorganize and secure all materials in a stable and safe manner.\nRemove or relocate materials away from edges and open areas.\nInstall toe boards, edge protection, or barricades to prevent materials from falling.\nRestrict access to the area below until the hazard is controlled","risk":"MINOR","status":"CLOSED","by":"MS (Rep)","due":"2026-02-20","closed":"2026-03-20","pb":[],"pa":[]},{"id":"OBS-233","date":"2026-03-20","week":"W12","zone":"Zone A - Building A","company":"Ritta","cat":"Lifting Operations (HRA)","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"Lifting baskets were found without clearly displayed Safe Working Load (SWL) markings and without valid certification documents from an approved authority.","rect":"Stop using the lifting basket immediately until compliance is achieved.\nEnsure the lifting basket is clearly labeled with its SWL.\nProvide valid certification documents issued by an approved/competent authority.\nVerify and approve the lifting basket by the Lifting Supervisor before use.","risk":"MAJOR","status":"CLOSED","by":"MS (Rep)","due":"2026-02-20","closed":"2026-03-20","pb":[],"pa":[]},{"id":"OBS-234","date":"2026-03-20","week":"W12","zone":"Zone A - Building A","company":"Ritta","cat":"Material Storage","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"Wooden debris with protruding nails was found in the work area, posing a risk of injury from sharp objects.","rect":"Immediately remove all wooden debris with protruding nails from the work area.\nPull out or bend over exposed nails to eliminate sharp points.\nDispose of or store the materials in designated waste or storage areas.","risk":"MINOR","status":"CLOSED","by":"MS (Rep)","due":"2026-02-20","closed":"2026-03-20","pb":[],"pa":[]},{"id":"OBS-235","date":"2026-03-20","week":"W12","zone":"Zone A - Building A","company":"Ritta","cat":"Material Storage","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"Scaffolding materials were improperly stacked, creating a risk of collapse or falling of the material pile.","rect":"Immediately reorganize and restack scaffolding materials in a stable and secure manner. Reduce the height of stacked materials if unstable. Store materials on level ground and use proper supports to prevent movement or collapse.","risk":"MINOR","status":"CLOSED","by":"MS (Rep)","due":"2026-02-20","closed":"2026-03-20","pb":[],"pa":[]},{"id":"OBS-236","date":"2026-03-20","week":"W12","zone":"Zone A - Building A","company":"Ritta","cat":"Driving & Traffic (HRA)","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"A Flagman/Signalman should be assigned to control and provide signals at the access and egress points of the work area to ensure safe movement.","rect":"Assign a trained and competent Flagman/Signalman at the entry and exit points immediately. \nEnsure the Flagman is equipped with proper signaling tools (e.g., flags, whistle, reflective vest). \nBrief the Flagman on traffic control procedures and safe movement coordination.","risk":"MAJOR","status":"CLOSED","by":"MS (Rep)","due":"2026-02-20","closed":"2026-03-20","pb":[],"pa":[]},{"id":"OBS-237","date":"2026-03-20","week":"W12","zone":"Zone A - Building A","company":"Ritta","cat":"Other","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"Flashing warning lights should be installed at access and egress points of the work area to alert workers during overtime/night operations.","rect":"Ensure the lights are clearly visible and functioning properly during night work.\nVerify proper placement to effectively warn workers and equipment operators.","risk":"MINOR","status":"CLOSED","by":"MS (Rep)","due":"2026-02-20","closed":"2026-03-20","pb":[],"pa":[]},{"id":"OBS-238","date":"2026-03-13","week":"W11","zone":"Zone A - Building A","company":"Ritta","cat":"Lifting Operations (HRA)","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"Verify and ensure that the load is properly rigged and securely fastened before lifting.","rect":"Stop the lifting activity until the load is properly rigged and secured.\nAssign a qualified rigger to inspect and correctly secure the load before lifting.\nEnsure the lifting supervisor verifies the rigging arrangement prior to the lift.","risk":"MAJOR","status":"CLOSED","by":"DAYONE","due":"","closed":"2026-03-13","pb":[],"pa":[]},{"id":"OBS-239","date":"2026-03-13","week":"W11","zone":"Zone A - Building A","company":"Ritta","cat":"Lifting Operations (HRA)","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_ACT","desc":"Unsafe lifting activity was observed. Workers were advised to perform lifting operations using proper and safe lifting practices.","rect":"Provide on-site guidance to workers on the correct and safe lifting procedure.\nEnsure a qualified Lifting Supervisor oversees the lifting operation before resuming work.\nVerify that the load is properly rigged and that appropriate lifting equipment is used.","risk":"MAJOR","status":"CLOSED","by":"DAYONE","due":"","closed":"2026-03-13","pb" nspection (GC : Subcon)","obsType":"UNSAFE_ACT","desc":"Many workers working at high and were observed using of full body harness but not 100% tie off and tie off with incorrect anchorage point.","rect":"Conduct a stand-down and provide instruction on proper 100% tie-off procedures.\nWorkers performing work at height must maintain 100% tie-off at all times and connect their lanyards only to approved and suitable anchorage points. Supervisors shall closely monitor compliance and provide additional training on proper use of fall protection equipment.","risk":"SERIOUS","status":"CLOSED","by":"MS (Rep)","due":"","closed":"2026-03-13","pb":[],"pa":[]},{"id":"OBS-250","date":"2026-03-13","week":"W11","zone":"Zone A - Building A","company":"Ritta","cat":"Hot Work","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_ACT","desc":"Hot work was carrying out but no available fire extinguisher and no fire watchman present. Pls review the hot work slide and ensure hot work people attend the training course.","rect":"Stop the hot work activity immediately until proper safety controls are in place.\nProvide an appropriate fire extinguisher at the hot work location before resuming the activity.\nConduct training for all personnel involved in hot work activities using the Hot Work training materials/slides.","risk":"MAJOR","status":"CLOSED","by":"MS (Rep)","due":"2026-03-13","closed":"2026-03-13","pb":[],"pa":[]},{"id":"OBS-251","date":"2026-03-13","week":"W11","zone":"Zone A - Building A","company":"Ritta","cat":"Emergency Preparedness","fc":"Daily Site Inspection (GC : Subcon)","obsType":"UNSAFE_CON","desc":"ERT team and the nurse should survey at site at least one a day to check if are there available accesses provided in case of any emergency happens on site. Any issue should be reported to GC and LP Top management immediately to rectify.","rect":"The ERT team and Safety Officers will conduct daily inspections of the site and emergency access routes. Updates will be shar var CLOUD = {

function cloudOn(){ return !!(CLOUD.url && CLOUD.key); }
var __ctpaLastWrite = 0;   // ms timestamp of the most recent local save (guards against stale pulls)
var __ctpaLastCloudAt = 0;  // ms timestamp of last known cloud update (for smart polling)
/* cloudCheck: fetches ONLY updated_at (~50 bytes) to decide if a full pull is needed.
   Reduces egress by ~99% — the full 272 KB blob is only downloaded when data actually changed. */
function cloudCheck(){
  if(!cloudOn()) return Promise.resolve(false);
  var u = CLOUD.url.replace(/\/$/,"") + "/rest/v1/" + CLOUD.table + "?id=eq." + CLOUD.row + "&select=updated_at";
  return fetch(u, { headers: cloudHeaders(), cache: "no-store" })
    .then(function(r){ return r.ok ? r.json() : null; })
    .then(function(rows){
      if(!rows || !rows[0]) return false;
      var t = rows[0].updated_at ? Date.parse(rows[0].updated_at) : 0;
      if(t > __ctpaLastCloudAt){ __ctpaLastCloudAt = t; return true; }
      return false;
    })
    .catch(function(){ return false; });
}
function cloudHeaders(){
  /* Send both apikey and Authorization headers for all key formats.

  return {
    "apikey": CLOUD.key,
    "Authorization": "Bearer " + CLOUD.key,
    "Content-Type": "application/json"
  };
}
function cloudLoad(){

  var u = CLOUD.url.replace(/\/$/,"") + "/rest/v1/" + CLOUD.table + "?id=eq." + CLOUD.row + "&select=data,updated_at";
  console.log("[CTPA] cloudLoad →", u.replace(CLOUD.url, "<supabase>"));
  return fetch(u, { headers: cloudHeaders(), cache: "no-store" })
    .then(function(r){
      if(!r.ok){
        return r.text().then(function(t){
          console.error("[CTPA] cloudLoad HTTP", r.status, t.slice(0,200));
          return null;

      }
      return r.json();
    })
    .then(function(rows){
      var result = (rows && rows[0]) ? rows[0] : null;
      console.log("[CTPA] cloudLoad ← rows:", rows && rows.length, "| has data:", !!(result && result.data));
      return result;
    })
    .catch(function(e){ console.error("[CTPA] cloudLoad NETWORK ERROR:", e && e.message); return null; });
}
function cloudSave(arr){
  if(!cloudOn()) return Promise.resolve(false);
  var u = CLOUD.url.replace(/\/$/,"") + "/rest/v1/" + CLOUD.table + "?on_conflict=id";
  console.log("[CTPA] cloudSave →", arr.length, "obs");
  return fetch(u, {
    method: "POST",
    headers: Object.assign({ "Prefer": "resolution=merge-duplicates,return=minimal" }, cloudHeaders()),
    body: JSON.stringify([{ id: CLOUD.row, data: arr, updated_at: new Date().toISOString() }])
  }).then(function(r){
    if(!r.ok){
      return r.text().then(function(t){
        console.error("[CTPA] cloudSave HTTP", r.status, t.slice(0,200));
        return false;
      });
    }
    console.log("[CTPA] cloudSave ← OK (", r.status, ")");

  }).catch(function(e){ console.error("[CTPA] cloudSave NETWORK ERROR:", e && e.message); return false; });
}

  var wsUrl = CLOUD.url.replace(/^https?:\/\//, function(m){ return m === "https://" ? "wss://" : "ws://"; }) +
              "/realtime/v1/websocket?apikey=" + encodeURIComponent(CLOUD.key) + "&vsn=1.0.0";
  var ws, heartbeatIv, reconnectT, dead = false;

  function connect() {
    try { ws = new WebSocket(wsUrl); } catch(e) { return; }

    ws.onopen = function() {
      console.log("[CTPA] Realtime connected");
      /* Subscribe to all changes on ctpa_state table */
      ws.send(JSON.stringify({
        topic: "realtime:public:ctpa_state",
        event: "phx_join",
        payload: {
          config: {
            broadcast: { self: false },
            presence: { key: "" },
            postgres_changes: [{ event: "*", schema: "public", table: "ctpa_state" }]
          },
          access_token: CLOUD.key
        },
        ref: "1"
      }));
      /* Heartbeat every 25s to keep connection alive */
      clearInterval(heartbeatIv);
      heartbeatIv = setInterval(function(){
        if(ws && ws.readyState === 1) ws.send(JSON.stringify({ topic: "phoenix", event: "heartbeat", payload: {}, ref: null }));
      }, 25000);
    };

    ws.onmessage = function(e) {
      try {
        var msg = JSON.parse(e.data);
        /* postgres_changes event = another device saved data */
        if(msg.event === "postgres_changes") {
          console.log("[CTPA] Realtime: ctpa_state changed →", msg.payload && msg.payload.data && msg.payload.data.type);
          onUpdate();
        }
      } catch(_) {}
    };

    ws.onclose = function(ev) {
      clearInterval(heartbeatIv);
      if(dead) return;
      console.log("[CTPA] Realtime disconnected (code " + ev.code + "), reconnecting in 8s");
      reconnectT = setTimeout(connect, 8000);
    };

    ws.onerror = function() { try { ws.close(); } catch(_){} };
  }

  connect();
  return function() { dead = true; clearInterval(heartbeatIv); clearTimeout(reconnectT); try { ws && ws.close(); } catch(_){} };
}

/* ===== Activity / visit log (separate Supabase table: ctpa_log) ===== */
/* local fallback buffer so the activity log still shows events even when the
   cloud table is unreachable or blocked by RLS policies */
function logLocalPush(rec){
  try{
    var arr = JSON.parse(localStorage.getItem("ctpa_log_local") || "[]");
    if(!Array.isArray(arr)) arr = [];
    arr.unshift(rec);
    if(arr.length > 300) arr = arr.slice(0, 300);
    localStorage.setItem("ctpa_log_local", JSON.stringify(arr));
  }catch(e){}
}
function logLocalGet(){
  try{ var a = JSON.parse(localStorage.getItem("ctpa_log_local") || "[]"); return Array.isArray(a) ? a : []; }catch(e){ return []; }
}
function logEvent(action, obsId, detail){
  var rec = {
    site: CLOUD.row,
    who: ctpaUser() || "Anonymous",
    action: action,            // "visit" | "create" | "edit" | "delete" | "submit_closure" | "approve_closure" | "reject_closure"
    obs_id: obsId || null,
    detail: detail || null,
    device: ctpaDevice(),
    at: new Date().toISOString()
  };
  logLocalPush(rec);           // always keep a local copy
  if(!cloudOn()) return Promise.resolve(false);
  var u = CLOUD.url.replace(/\/$/,"") + "/rest/v1/ctpa_log";
  return fetch(u, {
    method: "POST",
    headers: Object.assign({ "Prefer": "return=minimal" }, cloudHeaders()),
    body: JSON.stringify([rec])
  }).then(function(r){ return r.ok; }).catch(function(){ return false; });
}
function logLoad(limit){
  /* Activity Log is Supabase-only (single source of truth).
     localStorage is only a write buffer \u2014 never shown in the UI.
     If cloud is unreachable, return empty rows + error message. */
  if(!cloudOn()) return Promise.resolve({ rows: [], error: "Cloud not configured \u2014 no Supabase URL/key set." });
  /* Server-side ORDER BY at DESC so all clients always see the same ordered list */
  var u = CLOUD.url.replace(/\/$/,"") + "/rest/v1/ctpa_log" +
          "?site=eq." + encodeURIComponent(CLOUD.row) +
          "&select=*" +
          "&order=at.desc" +
          "&limit=" + (limit || 300);
  return fetch(u, { headers: cloudHeaders(), cache: "no-store" })
    .then(function(r){
      if(!r.ok){ return r.text().then(function(t){ throw new Error("HTTP " + r.status + (t ? (" \u2014 " + t.slice(0,140)) : "")); }); }
      return r.json();
    })
    .then(function(rows){ return { rows: rows || [], error: null }; })
    .catch(function(e){ return { rows: [], error: (e && e.message) || "network error" }; });
}

    var r = 4 + idx;
    var cellA = XLSX.utils.encode_cell({r:r, c:0});
    var cellB = XLSX.utils.encode_cell({r:r, c:1});
    if (ws[cellA]) ws[cellA].s = summLblStyle;
    if (ws[cellB]) ws[cellB].s = summValStyle;
  });

  /* Header row styles */
  for (var c = 0; c < 19; c++) {
    var hCell = XLSX.utils.encode_cell({ r: HEADER_ROW - 1, c: c });
    if (ws[hCell]) ws[hCell].s = hdrStyle;
  }

  /* Data row styles */
  rows.forEach(function(o, i) {
    var r = HEADER_ROW + i; /* 0-based */
    var isODRow  = isOD(o);
    var isClosed = o.status === "CLOSED";
    var bgColor  = isODRow ? RED_BG : (isClosed ? GRN_BG : undefined);

    var riskBg = o.risk === "SERIOUS" ? RED_BG : (o.risk === "MAJOR" ? ORG_BG : (o.risk === "MINOR" ? BLU_BG : undefined));

    for (var c = 0; c < 19; c++) {
      var dc = XLSX.utils.encode_cell({ r: r, c: c });
      var isDesc = (c === 17 || c === 18);
      var isRisk = (c === 10);
      var bg = isRisk ? riskBg : bgColor;
      if (ws[dc]) {
        ws[dc].s = cellStyle(bg, isDesc);
      }
    }
  });

  XLSX.utils.book_append_sheet(wb, ws, "Observation Tracker");
  XLSX.writeFile(wb, "EHS_Observation_Tracker_" + dateStr + ".xlsx");
}

/* ── PRINT (uses data-URI to avoid nested escaping) ── */
function printRegister(rows) {
  var now = new Date().toLocaleDateString("en-GB", {
    day: "2-digit",

    year: "numeric"
  });
