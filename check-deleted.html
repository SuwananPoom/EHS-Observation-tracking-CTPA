<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Check Deleted OBS — EHS</title>
<style>
body{font-family:system-ui,sans-serif;max-width:820px;margin:40px auto;padding:0 20px;background:#F8FAFC;color:#1E293B}
h1{font-size:18px;font-weight:700;margin-bottom:4px}
.sub{color:#64748B;font-size:13px;margin-bottom:20px}
.card{background:#fff;border:1px solid #E2E8F0;border-radius:12px;padding:20px;margin-bottom:16px}
.btn{padding:10px 22px;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;background:#3B82F6;color:#fff;margin-right:8px}
.btn:hover{background:#2563EB}
.btn-red{background:#EF4444}.btn-red:hover{background:#DC2626}
.stat{display:inline-block;padding:4px 12px;border-radius:20px;font-size:13px;font-weight:700;margin-right:8px;margin-bottom:6px}
.s-ok{background:#D1FAE5;color:#065F46}
.s-warn{background:#FEF3C7;color:#92400E}
.s-err{background:#FEE2E2;color:#991B1B}
table{width:100%;border-collapse:collapse;font-size:12px;margin-top:12px}
th{background:#1E3A5F;color:#fff;padding:7px 10px;text-align:left;font-size:11px}
td{padding:6px 10px;border-bottom:1px solid #E2E8F0;vertical-align:top}
tr:hover td{background:#F1F5F9}
.tag{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700}
.tag-del{background:#FEE2E2;color:#991B1B}
.tag-act{background:#D1FAE5;color:#065F46}
</style>
</head>
<body>
<h1>🔍 ตรวจสอบ Observations ที่ถูกซ่อน</h1>
<div class="sub">ค้นหา observations ที่ถูก soft-delete (deleted: true) ใน ctpa_state</div>

<div class="card">
  <button class="btn" onclick="checkDeleted()">🔍 ตรวจสอบ</button>
  <div id="result" style="margin-top:16px"></div>
</div>

<script>
var CLOUD={url:"https://ocwdnvblpjfzkgzratqb.supabase.co",key:"sb_publishable_4Vm__otNg0T3iEV8_ni43Q_vhA1-_tt",table:"ctpa_state",row:"bkk22"};
function H(){return{apikey:CLOUD.key,Authorization:"Bearer "+CLOUD.key};}

async function checkDeleted(){
  var div=document.getElementById("result");
  div.innerHTML="<div style='color:#64748B;font-size:13px'>กำลังโหลด...</div>";
  try{
    var r=await fetch(CLOUD.url+"/rest/v1/"+CLOUD.table+"?id=eq."+CLOUD.row+"&select=data",{headers:H(),cache:"no-store"});
    var rows=await r.json();
    var obs=rows[0].data||[];

    var total=obs.length;
    var deleted=obs.filter(function(o){return o.deleted;});
    var active=obs.filter(function(o){return !o.deleted;});

    // ID analysis
    var ids=obs.filter(function(o){return /^OBS-\d+$/i.test(o.id||"");})
               .map(function(o){return parseInt(o.id.replace(/^OBS-/i,""),10);})
               .sort(function(a,b){return a-b;});
    var minId=ids[0], maxId=ids[ids.length-1];
    var gaps=[];
    for(var i=minId;i<=maxId;i++){ if(ids.indexOf(i)===-1) gaps.push("OBS-"+String(i).padStart(3,"0")); }

    var html="";
    html+="<div style='margin-bottom:12px'>";
    html+="<span class='stat s-ok'>Array ทั้งหมด: "+total+"</span>";
    html+="<span class='stat s-ok'>Active: "+active.length+"</span>";
    html+=(deleted.length>0?"<span class='stat s-err'>":"<span class='stat s-ok'>")+"Deleted: "+deleted.length+"</span>";
    html+="<span class='stat s-warn'>ID range: OBS-"+String(minId).padStart(3,"0")+" → OBS-"+String(maxId).padStart(3,"0")+"</span>";
    html+=(gaps.length?"<span class='stat s-err'>Gaps: "+gaps.join(", ")+"</span>":"<span class='stat s-ok'>ไม่มี Gap</span>");
    html+="</div>";

    if(deleted.length===0){
      html+="<div style='padding:16px;background:#D1FAE5;border-radius:8px;color:#065F46;font-weight:700'>✅ ไม่มี observation ที่ถูกซ่อน</div>";
    } else {
      html+="<div style='font-weight:700;font-size:13px;margin-bottom:8px;color:#991B1B'>❌ พบ "+deleted.length+" observation ที่ถูก soft-delete:</div>";
      html+="<table><thead><tr><th>ID</th><th>Week</th><th>Date</th><th>Zone</th><th>Description</th><th>ลบโดย</th><th>ลบเมื่อ</th></tr></thead><tbody>";
      deleted.forEach(function(o){
        html+="<tr>";
        html+="<td><b>"+o.id+"</b> <span class='tag tag-del'>DELETED</span></td>";
        html+="<td>"+(o.week||"—")+"</td>";
        html+="<td>"+(o.date||"—")+"</td>";
        html+="<td>"+(o.zone||"—")+"</td>";
        html+="<td style='max-width:280px'>"+(o.desc||"—").slice(0,80)+(o.desc&&o.desc.length>80?"…":"")+"</td>";
        html+="<td>"+(o.deletedBy||"—")+"</td>";
        html+="<td>"+(o.deletedAt||"—")+"</td>";
        html+="</tr>";
      });
      html+="</tbody></table>";
    }
    div.innerHTML=html;
  }catch(e){
    div.innerHTML="<div style='color:#EF4444'>ERROR: "+e.message+"</div>";
  }
}
</script>
</body>
</html>
