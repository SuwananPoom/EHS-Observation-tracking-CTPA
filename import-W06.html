function H(){return{apikey:CLOUD.key,Authorization:"Bearer "+CLOUD.key};}
function base(){return CLOUD.url+"/rest/v1/"+CLOUD.table;}
var _prepared=null;
function load(){return fetch(base()+"?id=eq."+CLOUD.row+"&select=data",{headers:H(),cache:"no-store"}).then(function(r){return r.json();}).then(function(rows){return(rows&&rows[0]&&Array.isArray(rows[0].data))?rows[0].data:[];});}
function nextNum(arr){var mx=0;arr.forEach(function(o){var n=parseInt((o.id||"").replace(/^OBS-/i,""),10);if(!isNaN(n)&&n>mx)mx=n;});return mx;}
function preview(){
  document.getElementById("status").innerHTML="Reading Supabase…";
  load().then(function(cloud){
    var already=cloud.filter(function(o){return o.week==="W06";}).length;
    var mx=nextNum(cloud);
    var prepared=W06.map(function(r,i){var o=JSON.parse(JSON.stringify(r));o.id="OBS-"+String(mx+1+i).padStart(3,"0");return o;});
    _prepared={cloud:cloud,prepared:prepared,already:already};
    var html="<div class=box>Cloud currently has <b>"+cloud.length+"</b> observations (max "+(mx?("OBS-"+String(mx).padStart(3,"0")):"none")+").<br>";
    if(already>0){html+="<span class=warn>⚠ Found "+already+" record(s) already tagged week W06 — importing again will create duplicates. Stop unless intended.</span><br>";}
    html+="W06 will be added as <b>"+prepared[0].id+" … "+prepared[prepared.length-1].id+"</b> ("+prepared.length+" records).</div>";
    var rows=prepared.map(function(o){return "<tr><td>"+o.id+"</td><td>"+o.date+"</td><td>"+o.cat+"</td><td>"+(o.obsType==="UNSAFE_ACT"?"Unsafe Act":o.obsType==="UNSAFE_CON"?"Unsafe Cond":"Good")+"</td><td>"+o.risk+"</td><td>"+o.fc+"</td><td>"+o.status+"</td><td>"+(o.desc||"").slice(0,40)+"</td></tr>";}).join("");
    document.getElementById("out").innerHTML="<table><tr><th>ID</th><th>Date</th><th>Category</th><th>Obs Type</th><th>Risk</th><th>Finding Type</th><th>Status</th><th>Description</th></tr>"+rows+"</table>";
    document.getElementById("status").innerHTML="<span class=ok>✓ Preview ready — review, then click Import.</span>";

}
function doImport(){
  if(!_prepared){alert("Click Preview first");return;}
  if(_prepared.already>0 && !confirm("Records tagged W06 already exist. Import anyway (may duplicate)?"))return;
  document.getElementById("goBtn").disabled=true;
  document.getElementById("status").innerHTML="Saving to Supabase…";
  var merged=_prepared.prepared.concat(_prepared.cloud); // new first, like the app
  fetch(base()+"?id=eq."+CLOUD.row,{method:"PATCH",headers:Object.assign({"Content-Type":"application/json",Prefer:"return=minimal"},H()),body:JSON.stringify({data:merged})})

    return load();})
  .then(function(after){
    var w06=after.filter(function(o){return o.week==="W06";}).length;

}
