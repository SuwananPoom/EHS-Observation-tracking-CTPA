  {date:"2026-03-27",zone:"Zone A",company:"DayOne",cat:"Signage & Barricade",fc:"Customer Site Walk",desc:"The rebar bending machine was found without warning signage indicating machinery hazards.",rect:"Install appropriate warning signage on or near the rebar bending machine immediately. Ensure the signage clearly indicates potential hazards such as pinch points and moving parts. Brief workers on the hazards associated with the machine before use.",risk:"MAJOR",status:"CLOSED",by:"MS (Rep)",due:"2026-03-25",closed:"2026-03-25",closedBy:"DayOne",week:"W24",obsType:"UNSAFE_CON",pb:[],pa:[]},

  {date:"2026-03-27",zone:"Zone A",company:"DayOne",cat:"Material Storage",fc:"Customer Site Walk",desc:"Drinking water stations were not properly maintained in a clean condition, and work materials/equipment were found stored in the area.",rect:"Immediately clean and sanitize the drinking water station. Remove all work-related materials and equipment from the area. Ensure the area is used only for drinking and rest purposes.",risk:"MINOR",status:"CLOSED",by:"MS (Rep)",due:"2026-03-25",closed:"2026-03-25",closedBy:"DayOne",week:"W24",obsType:"UNSAFE_ACT",pb:[],pa:[]},
  {date:"2026-03-27",zone:"Zone A",company:"DayOne",cat:"Scaffold",fc:"Customer Site Walk",desc:"The scaffolding was found to be unsafe or incompletely installed.",rect:"Stop work on the scaffolding immediately. Rectify and complete the scaffolding installation in accordance with safety standards before resuming work.",risk:"MAJOR",status:"CLOSED",by:"MS (Rep)",due:"2026-03-25",closed:"2026-03-25",closedBy:"DayOne",week:"W24",obsType:"UNSAFE_CON",pb:[],pa:[]},
  {date:"2026-03-27",zone:"Zone A",company:"DayOne",cat:"Lifting Operations (HRA)",fc:"Customer Site Walk",desc:"Lifting equipment was not inspected before being brought into the work area and was not properly stored when not in use.",rect:"Inspect all lifting equipment before allowing it into the work area. Remove any non-compliant or uninspected equipment. Ensure proper storage of equipment when not in use.",risk:"SERIOUS",status:"CLOSED",by:"MS (Rep)",due:"2026-03-25",closed:"2026-03-25",closedBy:"DayOne",week:"W24",obsType:"UNSAFE_ACT",pb:[],pa:[]},
  {date:"2026-03-27",zone:"Zone A",company:"DayOne",cat:"Access and Egress",fc:"Customer Site Walk",desc:"Opening holes had not been closed. Scaffolding pipes were placed and blocked access to the electrical panel.",rect:"Remove all scaffolding pipes or obstructions blocking access to the electrical panel. Ensure clear and unobstructed access to all electrical panels at all times. Immediately install guardrails, edge protection, or barriers at all exposed edges and openings.",risk:"SERIOUS",status:"CLOSED",by:"MS (Rep)",due:"2026-03-28",closed:"2026-03-28",closedBy:"DayOne",week:"W24",obsType:"UNSAFE_ACT",pb:[],pa:[]},
  {date:"2026-03-27",zone:"Zone A",company:"DayOne",cat:"Electrical Safety (HRA)",fc:"Customer Site Walk",desc:"Electrical cables were found laying on the floor without proper management, creating trip hazards and risk of cable damage.",rect:"Ensure all electrical wiring is neatly arranged and secured to avoid trip hazards and damage. Use appropriate cable ties for proper cable management. Ensure cables are not exposed, tangled, or at risk of damage.",risk:"SERIOUS",status:"CLOSED",by:"MS (Rep)",due:"2026-03-28",closed:"2026-03-28",closedBy:"DayOne",week:"W24",obsType:"UNSAFE_CON",pb:[],pa:[]},
  {date:"2026-03-27",zone:"Zone A",company:"DayOne",cat:"Scaffold",fc:"Customer Site Walk",desc:"No red tag was provided for the unsafe scaffolding platform to warn workers against use.",rect:"Install appropriate warning signage and red tag at all access points of the unsafe scaffolding. Clearly indicate that the scaffolding is under modification and not safe for use. Restrict access until the scaffolding is inspected and approved.",risk:"MAJOR",status:"CLOSED",by:"MS (Rep)",due:"2026-03-29",closed:"2026-03-29",closedBy:"DayOne",week:"W24",obsType:"UNSAFE_ACT",pb:[],pa:[]},
  {date:"2026-03-27",zone:"Zone A",company:"DayOne",cat:"Signage & Barricade",fc:"Customer Site Walk",desc:"Barricading and signage had not been provided for the temporary storage area.",rect:"Install proper barricades around the temporary storage area immediately. Organize and control access to the area to prevent unauthorized entry. Install appropriate warning signage.",risk:"MINOR",status:"CLOSED",by:"MS (Rep)",due:"2026-03-28",closed:"2026-03-28",closedBy:"DayOne",week:"W24",obsType:"UNSAFE_ACT",pb:[],pa:[]},
  {date:"2026-03-27",zone:"Zone A",company:"DayOne",cat:"Signage & Barricade",fc:"Customer Site Walk",desc:"No signage was displayed for the tower crane and the tower crane information board had been relocated to another location.",rect:"Immediately reinstall proper signage for the tower crane at the designated and visible location. Ensure all required information boards such as load chart, safety instructions, and inspection status are clearly displayed at the crane base.",risk:"MAJOR",status:"CLOSED",by:"MS (Rep)",due:"2026-03-29",closed:"2026-03-29",closedBy:"DayOne",week:"W24",obsType:"UNSAFE_ACT",pb:[],pa:[]},
  {date:"2026-03-27",zone:"Zone A",company:"DayOne",cat:"Working from Heights (HRA)",fc:"Customer Site Walk",desc:"Hand tools had not been provided with tool lanyards to secure them when working at height.",rect:"Provide appropriate tool lanyards for all tools and equipment used at height. Ensure all personnel working at height attach their tools securely before starting work. Conduct immediate inspection to verify compliance.",risk:"MAJOR",status:"CLOSED",by:"MS (Rep)",due:"2026-03-28",closed:"2026-03-28",closedBy:"DayOne",week:"W24",obsType:"UNSAFE_ACT",pb:[],pa:[]},
  {date:"2026-03-27",zone:"Zone A",company:"DayOne",cat:"PPE",fc:"Customer Site Walk",desc:"Many workers were observed not wearing hand gloves during work activities.",rect:"Immediately enforce the use of appropriate hand gloves for all relevant tasks. Supervisors to monitor compliance and instruct non-compliant workers.",risk:"MINOR",status:"CLOSED",by:"MS (Rep)",due:"2026-03-28",closed:"2026-03-28",closedBy:"DayOne",week:"W24",obsType:"UNSAFE_ACT",pb:[],pa:[]},
  {date:"2026-03-27",zone:"Zone A",company:"DayOne",cat:"Access and Egress",fc:"Customer Site Walk",desc:"Workers were not maintaining three-point contact when using the staircase.",rect:"Instruct workers to maintain three-point contact and hold the handrail while ascending/descending. Stop unsafe behavior immediately and re-brief workers on safe access procedures. Supervisors to closely monitor compliance during access/egress.",risk:"MAJOR",status:"CLOSED",by:"MS (Rep)",due:"2026-03-28",closed:"2026-03-28",closedBy:"DayOne",week:"W24",obsType:"UNSAFE_ACT",pb:[],pa:[]},
  {date:"2026-03-27",zone:"Zone A",company:"DayOne",cat:"Scaffold",fc:"Customer Site Walk",desc:"Many scaffolding platforms had not maintained mandatory signage such as SWL, level of platform, full body harness requirement, 100% tie-off, and beware of drop object hazard.",rect:"Immediately install all mandatory scaffolding signage including SWL, platform level identification, full body harness requirement, and 100% tie-off notices.",risk:"MAJOR",status:"CLOSED",by:"MS (Rep)",due:"2026-03-28",closed:"2026-03-28",closedBy:"DayOne",week:"W24",obsType:"UNSAFE_ACT",pb:[],pa:[]},
  {date:"2026-03-27",zone:"Zone A",company:"DayOne",cat:"Documentation",fc:"Customer Site Walk",desc:"Final revision of WAH, SIC and scaffolding training slides had not been submitted.",rect:"Training slides are currently being revised to align with project requirements and are expected to be completed by April 3.",risk:"MAJOR",status:"OPEN",by:"MS (Rep)",due:"2026-04-03",closed:"",closedBy:"",week:"W24",obsType:"UNSAFE_ACT",pb:[],pa:[]},
  {date:"2026-03-27",zone:"Zone A",company:"DayOne",cat:"Lifting Operations (HRA)",fc:"Customer Site Walk",desc:"Lifting operation zone was using soft barricading only. Hard barricading is recommended for fixed lifting work activities.",rect:"For lifting operations at fixed locations, use hard barricades. For lifting activities requiring daily relocation, coordinate with supervisor to determine appropriate barricading method.",risk:"SERIOUS",status:"CLOSED",by:"MS (Rep)",due:"2026-03-27",closed:"2026-03-27",closedBy:"DayOne",week:"W24",obsType:"UNSAFE_CON",pb:[],pa:[]},
  {date:"2026-03-27",zone:"Dormitory",company:"DayOne",cat:"Access and Egress",fc:"Customer Site Walk",desc:"Damaged fencing was observed at the dormitory area.",rect:"Immediately repair or replace the damaged fencing to restore site security and safety.",risk:"MAJOR",status:"CLOSED",by:"MS (Rep)",due:"2026-03-27",closed:"2026-03-27",closedBy:"DayOne",week:"W24",obsType:"UNSAFE_CON",pb:[],pa:[]}
];

function padId(n){return "OBS-"+String(n).padStart(3,"0");}
function log(m,c){var e=document.getElementById("log");var s=document.createElement("span");if(c)s.className=c;s.textContent=m+"\n";e.appendChild(s);e.scrollTop=e.scrollHeight;}

(function(){
  var tb=document.getElementById("preview");
  W24_DATA.forEach(function(o,i){
    var tr=document.createElement("tr");
    var rB="<span class='badge "+o.risk+"'>"+o.risk+"</span>";
    var tB="<span class='badge "+(o.obsType==="UNSAFE_ACT"?"ACT":"CON")+"'>"+(o.obsType==="UNSAFE_ACT"?"Unsafe Act":"Unsafe Con")+"</span>";
    var sB="<span class='badge "+o.status+"'>"+o.status+"</span>";
    tr.innerHTML="<td>"+(i+1)+"</td><td>"+o.cat+"</td><td style='max-width:300px;font-size:10px'>"+o.desc+"</td><td>"+rB+"</td><td>"+tB+"</td><td>"+sB+"</td><td style='white-space:nowrap'>"+o.due+"</td>";
    tb.appendChild(tr);
  });
})();

async function runImport(){
  document.getElementById("btnImport").disabled=true;
  document.getElementById("log").innerHTML="";
  log("=== W24 Import Tool ===","info");
  log("Connecting to Supabase...","info");
  try{
    var base=CLOUD.url+"/rest/v1";
    var r=await fetch(base+"/"+CLOUD.table+"?id=eq."+CLOUD.row+"&select=data",{headers:H(),cache:"no-store"});
    if(!r.ok) throw new Error("HTTP "+r.status);
    var rows=await r.json();
    if(!rows||!rows[0]) throw new Error("Row bkk22 not found");
    var existing=Array.isArray(rows[0].data)?rows[0].data:[];
    log("Observations in cloud: "+existing.length,"ok");

    var hasW24=existing.filter(function(o){return o.week==="W24";});
    if(hasW24.length>0){
      log("WARNING: "+hasW24.length+" W24 records already exist — aborting to prevent duplicates.","err");
      log("IDs: "+hasW24.map(function(o){return o.id;}).join(", "),"warn");
      document.getElementById("btnImport").disabled=false;
      return;
    }

    var nextId=existing.length+1;
    log("Assigning IDs from "+padId(nextId),"info");

    var newObs=W24_DATA.map(function(o,i){
      return Object.assign({},o,{id:padId(nextId+i)});
    });

    log("Preparing "+newObs.length+" observations:","info");
    newObs.forEach(function(o){
      log("  "+o.id+" ["+o.risk+"] ["+o.obsType+"] "+o.desc.slice(0,65)+"...");
    });

    var merged=existing.concat(newObs);
    log("\nPatching Supabase — total "+merged.length+" observations...","info");

    var p=await fetch(base+"/"+CLOUD.table+"?id=eq."+CLOUD.row,{method:"PATCH",headers:H(),body:JSON.stringify({data:merged})});
    if(!p.ok){var t=await p.text();throw new Error("PATCH HTTP "+p.status+": "+t);}

    log("\n=== SUCCESS ===","ok");
    log("Imported "+newObs.length+" W24 observations.","ok");
    log("IDs: "+newObs[0].id+" -> "+newObs[newObs.length-1].id,"ok");
    log("Total observations now: "+merged.length,"ok");
    log("\nRefresh the main app to confirm.","info");
  }catch(e){
    log("ERROR: "+e.message,"err");
    document.getElementById("btnImport").disabled=false;
  }
}
</script>
