var _currentCloud=[], _photoMap={}, _storageByObsId={}, _ctpaPhotosMap={};

async function doScan(){
  document.getElementById("btnScan").disabled=true;
  document.getElementById("log").innerHTML="";
  document.getElementById("resultCard").style.display="none";
  _photoMap={}; _storageByObsId={}; _ctpaPhotosMap={};

  log("=== ตรวจสอบ Supabase ===","info");
  log("","info");

  try{
    var base=CLOUD.url+"/rest/v1/";

    // Current state
    log("1. ตรวจสอบ ctpa_state...","info");
    var r1=await fetch(base+CLOUD.table+"?id=eq."+CLOUD.row+"&select=data",{headers:H(),cache:"no-store"});
    if(!r1.ok) throw new Error("HTTP "+r1.status);
    var rows=await r1.json();
    _currentCloud=(rows[0]&&Array.isArray(rows[0].data))?rows[0].data:[];
    log("   Observations ตอนนี้: "+_currentCloud.length, _currentCloud.length>0?"ok":"warn");

    // Check which Excel obs already exist
    var existingIds={};
    _currentCloud.forEach(function(o){existingIds[o.id]=true;
      if(o.obsNum) existingIds[o.obsNum]=true;
    });
    var newCount=EXCEL_OBS.filter(function(o){return !existingIds[o.id]&&!existingIds[o.obsNum];}).length;
    log("   จาก Excel 350 obs: "+newCount+" ยังไม่มีใน Supabase","info");

    // Scan ctpa_photos
    log("","info");
    log("2. สแกน ctpa_photos...","info");
    var r2=await fetch(base+"ctpa_photos?site=eq.bkk22&select=obs_id,slot,idx,name,at,url&limit=5000",{headers:H(),cache:"no-store"});
    var ctpaPhotos=[];
    if(r2.ok){
      ctpaPhotos=await r2.json();
      log("   ctpa_photos records: "+ctpaPhotos.length,"ok");
      ctpaPhotos.forEach(function(p){
        if(!p.obs_id) return;
        if(!_ctpaPhotosMap[p.obs_id]) _ctpaPhotosMap[p.obs_id]={pb:[],pa:[]};
        var sl=p.slot||"pb"; var ix=p.idx||0;
        _ctpaPhotosMap[p.obs_id][sl].push({
          id:"ph_"+p.obs_id+"_"+sl+"_"+ix,
          name:p.name||"photo.jpg",
          at:p.at||new Date().toISOString(),
          url:p.url||storagePublicUrl(p.obs_id,sl,ix),
          _hasPhoto:true
        });
      });
      log("   Obs IDs มีรูปใน ctpa_photos: "+Object.keys(_ctpaPhotosMap).length,"info");
    } else {
      log("   ctpa_photos: HTTP "+r2.status,"warn");
    }

    // Scan Storage
    log("","info");
    log("3. สแกน Supabase Storage (ctpa-photos)...","info");
    var r3=await fetch(CLOUD.url+"/storage/v1/object/list/"+CLOUD.bucket,{
      method:"POST",
      headers:Object.assign({"Content-Type":"application/json"},H()),
      body:JSON.stringify({prefix:"bkk22/",limit:10000})
    });
    var storageObsIds={};
    if(r3.ok){
      var files=await r3.json();
      if(Array.isArray(files)){
        log("   Storage files: "+files.length,"ok");
        files.forEach(function(f){
          var n=(f.name||"").replace(/^bkk22\//,"");
          var parts=n.split("/");
          if(parts.length<2) return;
          var obsId=parts[0]; var filePart=parts[1];
          var m=filePart.match(/^(pb|pa)-(\d+)\.jpg$/i);
          if(!obsId||!m) return;
          var sl=m[1]; var ix=parseInt(m[2]);
          storageObsIds[obsId]=true;
          if(!_storageByObsId[obsId]) _storageByObsId[obsId]={pb:[],pa:[]};
          var alreadyHave=_storageByObsId[obsId][sl].some(function(x){return x.id&&x.id.indexOf("_"+ix)>-1;});
          if(!alreadyHave){
            _storageByObsId[obsId][sl].push({
              id:"st_"+obsId+"_"+sl+"_"+ix,
              name:sl==="pb"?"Before photo "+(ix+1):"After photo "+(ix+1),
              at:f.created_at||new Date().toISOString(),
              url:storagePublicUrl(obsId,sl,ix),
              _hasPhoto:true
            });
          }
        });
        log("   Obs IDs มีรูปใน Storage: "+Object.keys(storageObsIds).length,"info");
      }
    } else {
      log("   Storage: HTTP "+r3.status,"warn");
    }

    // Build combined photo map (storage + ctpa_photos)
    var allPhotoObsIds=new Set(Object.keys(_ctpaPhotosMap).concat(Object.keys(_storageByObsId)));
    allPhotoObsIds.forEach(function(obsId){
      _photoMap[obsId]={pb:[],pa:[]};
      if(_ctpaPhotosMap[obsId]){
        _photoMap[obsId].pb=_photoMap[obsId].pb.concat(_ctpaPhotosMap[obsId].pb||[]);
        _photoMap[obsId].pa=_photoMap[obsId].pa.concat(_ctpaPhotosMap[obsId].pa||[]);
      }
      if(_storageByObsId[obsId]){
        // Avoid duplicates
        (_storageByObsId[obsId].pb||[]).forEach(function(p){
          if(!_photoMap[obsId].pb.some(function(x){return x.id===p.id;}))
            _photoMap[obsId].pb.push(p);
        });
        (_storageByObsId[obsId].pa||[]).forEach(function(p){
          if(!_photoMap[obsId].pa.some(function(x){return x.id===p.id;}))
            _photoMap[obsId].pa.push(p);
        });
      }
    });

    var totalPhotoObs=Object.keys(_photoMap).length;
    var totalPhotoRecs=Object.keys(_photoMap).reduce(function(s,k){return s+_photoMap[k].pb.length+_photoMap[k].pa.length;},0);

    log("","info");
    log("4. จับคู่รูปกับ observations...","info");
    // Try match: Excel obs IDs vs photo obs IDs
    var directMatch=EXCEL_OBS.filter(function(o){return !!_photoMap[o.id];}).length;
    log("   Excel obs ที่มีรูป (direct ID match): "+directMatch,"info");

    // Also check: photos in storage with OLD ids that might correspond to Excel rows
    // by matching obsId from old recovery data that may have been merged
    var allPhotoObsList=Object.keys(_photoMap);
    log("   รูปทั้งหมดที่พบ: "+totalPhotoRecs+" รูป จาก "+totalPhotoObs+" obs IDs","ok");

    log("","ok");
    log("=== สรุป ===","ok");
    log("   Excel obs จะนำเข้า: 350","info");
    log("   มีอยู่แล้วใน Supabase: "+(350-newCount),"info");
    log("   จะเพิ่มใหม่: "+newCount,"ok");
    log("   รูปจาก Storage+ctpa_photos: "+totalPhotoRecs+" รูป","ok");
    if(directMatch>0) log("   รูปที่ link ตรงได้เลย: "+directMatch+" obs","ok");
    log("","info");
    log("พร้อม Import — กด ⬆ Import ด้านบน","ok");

    showSummary(newCount, totalPhotoObs, totalPhotoRecs, directMatch, storageObsIds);
    document.getElementById("btnImport").style.display="inline-block";

  } catch(e){
    log("ERROR: "+e.message,"err");
  }
  document.getElementById("btnScan").disabled=false;
}

function showSummary(newCount, totalPhotoObs, totalPhotoRecs, directMatch, storageObsIds){
  document.getElementById("resultCard").style.display="block";
  var html='';
  html+='<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px">';
  html+='<span class="stat" style="background:#DBEAFE;color:#1D4ED8"><span class="stat-label">นำเข้าใหม่</span>'+newCount+'</span>';
  html+='<span class="stat" style="background:#DCFCE7;color:#15803D"><span class="stat-label">รูปทั้งหมด</span>'+totalPhotoRecs+'</span>';
  html+='<span class="stat" style="background:#FEF3C7;color:#B45309"><span class="stat-label">Link ได้ทันที</span>'+directMatch+'</span>';
  html+='</div>';

  if(totalPhotoRecs>0){
    html+='<div style="padding:12px;background:#DCFCE7;border-radius:8px;color:#15803D;margin-bottom:12px">';
    html+='<strong>✅ พบรูปภาพ '+totalPhotoRecs+' รูป ใน Supabase Storage และ ctpa_photos</strong><br>';
    if(directMatch>0){
      html+='<small>'+directMatch+' observations มีรูปที่ link ได้ทันที — จะแนบอัตโนมัติ</small>';
    } else {
      html+='<small>รูปมีอยู่ใน Storage แต่ obs ID ไม่ตรงกัน (obs เดิมใช้ ID ต่างกัน)<br>';
      html+='→ หลัง Import ให้กด 📷 Sync Photos ในแอปหลัก หรือใช้ recover-data.html เพื่อ link รูปกับ obs เดิม</small>';
    }
    html+='</div>';
  } else {
    html+='<div style="padding:12px;background:#FEF3C7;border-radius:8px;color:#B45309;margin-bottom:12px">';
    html+='<strong>⚠ ไม่พบรูปภาพใน Supabase</strong><br>';
    html+='<small>รูปอาจถูกลบหรืออยู่ใน device เดิมเท่านั้น — ต้องอัปโหลดใหม่</small>';
    html+='</div>';
  }

  // Preview table
  html+='<strong>ตัวอย่าง 10 รายการแรก:</strong>';
  html+='<table><thead><tr><th>OBS#</th><th>Week</th><th>Date</th><th>Type</th><th>Zone/Area</th><th>Risk</th><th>Status</th><th>Detail</th></tr></thead><tbody>';
  EXCEL_OBS.slice(0,10).forEach(function(o){
    var sc=o.status==='CLOSED'?'badge-green':o.status==='OPEN'?'badge-blue':'badge-yellow';
    html+='<tr><td><strong>'+o.obsNum+'</strong></td><td>'+o.week+'</td>';
    html+='<td style="font-size:11px">'+(o.ts?o.ts.slice(0,10):'—')+'</td>';
    html+='<td>'+o.type+'</td>';
    html+='<td>'+o.zone+(o.location&&o.location!='External'?'<br><span style="color:#64748B;font-size:10px">'+o.location+'</span>':'')+'</td>';
    html+='<td>'+o.severity+'</td>';
    html+='<td><span class="badge '+sc+'">'+o.status+'</span></td>';
    html+='<td style="font-size:11px;color:#64748B">'+(o.detail||'').slice(0,60)+'...</td></tr>';
  });
  html+='<tr><td colspan="8" style="color:#64748B;text-align:center">... และอีก '+(EXCEL_OBS.length-10)+' รายการ</td></tr>';
  html+='</tbody></table>';
  document.getElementById("resultContent").innerHTML=html;
}

async function doImport(){
  if(!confirm("นำเข้า 350 observations จาก Excel ไปยัง Supabase?\n\nจะ merge กับข้อมูลที่มีอยู่ (ไม่มี duplicate)\n\nดำเนินการ?")) return;
  document.getElementById("btnImport").disabled=true;
  document.getElementById("btnScan").disabled=true;
  document.getElementById("progressWrap").style.display="block";
  document.getElementById("log").innerHTML="";

  log("=== เริ่ม Import ===","info");

  try{
    var base=CLOUD.url+"/rest/v1/";

    // Reload current state fresh
    log("โหลดข้อมูลล่าสุดจาก Supabase...","info");
    var r=await fetch(base+CLOUD.table+"?id=eq."+CLOUD.row+"&select=data",{headers:H(),cache:"no-store"});
    if(!r.ok) throw new Error("GET HTTP "+r.status);
    var rows=await r.json();
    var existing=(rows[0]&&Array.isArray(rows[0].data))?rows[0].data:[];
    log("   ข้อมูลปัจจุบัน: "+existing.length+" obs","info");

    var existingIds={};
    existing.forEach(function(o){
      existingIds[o.id]=true;
      if(o.obsNum) existingIds[o.obsNum]=true;
    });

    // Attach photos to each Excel obs (direct match only)
    var toAdd=[];
    EXCEL_OBS.forEach(function(o,i){
      document.getElementById("prog").value=Math.round((i/EXCEL_OBS.length)*50);
      document.getElementById("progLabel").textContent="กำลังเตรียม "+o.obsNum+" ("+(i+1)+"/"+EXCEL_OBS.length+")";
      if(existingIds[o.id]||existingIds[o.obsNum]) return;
      var o2=Object.assign({},o);
      // Attach photos if direct ID match
      if(_photoMap[o.id]){
        if(_photoMap[o.id].pb&&_photoMap[o.id].pb.length) o2.pb=_photoMap[o.id].pb;
        if(_photoMap[o.id].pa&&_photoMap[o.id].pa.length) o2.pa=_photoMap[o.id].pa;
      }
      toAdd.push(o2);
    });

    log("จะเพิ่ม: "+toAdd.length+" obs ใหม่","info");
    var photoLinked=toAdd.filter(function(o){return (o.pb&&o.pb.length)||(o.pa&&o.pa.length);}).length;
    if(photoLinked>0) log("   มีรูป (direct link): "+photoLinked+" obs","ok");

    document.getElementById("prog").value=50;
    document.getElementById("progLabel").textContent="กำลัง PATCH Supabase...";

    var merged=existing.concat(toAdd);

    // SAFETY CHECK
    if(merged.length===0) throw new Error("SAFETY ABORT: merged data is empty");

    log("PATCH Supabase: "+merged.length+" obs รวม...","info");
    var p=await fetch(base+CLOUD.table+"?id=eq."+CLOUD.row,{
      method:"PATCH",
      headers:Object.assign({"Prefer":"return=minimal"},H()),
      body:JSON.stringify({data:merged}),
      cache:"no-store"
    });

    if(!p.ok){var t=await p.text();throw new Error("PATCH HTTP "+p.status+": "+t);}

    document.getElementById("prog").value=100;
    document.getElementById("progLabel").textContent="สำเร็จ!";

    log("","ok");
    log("✅ Import สำเร็จ!","ok");
    log("   เพิ่มใหม่จาก Excel: "+toAdd.length+" obs","ok");
    log("   รูปที่ link อัตโนมัติ: "+photoLinked+" obs","ok");
    log("   รวมทั้งหมดใน Supabase: "+merged.length+" obs","ok");
    log("","ok");
    log("→ Refresh หน้าแอปหลัก เพื่อดูข้อมูล","info");

    if(Object.keys(_photoMap).length>0&&photoLinked===0){
      log("","warn");
      log("📷 รูปภาพ: พบรูปใน Storage แต่ obs IDs ไม่ตรงกัน","warn");
      log("   ใช้ recover-data.html เพื่อ restore รูปจาก obs เดิม","warn");
    }

    document.getElementById("resultContent").innerHTML=
      '<div style="background:#DCFCE7;color:#15803D;padding:16px;border-radius:8px;font-size:15px;font-weight:700">'+
      '✅ Import สำเร็จ!<br>'+
      '<span style="font-weight:400;font-size:13px">'+
      'เพิ่ม '+toAdd.length+' observations จาก Excel<br>'+
      'Supabase มี '+merged.length+' obs รวม<br><br>'+
      '<a href="/" style="color:#15803D">→ กลับหน้าแอปหลัก</a>'+
      '</span></div>';

  } catch(e){
    log("ERROR: "+e.message,"err");
    document.getElementById("btnImport").disabled=false;
  }
  document.getElementById("btnScan").disabled=false;
}
</script>
</body>
</html>
