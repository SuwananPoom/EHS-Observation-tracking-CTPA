async function doScan() {
  document.getElementById("btnScan").disabled=true;
  document.getElementById("log").innerHTML="";
  document.getElementById("resultCard").style.display="none";

  log("=== EHS CTPA DATA RECOVERY SCAN ===","info");
  log("","info");

  try {
    var base = CLOUD.url + "/rest/v1/";

    // 1. Check current ctpa_state
    log("1. Checking ctpa_state (main data store)...","info");
    var r1 = await fetch(base + CLOUD.table + "?id=eq." + CLOUD.row + "&select=data", {headers:H(),cache:"no-store"});
    if (!r1.ok) throw new Error("ctpa_state GET HTTP " + r1.status);
    var rows = await r1.json();
    _currentCloud = (rows[0] && Array.isArray(rows[0].data)) ? rows[0].data : [];
    log("   Current observations in Supabase: " + _currentCloud.length, _currentCloud.length > 0 ? "ok" : "err");

    // 2. Check ctpa_log
    log("","info");
    log("2. Scanning ctpa_log for all historical events...","info");
    var r2 = await fetch(base + "ctpa_log?site=eq.bkk22&select=*&order=ts.asc&limit=10000", {headers:H(),cache:"no-store"});
    if (!r2.ok) throw new Error("ctpa_log GET HTTP " + r2.status);
    _logEntries = await r2.json();
    log("   Total log entries found: " + _logEntries.length, _logEntries.length > 0 ? "ok" : "warn");

    var createEvents = _logEntries.filter(function(e){return e.action==="obs_create"||e.action==="create";});
    var editEvents = _logEntries.filter(function(e){return e.action==="obs_edit"||e.action==="edit";});
    var closeEvents = _logEntries.filter(function(e){return e.action==="obs_close"||e.action==="close";});
    log("   CREATE events: " + createEvents.length,"info");
    log("   EDIT events: " + editEvents.length,"info");
    log("   CLOSE events: " + closeEvents.length,"info");

    // Unique obs IDs from log
    var logObsIds = {};
    _logEntries.forEach(function(e){if(e.obs_id) logObsIds[e.obs_id]=true;});
    var uniqueObsFromLog = Object.keys(logObsIds);
    log("   Unique obs IDs in log: " + uniqueObsFromLog.length,"info");

    // 3. Check ctpa_photos
    log("","info");
    log("3. Scanning ctpa_photos for stored base64 images...","info");
    var r3 = await fetch(base + "ctpa_photos?site=eq.bkk22&select=obs_id,slot,idx,name,at&limit=10000", {headers:H(),cache:"no-store"});
    if (!r3.ok) {
      log("   ctpa_photos table not accessible: HTTP " + r3.status,"warn");
      _photos = [];
    } else {
      _photos = await r3.json();
      log("   Photo records found: " + _photos.length, _photos.length > 0 ? "ok" : "warn");
      var photoObsIds = {};
      _photos.forEach(function(p){photoObsIds[p.obs_id]=true;});
      log("   Obs IDs with photos: " + Object.keys(photoObsIds).length,"info");
    }

    // 4. Check Supabase Storage bucket
    log("","info");
    log("4. Checking Supabase Storage bucket ctpa-photos...","info");
    var r4 = await fetch(CLOUD.url + "/storage/v1/object/list/" + CLOUD.bucket, {
      method:"POST",
      headers:Object.assign({"Content-Type":"application/json"},H()),
      body:JSON.stringify({prefix:"bkk22/",limit:1000})
    });
    var storageCount = 0;
    var storageObsIds = {};
    if (r4.ok) {
      var files = await r4.json();
      if (Array.isArray(files)) {
        storageCount = files.length;
        files.forEach(function(f){
          var parts = (f.name||"").split("/");
          if(parts.length>=2) storageObsIds[parts[1]]=true;
        });
      }
      log("   Storage files found: " + storageCount, storageCount > 0 ? "ok" : "warn");
      log("   Obs IDs with storage photos: " + Object.keys(storageObsIds).length,"info");
    } else {
      log("   Storage list HTTP " + r4.status + " (may need different auth)","warn");
    }

    // 5. Reconstruct from log
    log("","info");
    log("5. Reconstructing observations from log entries...","info");
    _reconObs = reconstructFromLog(_logEntries, uniqueObsFromLog);
    log("   Observations reconstructed from log: " + _reconObs.length, _reconObs.length > 0 ? "ok" : "warn");

    // Build report
    log("","info");
    log("=== RECOVERY SUMMARY ===","ok");
    log("   Current Supabase data:  " + _currentCloud.length + " obs", _currentCloud.length>0?"ok":"err");
    log("   Reconstructable from log: " + _reconObs.length + " obs", _reconObs.length>0?"ok":"warn");
    log("   W27 (complete data):    " + W27_OBS.length + " obs","ok");
    log("   W28 (complete data):    " + W28_OBS.length + " obs","ok");
    log("   Photos in ctpa_photos:  " + _photos.length + " records","info");
    log("   Photos in Storage:      " + storageCount + " files","info");

    showResult(createEvents, editEvents, closeEvents, uniqueObsFromLog, storageObsIds, storageCount);

  } catch(e) {
    log("ERROR: " + e.message,"err");
    document.getElementById("btnScan").disabled=false;
  }
  document.getElementById("btnScan").disabled=false;
}

function reconstructFromLog(entries, obsIds) {
  var obs = [];
  obsIds.forEach(function(obsId) {
    var related = entries.filter(function(e){return e.obs_id===obsId;});
    if (!related.length) return;

    var createEv = related.find(function(e){return e.action==="obs_create"||e.action==="create";});
    var closeEv = related.find(function(e){return e.action==="obs_close"||e.action==="close";});

    var o = {
      id: obsId,
      site: "bkk22",
      status: closeEv ? "CLOSED" : "OPEN",
      _fromLog: true,
      _logCount: related.length
    };

    // Parse detail from create event if available
    if (createEv && createEv.detail) {
      var d = createEv.detail;
      // Try to extract zone/location/type from detail string
      var zoneM = d.match(/zone[:\s]+([^\|,]+)/i);
      var locM = d.match(/loc(?:ation)?[:\s]+([^\|,]+)/i);
      var typeM = d.match(/type[:\s]+([^\|,]+)/i);
      var sevM = d.match(/sev(?:erity)?[:\s]+([^\|,]+)/i);
      if (zoneM) o.zone = zoneM[1].trim();
      if (locM) o.location = locM[1].trim();
      if (typeM) o.type = typeM[1].trim();
      if (sevM) o.severity = sevM[1].trim();
      o.detail = d;
    }

    if (createEv) {
      o.ts = createEv.ts;
      o.createdBy = createEv.who;
    }
    if (closeEv) {
      o.closedAt = closeEv.ts;
      o.closedBy = closeEv.who;
    }

    obs.push(o);
  });
  return obs;
}

function showResult(createEvents, editEvents, closeEvents, uniqueObsFromLog, storageObsIds, storageCount) {

  var w27w28 = W27_OBS.length + W28_OBS.length;

  var statsHtml = '<div style="margin-bottom:16px">';
  statsHtml += '<span class="stat" style="background:#FEE2E2;color:#B91C1C"><span class="stat-label">Lost (Supabase)</span>' + _currentCloud.length + '</span>';
  statsHtml += '<span class="stat" style="background:#DBEAFE;color:#1D4ED8"><span class="stat-label">In Activity Log</span>' + totalRecoverable + '</span>';
  statsHtml += '<span class="stat" style="background:#DCFCE7;color:#15803D"><span class="stat-label">W27+W28 (full data)</span>' + w27w28 + '</span>';
  statsHtml += '<span class="stat" style="background:#FEF3C7;color:#B45309"><span class="stat-label">Photos (ctpa_photos)</span>' + _photos.length + '</span>';
  statsHtml += '</div>';
  document.getElementById("stats").innerHTML = statsHtml;

  var html = '';

  // Log-based reconstruction
  if (_reconObs.length > 0) {
    html += '<div class="section"><strong>Observations found in Activity Log (' + _reconObs.length + '):</strong>';
    html += '<br><small style="color:#64748B">These have partial data from log entries. Some fields may be incomplete.</small>';
    html += '<table><thead><tr><th>OBS ID</th><th>Created By</th><th>Created At</th><th>Status</th><th>Log Entries</th><th>Detail</th></tr></thead><tbody>';
    _reconObs.forEach(function(o) {
      html += '<tr><td><code style="font-size:10px">' + o.id + '</code></td>';
      html += '<td>' + (o.createdBy||'—') + '</td>';
      html += '<td style="font-size:11px">' + (o.ts ? new Date(o.ts).toLocaleDateString('th-TH') : '—') + '</td>';
      html += '<td><span class="badge ' + (o.status==='CLOSED'?'badge-green':'badge-blue') + '">' + o.status + '</span></td>';
      html += '<td style="text-align:center">' + o._logCount + '</td>';
      html += '<td style="color:#64748B;font-size:11px">' + (o.detail ? o.detail.substring(0,60)+'...' : '—') + '</td></tr>';
    });
    html += '</tbody></table></div>';
  } else {
    html += '<div class="section" style="color:#B91C1C"><strong>⚠ No observation IDs found in activity log.</strong><br><small>The log may not have recorded obs_id for past events, or the log was also cleared.</small></div>';
  }

  // Action buttons
  html += '<div class="section">';
  html += '<h2 style="margin-bottom:12px">Restore Actions</h2>';

  if (_reconObs.length > 0) {
    html += '<button class="btn btn-blue" onclick="doRestoreFromLog()">📋 Restore ' + _reconObs.length + ' obs from Activity Log (partial data)</button>';
  }

  html += '<button class="btn btn-green" onclick="doRestoreW27W28()">✅ Restore W27 (7 obs) + W28 (19 obs) — Full Data</button>';

  if (_reconObs.length > 0) {
    html += '<button class="btn btn-orange" onclick="doRestoreAll()">🔄 Restore ALL: Log (' + _reconObs.length + ') + W27 + W28 (deduplicated)</button>';
  }

  html += '<br><br><small style="color:#64748B">⚠ All restore operations will MERGE with any existing Supabase data (no duplicates). Current Supabase has ' + _currentCloud.length + ' observations.</small>';
  html += '</div>';

  // Photos info
  if (_photos.length > 0) {
    var photoObsIds = {};
    _photos.forEach(function(p){photoObsIds[p.obs_id]=(photoObsIds[p.obs_id]||0)+1;});
    html += '<div class="section"><strong>📸 Photos in ctpa_photos table (' + _photos.length + ' records for ' + Object.keys(photoObsIds).length + ' observations):</strong>';
    html += '<br><small style="color:#15803D">These photos will be accessible once the observations are restored. No photo data is lost.</small>';
    html += '<table><thead><tr><th>OBS ID</th><th>Slot</th><th>Index</th><th>Name</th><th>Added At</th></tr></thead><tbody>';
    _photos.slice(0,50).forEach(function(p) {
      html += '<tr><td><code style="font-size:10px">' + p.obs_id + '</code></td>';
      html += '<td>' + (p.slot==='pb'?'Before':'After') + '</td>';
      html += '<td>#' + ((p.idx||0)+1) + '</td>';
      html += '<td>' + (p.name||'—') + '</td>';
      html += '<td style="font-size:11px;color:#64748B">' + (p.at ? new Date(p.at).toLocaleDateString('th-TH') : '—') + '</td></tr>';
    });
    if (_photos.length > 50) html += '<tr><td colspan="5" style="color:#64748B;text-align:center">... and ' + (_photos.length-50) + ' more</td></tr>';
    html += '</tbody></table></div>';
  }

  document.getElementById("resultContent").innerHTML = html;
}

async function doRestoreW27W28() {
  await doRestore(W27_OBS.concat(W28_OBS), "W27+W28 (26 observations)");
}

async function doRestoreFromLog() {
  await doRestore(_reconObs, "Activity Log (" + _reconObs.length + " observations)");
}

async function doRestoreAll() {
  // Merge: log obs + W27 + W28, dedup by id
  var all = _reconObs.concat(W27_OBS).concat(W28_OBS);
  var seen = {}, merged = [];
  all.forEach(function(o){
    if (!seen[o.id]) { seen[o.id]=true; merged.push(o); }
  });
  await doRestore(merged, "ALL sources (" + merged.length + " observations)");
}

async function doRestore(newObs, label) {
  if (!confirm("Restore " + newObs.length + " observations from " + label + " to Supabase?\n\nThis will MERGE with existing data (currently " + _currentCloud.length + " obs).\n\nProceed?")) return;

  document.getElementById("importCard").style.display="block";
  document.getElementById("log2").innerHTML="";
  log("Restoring from " + label + "...","info","log2");

  try {
    // Merge: existing cloud + new, dedup by id
    var existing = _currentCloud.slice();
    var existingIds = {};
    existing.forEach(function(o){existingIds[o.id]=true;});

    var added = 0;
    newObs.forEach(function(o){
      if (!existingIds[o.id]) {
        existing.push(o);
        existingIds[o.id]=true;
        added++;
      }
    });

    log("Existing: " + _currentCloud.length + " | Adding: " + added + " | Total: " + existing.length,"info","log2");

    // Also link photos from ctpa_photos to observations
    if (_photos.length > 0) {
      log("Linking " + _photos.length + " photos to observations...","info","log2");
      var photosByObs = {};
      _photos.forEach(function(p){
        if (!photosByObs[p.obs_id]) photosByObs[p.obs_id]={pb:[],pa:[]};
        var slot = p.slot||"pb";
        photosByObs[p.obs_id][slot].push({
          id: p.id||("ph_"+p.obs_id+"_"+slot+"_"+(p.idx||0)),
          name: p.name||"photo.jpg",
          at: p.at||new Date().toISOString(),
          _hasPhoto: true
        });
      });

      existing = existing.map(function(o){
        if (photosByObs[o.id]) {
          var o2 = Object.assign({},o);
          if (photosByObs[o.id].pb && photosByObs[o.id].pb.length) o2.pb = photosByObs[o.id].pb;
          if (photosByObs[o.id].pa && photosByObs[o.id].pa.length) o2.pa = photosByObs[o.id].pa;
          return o2;
        }
        return o;
      });
      log("Photos linked.","ok","log2");
    }

    // SAFETY CHECK
    if (existing.length === 0) {
      throw new Error("SAFETY ABORT: merged data is empty — refusing to write empty array");
    }

    log("Writing " + existing.length + " observations to Supabase...","info","log2");

    var base = CLOUD.url + "/rest/v1/";
    var p = await fetch(base + CLOUD.table + "?id=eq." + CLOUD.row, {
      method:"PATCH",
      headers:Object.assign({"Prefer":"return=minimal"},H()),
      body:JSON.stringify({data:existing}),
      cache:"no-store"
    });

    if (!p.ok) {
      var t = await p.text();
      throw new Error("PATCH HTTP " + p.status + ": " + t);
    }

    log("","ok","log2");
    log("✅ SUCCESS! Restored " + existing.length + " observations to Supabase.","ok","log2");
    log("   Added from " + label + ": " + added,"ok","log2");
    if (_photos.length > 0) log("   Photos linked: " + _photos.length + " records","ok","log2");
    log("","ok","log2");
    log("→ Refresh the main app and check the dashboard.","info","log2");
    log("→ Photos should load when you open each observation.","info","log2");

    // Update current count for future operations
    _currentCloud = existing;

  } catch(e) {
    log("ERROR: " + e.message,"err","log2");
  }
}
</script>
