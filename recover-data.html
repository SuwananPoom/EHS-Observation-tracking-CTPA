.badge-green{background:#DCFCE7;color:#15803D}
.badge-blue{background:#DBEAFE;color:#1D4ED8}
.stat{display:inline-block;padding:10px 18px;border-radius:10px;font-size:24px;font-weight:800;margin-right:10px;margin-bottom:8px}
.stat-label{font-size:11px;font-weight:400;display:block;opacity:.7}
h2{font-size:15px;font-weight:700;margin-top:0;margin-bottom:12px}
.section{border-top:1px solid #E2E8F0;margin-top:16px;padding-top:16px}
.thumb{width:36px;height:36px;object-fit:cover;border-radius:4px;border:1px solid #E2E8F0}
</style>
</head>

async function doScan() {
  document.getElementById("btnScan").disabled=true;
  document.getElementById("log").innerHTML="";
  document.getElementById("resultCard").style.display="none";
  _photoMap={};

  log("=== EHS CTPA DATA RECOVERY SCAN ===","info");
  log("","info");

  try {
    var base = CLOUD.url + "/rest/v1/";

    // 1. Current ctpa_state
    log("1. ตรวจสอบ ctpa_state (ข้อมูล obs ปัจจุบัน)...","info");
    var r1 = await fetch(base+CLOUD.table+"?id=eq."+CLOUD.row+"&select=data",{headers:H(),cache:"no-store"});
    if(!r1.ok) throw new Error("ctpa_state GET HTTP "+r1.status);
    var rows = await r1.json();
    _currentCloud = (rows[0]&&Array.isArray(rows[0].data))?rows[0].data:[];
    log("   Observations ใน Supabase ตอนนี้: "+_currentCloud.length, _currentCloud.length>0?"ok":"err");

    // 2. ctpa_log
    log("","info");
    log("2. สแกน ctpa_log หา obs IDs...","info");
    var r2 = await fetch(base+"ctpa_log?site=eq.bkk22&select=*&order=ts.asc&limit=10000",{headers:H(),cache:"no-store"});
    _logEntries = r2.ok ? await r2.json() : [];
    log("   Log entries: "+_logEntries.length, _logEntries.length>0?"ok":"warn");
    var logObsIds={};
    _logEntries.forEach(function(e){if(e.obs_id)logObsIds[e.obs_id]=true;});
    var uniqueFromLog=Object.keys(logObsIds);
    log("   Unique obs IDs ใน log: "+uniqueFromLog.length,"info");

    // 3. ctpa_photos — metadata + url
    log("","info");
    log("3. สแกน ctpa_photos (รูปที่บันทึกเป็น base64)...","info");
    var r3 = await fetch(base+"ctpa_photos?site=eq.bkk22&select=obs_id,slot,idx,name,at,url&order=obs_id.asc&limit=5000",{headers:H(),cache:"no-store"});
    if(r3.ok){
      _photos = await r3.json();
      log("   Photo records: "+_photos.length, _photos.length>0?"ok":"warn");
    } else {
      _photos=[];
      log("   ctpa_photos ไม่สามารถเข้าถึงได้: HTTP "+r3.status,"warn");
    }

    // 4. Supabase Storage — list all files
    log("","info");
    log("4. สแกน Supabase Storage bucket (ctpa-photos)...","info");
    _storageFiles=[];
    // List files recursively under bkk22/
    var r4 = await fetch(CLOUD.url+"/storage/v1/object/list/"+CLOUD.bucket,{
      method:"POST",
      headers:Object.assign({"Content-Type":"application/json"},H()),
      body:JSON.stringify({prefix:"bkk22/",limit:10000,offset:0})
    });
    if(r4.ok){
      var files=await r4.json();
      if(Array.isArray(files)) _storageFiles=files;
      log("   Storage files: "+_storageFiles.length, _storageFiles.length>0?"ok":"warn");
    } else {
      log("   Storage list HTTP "+r4.status,"warn");
      // Try alternative: list without prefix
      var r4b = await fetch(CLOUD.url+"/storage/v1/object/list/"+CLOUD.bucket,{
        method:"POST",
        headers:Object.assign({"Content-Type":"application/json"},H()),
        body:JSON.stringify({prefix:"",limit:10000})
      });
      if(r4b.ok){
        var files2=await r4b.json();
        if(Array.isArray(files2)){
          _storageFiles=files2.filter(function(f){return (f.name||"").startsWith("bkk22/");});
          log("   Storage files (bkk22/): "+_storageFiles.length,"info");
        }
      }
    }

    // 5. Build photo map from ctpa_photos
    log("","info");
    log("5. สร้าง photo map...","info");
    var photoObsIds={};

    // From ctpa_photos table
    _photos.forEach(function(p){
      if(!p.obs_id) return;
      photoObsIds[p.obs_id]=true;
      if(!_photoMap[p.obs_id]) _photoMap[p.obs_id]={pb:[],pa:[]};
      var slot=p.slot||"pb";
      var idx=p.idx||0;
      _photoMap[p.obs_id][slot].push({
        id:"ph_"+p.obs_id+"_"+slot+"_"+idx,
        name:p.name||"photo.jpg",
        at:p.at||new Date().toISOString(),
        url:p.url||storagePublicUrl(p.obs_id,slot,idx),
        _hasPhoto:true
      });
    });

    // From Storage files — extract obsId/slot/idx from path bkk22/{obsId}/{slot}-{idx}.jpg
    var storageObsIds={};
    _storageFiles.forEach(function(f){
      var name=f.name||"";
      // name could be "bkk22/obs_xxx/pb-0.jpg" or just "obs_xxx/pb-0.jpg"
      var parts=name.replace(/^bkk22\//,"").split("/");
      if(parts.length<2) return;
      var obsId=parts[0];
      var filePart=parts[1]; // e.g. "pb-0.jpg"
      var m=filePart.match(/^(pb|pa)-(\d+)\.jpg$/i);
      if(!obsId||!m) return;
      var slot=m[1]; var idx=parseInt(m[2]);
      storageObsIds[obsId]=true;
      // Only add if not already in map from ctpa_photos
      if(!_photoMap[obsId]) _photoMap[obsId]={pb:[],pa:[]};
      var alreadyHave=_photoMap[obsId][slot].some(function(x){return x.id&&x.id.indexOf("_"+idx)>-1;});
      if(!alreadyHave){
        var url=storagePublicUrl(obsId,slot,idx);
        _photoMap[obsId][slot].push({
          id:"st_"+obsId+"_"+slot+"_"+idx,
          name:slot==="pb"?"Before photo "+(idx+1):"After photo "+(idx+1),
          at:f.created_at||new Date().toISOString(),
          url:url,
          _hasPhoto:true
        });
      }
    });

    var totalPhotoObs=Object.keys(_photoMap).length;
    var totalPhotoRecs=Object.keys(_photoMap).reduce(function(s,k){return s+_photoMap[k].pb.length+_photoMap[k].pa.length;},0);
    log("   Obs ที่มีรูป: "+totalPhotoObs+" obs, "+totalPhotoRecs+" รูปรวม","ok");
    log("   - จาก ctpa_photos table: "+_photos.length+" records","info");
    log("   - จาก Storage bucket: "+_storageFiles.length+" files (obs: "+Object.keys(storageObsIds).length+")","info");

    // 6. Reconstruct from log
    _reconObs = reconstructFromLog(_logEntries, uniqueFromLog);
    log("","info");
    log("6. Reconstruct จาก log: "+_reconObs.length+" obs","info");

    log("","ok");
    log("=== สรุป ===","ok");
    log("   Supabase ตอนนี้:       "+_currentCloud.length+" obs","info");
    log("   จาก activity log:      "+_reconObs.length+" obs (partial data)","info");
    log("   W27+W28 (ครบ):         "+(W27_OBS.length+W28_OBS.length)+" obs","ok");
    log("   รูปที่กู้คืนได้:          "+totalPhotoRecs+" รูป จาก "+totalPhotoObs+" obs","ok");

    showResult(uniqueFromLog, storageObsIds, totalPhotoObs, totalPhotoRecs);

  } catch(e) {
    log("ERROR: "+e.message,"err");
  }
  document.getElementById("btnScan").disabled=false;
}

function reconstructFromLog(entries, obsIds){
  var obs=[];
  obsIds.forEach(function(obsId){
    var related=entries.filter(function(e){return e.obs_id===obsId;});
    if(!related.length) return;
    var createEv=related.find(function(e){return /create/i.test(e.action);});
    var closeEv=related.find(function(e){return /close/i.test(e.action);});
    var o={id:obsId,site:"bkk22",status:closeEv?"CLOSED":"OPEN",_fromLog:true,_logCount:related.length};
    if(createEv){
      o.ts=createEv.ts; o.createdBy=createEv.who;
      if(createEv.detail) o.detail=createEv.detail;
    }
    if(closeEv){o.closedAt=closeEv.ts;o.closedBy=closeEv.who;}
    obs.push(o);
  });
  return obs;
}

function showResult(uniqueFromLog, storageObsIds, totalPhotoObs, totalPhotoRecs){
  document.getElementById("resultCard").style.display="block";

  var w2728=W27_OBS.length+W28_OBS.length;
  var statsHtml='<div style="margin-bottom:16px">';
  statsHtml+='<span class="stat" style="background:#FEE2E2;color:#B91C1C"><span class="stat-label">Supabase ตอนนี้</span>'+_currentCloud.length+'</span>';
  statsHtml+='<span class="stat" style="background:#DBEAFE;color:#1D4ED8"><span class="stat-label">จาก Log</span>'+_reconObs.length+'</span>';
  statsHtml+='<span class="stat" style="background:#DCFCE7;color:#15803D"><span class="stat-label">W27+W28</span>'+w2728+'</span>';
  statsHtml+='<span class="stat" style="background:#FEF3C7;color:#B45309"><span class="stat-label">รูปกู้คืนได้</span>'+totalPhotoRecs+'</span>';
  statsHtml+='</div>';
  document.getElementById("stats").innerHTML=statsHtml;

  var html='';

  // Photo preview table
  if(totalPhotoObs>0){
    html+='<div style="margin-bottom:16px;padding:12px;background:#DCFCE7;border-radius:8px;color:#15803D">';
    html+='<strong>✅ พบรูปภาพ '+totalPhotoRecs+' รูป จาก '+totalPhotoObs+' observations</strong><br>';
    html+='<small>รูปทั้งหมดจะถูก link กลับอัตโนมัติเมื่อกดปุ่ม Restore — ไม่ต้องใส่รูปใหม่</small></div>';

    // Show sample photos
    var sampleIds=Object.keys(_photoMap).slice(0,6);
    html+='<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px">';
    sampleIds.forEach(function(obsId){
      var slots=_photoMap[obsId];
      var allPhotos=slots.pb.concat(slots.pa);
      allPhotos.slice(0,2).forEach(function(p){
        html+='<div style="text-align:center;font-size:10px;color:#64748B">';
        html+='<img src="'+p.url+'" class="thumb" onerror="this.style.display=\'none\'" loading="lazy"><br>';
        html+=obsId.slice(-6)+'<br>'+(p.name||'').slice(0,10)+'</div>';
      });
    });
    if(totalPhotoObs>6) html+='<div style="color:#64748B;font-size:12px;padding:8px">... และอีก '+(totalPhotoObs-6)+' obs</div>';
    html+='</div>';
  } else {
    html+='<div style="margin-bottom:16px;padding:12px;background:#FEF3C7;border-radius:8px;color:#B45309">';
    html+='<strong>⚠ ไม่พบรูปภาพใน ctpa_photos หรือ Storage</strong><br>';
    html+='<small>อาจต้องอัปโหลดรูปใหม่หลังกู้คืน obs แล้ว</small></div>';
  }

  // Restore buttons
  html+='<div class="section"><h2>เลือกวิธีกู้คืน</h2>';

  html+='<button class="btn btn-green" onclick="doRestoreAll()" style="font-size:15px;padding:12px 24px">🔄 กู้คืนทั้งหมด (แนะนำ) — Log ('+_reconObs.length+') + W27 + W28 + รูปทั้งหมด</button><br><br>';

  html+='<button class="btn btn-blue" onclick="doRestoreW27W28()">✅ กู้คืน W27+W28 ('+w2728+' obs) + รูปที่เกี่ยวข้อง</button>';

  if(_reconObs.length>0){
    html+='<button class="btn btn-orange" onclick="doRestoreFromLog()">📋 กู้คืนจาก Log เท่านั้น ('+_reconObs.length+' obs)</button>';
  }

  html+='<br><br><small style="color:#64748B">⚠ ทุก restore จะ merge กับข้อมูลที่มีอยู่ (ไม่มี duplicate). Supabase ตอนนี้มี '+_currentCloud.length+' obs</small></div>';

  // Log-based obs table
  if(_reconObs.length>0){
    html+='<div class="section"><strong>Observations จาก Activity Log ('+_reconObs.length+'):</strong>';
    html+='<table><thead><tr><th>OBS ID</th><th>สร้างโดย</th><th>วันที่</th><th>Status</th><th>มีรูป</th><th>Log</th></tr></thead><tbody>';
    _reconObs.forEach(function(o){
      var hasPhoto=_photoMap[o.id]&&(_photoMap[o.id].pb.length+_photoMap[o.id].pa.length)>0;
      var photoCount=hasPhoto?(_photoMap[o.id].pb.length+_photoMap[o.id].pa.length):0;
      html+='<tr><td><code style="font-size:10px">'+o.id+'</code></td>';
      html+='<td>'+(o.createdBy||'—')+'</td>';
      html+='<td style="font-size:11px">'+(o.ts?new Date(o.ts).toLocaleDateString('th-TH'):'—')+'</td>';
      html+='<td><span class="badge '+(o.status==='CLOSED'?'badge-green':'badge-blue')+'">'+o.status+'</span></td>';
      html+='<td>'+(hasPhoto?'<span class="badge badge-green">📸 '+photoCount+'</span>':'<span style="color:#94A3B8">—</span>')+'</td>';
      html+='<td style="color:#64748B">'+o._logCount+'</td></tr>';
    });
    html+='</tbody></table></div>';
  }

  document.getElementById("resultContent").innerHTML=html;
}

function attachPhotos(obsList){
  return obsList.map(function(o){
    if(!_photoMap[o.id]) return o;
    var pm=_photoMap[o.id];
    var o2=Object.assign({},o);
    if(pm.pb&&pm.pb.length) o2.pb=pm.pb;
    if(pm.pa&&pm.pa.length) o2.pa=pm.pa;
    return o2;
  });
}

async function doRestoreAll(){
  var all=_reconObs.concat(W27_OBS).concat(W28_OBS);
  var seen={},merged=[];
  all.forEach(function(o){if(!seen[o.id]){seen[o.id]=true;merged.push(o);}});
  await doRestore(merged,"ALL sources ("+merged.length+" obs) + รูปทั้งหมด");
}
async function doRestoreW27W28(){
  await doRestore(W27_OBS.concat(W28_OBS),"W27+W28 ("+(W27_OBS.length+W28_OBS.length)+" obs)");
}
async function doRestoreFromLog(){
  await doRestore(_reconObs,"Activity Log ("+_reconObs.length+" obs)");
}

async function doRestore(newObs, label){
  var totalPhotos=newObs.reduce(function(s,o){var pm=_photoMap[o.id];return s+(pm?(pm.pb.length+pm.pa.length):0);},0);
  if(!confirm("กู้คืน "+newObs.length+" observations\nรูปภาพ: "+totalPhotos+" รูป\nจาก: "+label+"\n\nMerge กับ Supabase (ตอนนี้ "+_currentCloud.length+" obs)\n\nดำเนินการ?")) return;

  document.getElementById("importCard").style.display="block";
  document.getElementById("log2").innerHTML="";
  log("กำลังกู้คืน: "+label,"info","log2");

  try {
    // Attach photos to each obs
    var withPhotos=attachPhotos(newObs);
    log("แนบรูปภาพเข้า observations...","info","log2");
    var photoCount=withPhotos.reduce(function(s,o){return s+((o.pb?o.pb.length:0)+(o.pa?o.pa.length:0));},0);
    log("   รูปที่แนบ: "+photoCount+" รูป","ok","log2");

    // Merge with existing
    var existing=_currentCloud.slice();
    var existingIds={};
    existing.forEach(function(o){existingIds[o.id]=true;});
    var added=0;
    withPhotos.forEach(function(o){
      if(!existingIds[o.id]){existing.push(o);existingIds[o.id]=true;added++;}
    });
    log("เพิ่ม: "+added+" obs | รวม: "+existing.length+" obs","info","log2");

    if(existing.length===0) throw new Error("SAFETY ABORT: merged data empty");

    log("กำลัง PATCH Supabase...","info","log2");
    var p=await fetch(CLOUD.url+"/rest/v1/"+CLOUD.table+"?id=eq."+CLOUD.row,{
      method:"PATCH",
      headers:Object.assign({"Prefer":"return=minimal"},H()),
      body:JSON.stringify({data:existing}),
      cache:"no-store"
    });
    if(!p.ok){var t=await p.text();throw new Error("PATCH HTTP "+p.status+": "+t);}

    log("","ok","log2");
    log("✅ สำเร็จ! กู้คืน "+existing.length+" observations","ok","log2");
    log("   รูปภาพที่ link แล้ว: "+photoCount+" รูป","ok","log2");
    log("","ok","log2");
    log("→ Refresh หน้าแอปหลัก แล้วเปิด observation เพื่อดูรูป","info","log2");
    log("→ ถ้ารูปไม่แสดง ให้กด 📷 Sync Photos ในแอปหลัก","info","log2");

    _currentCloud=existing;

    document.getElementById("resultContent").innerHTML='<div style="background:#DCFCE7;color:#15803D;padding:16px;border-radius:8px;font-weight:700;font-size:15px">✅ กู้คืนสำเร็จ! '+existing.length+' observations + '+photoCount+' รูปภาพ<br><br><span style="font-weight:400;font-size:13px">Refresh หน้าแอปหลักเพื่อดูข้อมูล</span></div>';

  } catch(e){
    log("ERROR: "+e.message,"err","log2");
  }
}
</script>
