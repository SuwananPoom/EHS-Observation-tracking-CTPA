  {date:"2026-03-20",zone:"Zone A",company:"DayOne",cat:"Scaffold",fc:"Customer Site Walk",desc:"Gaps between the walkway planks of the access tower scaffolding were observed, creating a falling object hazard.",rect:"Immediately cover or close all gaps between the walkway planks. Ensure all planks are properly installed, aligned, and fully secured. Install additional boards or toe boards where necessary.",risk:"MAJOR",status:"CLOSED",by:"MS (Rep)",due:"2026-03-20",closed:"2026-03-20",closedBy:"DayOne",week:"W23",obsType:"UNSAFE_CON",pb:[],pa:[]},
  {date:"2026-03-20",zone:"Zone A",company:"DayOne",cat:"Equipment Safety",fc:"Customer Site Walk",desc:"Exposed rebar ends at floor level were found without rebar caps, posing a risk of body contact, cuts, or impalement injuries.",rect:"Immediately install rebar caps on all exposed rebar ends. Ensure all exposed rebar ends are fitted with approved protective caps at all times.",risk:"MAJOR",status:"CLOSED",by:"MS (Rep)",due:"2026-03-20",closed:"2026-03-20",closedBy:"DayOne",week:"W23",obsType:"UNSAFE_CON",pb:[],pa:[]},
  {date:"2026-03-20",zone:"Zone A",company:"DayOne",cat:"Working from Heights (HRA)",fc:"Customer Site Walk",desc:"Sling lifeline systems were found without an inspection checklist and without clear labeling of the Safe Working Load (SWL) per span of the lifeline.",rect:"Prepare and implement an inspection checklist for the sling lifeline system. Install clear tags/labels indicating the SWL per lifeline span. Ensure the lifeline is inspected and approved by a competent person before use.",risk:"MAJOR",status:"CLOSED",by:"MS (Rep)",due:"2026-03-20",closed:"2026-03-20",closedBy:"DayOne",week:"W23",obsType:"UNSAFE_ACT",pb:[],pa:[]},

function padId(n){return "OBS-"+String(n).padStart(3,"0");}
function log(m,c){var e=document.getElementById("log");var s=document.createElement("span");if(c)s.className=c;s.textContent=m+"\n";e.appendChild(s);e.scrollTop=e.scrollHeight;}

(function(){
  var tb=document.getElementById("preview");
  W23_DATA.forEach(function(o,i){
    var tr=document.createElement("tr");
    var rB="<span class='badge "+o.risk+"'>"+o.risk+"</span>";
    var tB="<span class='badge "+(o.obsType==="UNSAFE_ACT"?"ACT":"CON")+"'>"+(o.obsType==="UNSAFE_ACT"?"Unsafe Act":"Unsafe Con")+"</span>";
    var sB="<span class='badge "+o.status+"'>"+o.status+"</span>";
    tr.innerHTML="<td>"+(i+1)+"</td><td>"+o.cat+"</td><td style='max-width:300px;font-size:10px'>"+o.desc+"</td><td>"+rB+"</td><td>"+tB+"</td><td>"+sB+"</td><td style='white-space:nowrap'>"+o.due+"</td>";

})();

async function runImport(){
  document.getElementById("btnImport").disabled=true;
  document.getElementById("log").innerHTML="";
  log("=== W23 Import Tool ===","info");
  log("Connecting to Supabase...","info");
  try{
    var base=CLOUD.url+"/rest/v1";
    var r=await fetch(base+"/"+CLOUD.table+"?id=eq."+CLOUD.row+"&select=data",{headers:H(),cache:"no-store"});
    if(!r.ok) throw new Error("HTTP "+r.status);
    var rows=await r.json();
    if(!rows||!rows[0]) throw new Error("Row bkk22 not found");
    var existing=Array.isArray(rows[0].data)?rows[0].data:[];
    log("Observations in cloud: "+existing.length,"ok");

    var hasW23=existing.filter(function(o){return o.week==="W23";});
    if(hasW23.length>0){
      log("WARNING: "+hasW23.length+" W23 records already exist — aborting to prevent duplicates.","err");
      log("IDs: "+hasW23.map(function(o){return o.id;}).join(", "),"warn");
      document.getElementById("btnImport").disabled=false;
      return;
    }

    var nextId=existing.length+1;
    log("Assigning IDs from "+padId(nextId),"info");

    var newObs=W23_DATA.map(function(o,i){
      return Object.assign({},o,{id:padId(nextId+i)});
    });

    log("Preparing "+newObs.length+" observations:","info");
    newObs.forEach(function(o){
      log("  "+o.id+" ["+o.risk+"] ["+o.obsType+"] "+o.desc.slice(0,65)+"...");
    });

    var merged=existing.concat(newObs);
    log("\nPatching Supabase — total "+merged.length+" observations...","info");

    var p=await fetch(base+"/"+CLOUD.table+"?id=eq."+CLOUD.row,{method:"PATCH",headers:H(),body:JSON.stringify({data:merged})});
    if(!p.ok){var t=await p.text();throw new Error("PATCH HTTP "+p.status+": "+t);}

    log("\n=== SUCCESS ===","ok");
    log("Imported "+newObs.length+" W23 observations.","ok");
    log("IDs: "+newObs[0].id+" -> "+newObs[newObs.length-1].id,"ok");
    log("Total observations now: "+merged.length,"ok");
    log("\nRefresh the main app to confirm.","info");
  }catch(e){
    log("ERROR: "+e.message,"err");
    document.getElementById("btnImport").disabled=false;
  }
}
