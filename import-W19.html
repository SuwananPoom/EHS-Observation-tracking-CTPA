  {date:"2026-02-20",zone:"Welfare Area",company:"DayOne",cat:"Emergency Preparedness",fc:"Customer Site Walk",desc:"Emergency stretcher was not properly stored and was not maintained in ready-to-use condition.",rect:"Emergency stretcher relocated and stored properly for immediate use.",risk:"MAJOR",status:"CLOSED",by:"MS (Rep)",due:"2026-02-21",closed:"2026-02-21",closedBy:"DayOne",week:"W19",obsType:"UNSAFE_ACT",pb:[],pa:[]},

function cloudHeaders() {
  return {
    "apikey": CLOUD.key,
    "Authorization": "Bearer " + CLOUD.key,
    "Content-Type": "application/json",
    "Prefer": "return=representation"
  };
}

function log(msg, cls) {
  var el = document.getElementById("log");
  var line = document.createElement("span");
  if (cls) line.className = cls;
  line.textContent = msg + "\n";
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

function padId(n) { return "OBS-" + String(n).padStart(3, "0"); }

function buildPreview() {
  var tbody = document.getElementById("preview");
  W19_DATA.forEach(function(o, i) {
    var startId = 137; // will be updated dynamically
    var tr = document.createElement("tr");
    var riskCls = o.risk;
    var typeCls = o.obsType === "UNSAFE_ACT" ? "ACT" : "CON";
    var typeLabel = o.obsType === "UNSAFE_ACT" ? "Unsafe Act" : "Unsafe Con";
    tr.innerHTML = "<td>"+(i+1)+"</td><td>OBS-"+(136+i+1<1000?"0":"")+(136+i+1<100?"0":"")+(136+i+1)+"*</td><td>"+o.cat+"</td><td style='max-width:280px'>"+o.desc+"</td><td><span class='badge "+riskCls+"'>"+o.risk+"</span></td><td><span class='badge "+typeCls+"'>"+typeLabel+"</span></td><td>"+o.status+"</td>";
    tbody.appendChild(tr);
  });
}

buildPreview();

async function runImport() {
  document.getElementById("btnImport").disabled = true;
  document.getElementById("log").innerHTML = "";
  log("=== W19 Import Tool ===", "info");
  log("Connecting to Supabase...", "info");

  try {
    var base = CLOUD.url + "/rest/v1";
    var r = await fetch(base + "/" + CLOUD.table + "?id=eq." + CLOUD.row + "&select=data", {
      headers: cloudHeaders(), cache: "no-store"
    });
    if (!r.ok) throw new Error("HTTP " + r.status);
    var rows = await r.json();
    if (!rows || !rows[0]) throw new Error("Row bkk22 not found");
    var existing = Array.isArray(rows[0].data) ? rows[0].data : [];
    log("Current observations in cloud: " + existing.length, "ok");

    // Duplicate guard: check if any W19 already present
    var hasW19 = existing.filter(function(o){ return o.week === "W19"; });
    if (hasW19.length > 0) {
      log("WARNING: " + hasW19.length + " W19 records already exist in cloud.", "warn");
      log("IDs: " + hasW19.map(function(o){ return o.id; }).join(", "), "warn");
      log("Aborting to prevent duplicates. Remove existing W19 records first.", "err");
      document.getElementById("btnImport").disabled = false;
      return;
    }

    // Assign next IDs
    var nextId = existing.length + 1;
    log("Assigning IDs starting at OBS-" + String(nextId).padStart(3,"0"), "info");

    var newObs = W19_DATA.map(function(o, i) {
      var rec = JSON.parse(JSON.stringify(o));
      rec.id = padId(nextId + i);
      return rec;
    });

    log("Preparing " + newObs.length + " observations:", "info");
    newObs.forEach(function(o) {
      log("  " + o.id + " [" + o.risk + "] [" + o.obsType + "] " + o.desc.slice(0, 60) + "...");
    });

    var merged = existing.concat(newObs);
    log("\nPatching Supabase with " + merged.length + " total observations...", "info");

    var patch = await fetch(base + "/" + CLOUD.table + "?id=eq." + CLOUD.row, {
      method: "PATCH",
      headers: cloudHeaders(),
      body: JSON.stringify({ data: merged })
    });
    if (!patch.ok) {
      var txt = await patch.text();
      throw new Error("PATCH failed HTTP " + patch.status + ": " + txt);
    }

    log("\n=== SUCCESS ===", "ok");
    log("Imported " + newObs.length + " W19 observations.", "ok");
    log("IDs: " + newObs[0].id + " → " + newObs[newObs.length-1].id, "ok");
    log("Total observations now: " + merged.length, "ok");
    log("\nRefresh the main app to confirm.", "info");

  } catch(e) {
    log("ERROR: " + e.message, "err");
    document.getElementById("btnImport").disabled = false;
  }
}
</script>
