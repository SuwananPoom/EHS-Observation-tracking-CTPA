  {date:"2026-04-03",zone:"Zone A",company:"DayOne",cat:"Scaffold",fc:"Customer Site Walk",desc:"Protruding scaffolding pipes were obstructing the walkway, creating a collision and trip hazard.",rect:"Install high-visibility warning markings on all scaffolding support pipes. Provide proper barricading around the area to prevent accidental contact.",risk:"MAJOR",status:"CLOSED",by:"MS (Rep)",due:"2026-04-02",closed:"2026-04-02",closedBy:"DayOne",week:"W25",obsType:"UNSAFE_CON",pb:[],pa:[]},
  {date:"2026-04-03",zone:"Zone A",company:"DayOne",cat:"Scaffold",fc:"Customer Site Walk",desc:"Slip, trip, fall and hitting hazards were found at the scaffolding staircases and support structures.",rect:"Immediately adjust the protruding scaffolding tubes to be level with or below the platform. Ensure all hazards at access/egress points are eliminated.",risk:"MAJOR",status:"CLOSED",by:"MS (Rep)",due:"2026-04-02",closed:"2026-04-02",closedBy:"DayOne",week:"W25",obsType:"UNSAFE_CON",pb:[],pa:[]},
  {date:"2026-04-03",zone:"Zone A",company:"DayOne",cat:"Scaffold",fc:"Customer Site Walk",desc:"Scaffolding erection work activity was carried out but only one side was barricaded; the remaining three sides had not been barricaded and no signage was displayed.",rect:"Stop the scaffolding activity immediately. Install proper barricading to establish a controlled exclusion zone. Re-brief all workers on correct fall protection practices.",risk:"SERIOUS",status:"CLOSED",by:"MS (Rep)",due:"2026-04-02",closed:"2026-04-02",closedBy:"DayOne",week:"W25",obsType:"UNSAFE_ACT",pb:[],pa:[]},
  {date:"2026-04-03",zone:"Zone A",company:"DayOne",cat:"Material Storage",fc:"Customer Site Walk",desc:"Materials were not kept inside the barricading zone, creating a hazard and obstructing walkways.",rect:"Immediately reposition all materials back within the designated barricaded area. Remove any materials obstructing walkways.",risk:"MAJOR",status:"CLOSED",by:"MS (Rep)",due:"2026-04-02",closed:"2026-04-02",closedBy:"DayOne",week:"W25",obsType:"UNSAFE_ACT",pb:[],pa:[]},
  {date:"2026-04-03",zone:"Zone A",company:"DayOne",cat:"Signage & Barricade",fc:"Customer Site Walk",desc:"Slip, trip and fall hazards were observed at the formwork which was not closed.",rect:"Immediately install a secure cover or barricade over the opening. Place warning signage to alert workers of the hazard.",risk:"MAJOR",status:"CLOSED",by:"MS (Rep)",due:"2026-04-02",closed:"2026-04-02",closedBy:"DayOne",week:"W25",obsType:"UNSAFE_ACT",pb:[],pa:[]},
  {date:"2026-04-03",zone:"Zone A",company:"DayOne",cat:"Material Storage",fc:"Customer Site Walk",desc:"End caps had not been provided for protruding rebars.",rect:"Immediately install rebar caps on all exposed rebar ends. Restrict access to the area until protection is in place. Clearly mark the hazard area to alert workers.",risk:"MAJOR",status:"CLOSED",by:"MS (Rep)",due:"2026-04-02",closed:"2026-04-02",closedBy:"DayOne",week:"W25",obsType:"UNSAFE_ACT",pb:[],pa:[]},
  {date:"2026-04-03",zone:"Zone A",company:"DayOne",cat:"Lifting Operations (HRA)",fc:"Customer Site Walk",desc:"Tower crane lifting was carried out without a Lifting PTW. Driver had not attended SIC course. No rigger or signalman was present. Load was observed crossing over management team during site walk.",rect:"Stop the lifting activity immediately. Conduct a stand-down meeting with all concerned personnel. Issue a formal warning notice to the responsible person for working without a permit.",risk:"SERIOUS",status:"CLOSED",by:"MS (Rep)",due:"2026-04-03",closed:"2026-04-03",closedBy:"DayOne",week:"W25",obsType:"UNSAFE_ACT",pb:[],pa:[]},
  {date:"2026-04-03",zone:"Zone A",company:"DayOne",cat:"Lifting Operations (HRA)",fc:"Customer Site Walk",desc:"Lifting zone had not been barricaded and signage had not been provided. No rigger or signalman was assigned.",rect:"Stop the lifting activity immediately. Install proper barricading and provide visible warning signage. Assign competent rigger and signalman before resuming. Conduct stand-down meeting with all concerned personnel.",risk:"SERIOUS",status:"CLOSED",by:"MS (Rep)",due:"2026-04-03",closed:"2026-04-03",closedBy:"DayOne",week:"W25",obsType:"UNSAFE_ACT",pb:[],pa:[]},
  {date:"2026-04-03",zone:"Zone A",company:"DayOne",cat:"Scaffold",fc:"Customer Site Walk",desc:"Improper communication between lifting team and supervisor regarding load capacity (SWL) on scaffolding platforms.",rect:"Stop placing additional materials on the scaffolding until load limits are verified. Remove excess materials. Display clear SWL signage on the scaffolding. Verify load capacity with the Scaffolding Supervisor/Engineer before use.",risk:"SERIOUS",status:"CLOSED",by:"MS (Rep)",due:"2026-04-03",closed:"2026-04-03",closedBy:"DayOne",week:"W25",obsType:"UNSAFE_ACT",pb:[],pa:[]},
  {date:"2026-04-03",zone:"Zone A",company:"DayOne",cat:"Scaffold",fc:"Customer Site Walk",desc:"Scaffolding work activity area was not barricaded. Workers were observed using snap hooks connected to D-rings as anchor points (repeated case).",rect:"Stop the scaffolding activity immediately. Install proper barricading. Instruct workers to correctly use full body harness and lanyards with proper connection points. Re-brief all workers on correct fall protection practices.",risk:"SERIOUS",status:"CLOSED",by:"MS (Rep)",due:"2026-04-03",closed:"2026-04-03",closedBy:"DayOne",week:"W25",obsType:"UNSAFE_ACT",pb:[],pa:[]},
  {date:"2026-04-03",zone:"Zone A",company:"DayOne",cat:"Material Handling (HRA)",fc:"Customer Site Walk",desc:"Workers were observed using manual handling to lift heavy beams. Mechanical lifting aids were not utilized.",rect:"Stop manual lifting of heavy beams immediately. Provide appropriate mechanical lifting equipment such as hoist or crane. Brief workers on safe lifting techniques and hazards.",risk:"MAJOR",status:"CLOSED",by:"MS (Rep)",due:"2026-04-03",closed:"2026-04-03",closedBy:"DayOne",week:"W25",obsType:"UNSAFE_ACT",pb:[],pa:[]},
  {date:"2026-04-03",zone:"Zone A",company:"DayOne",cat:"Health & Hygiene",fc:"Customer Site Walk",desc:"Heat stress information board indicated heat index and consequences but was missing control measures. Information was provided in Thai language only.",rect:"Update heat stress information boards to include clear control measures such as hydration, rest breaks, shaded areas, and PPE. Provide multilingual communication to ensure all workers understand.",risk:"MINOR",status:"CLOSED",by:"MS (Rep)",due:"2026-04-03",closed:"2026-04-03",closedBy:"DayOne",week:"W25",obsType:"UNSAFE_CON",pb:[],pa:[]},

];

function padId(n){return "OBS-"+String(n).padStart(3,"0");}
function log(m,c){var e=document.getElementById("log");var s=document.createElement("span");if(c)s.className=c;s.textContent=m+"\n";e.appendChild(s);e.scrollTop=e.scrollHeight;}

(function(){
  var tb=document.getElementById("preview");
  W25_DATA.forEach(function(o,i){
    var tr=document.createElement("tr");
    var rB="<span class='badge "+o.risk+"'>"+o.risk+"</span>";
    var tB="<span class='badge "+(o.obsType==="UNSAFE_ACT"?"ACT":"CON")+"'>"+(o.obsType==="UNSAFE_ACT"?"Unsafe Act":"Unsafe Con")+"</span>";
    var sB="<span class='badge "+o.status+"'>"+o.status+"</span>";
    tr.innerHTML="<td>"+(i+1)+"</td><td>"+o.cat+"</td><td style='max-width:300px;font-size:10px'>"+o.desc+"</td><td>"+rB+"</td><td>"+tB+"</td><td>"+sB+"</td><td style='white-space:nowrap'>"+o.due+"</td>";
    tb.appendChild(tr);
  });
})();

async function runImport(){
  document.getElementById("btnImport").disabled=true;
  document.getElementById("log").innerHTML="";
  log("=== W25 Import Tool ===","info");
  log("Connecting to Supabase...","info");
  try{
    var base=CLOUD.url+"/rest/v1";
    var r=await fetch(base+"/"+CLOUD.table+"?id=eq."+CLOUD.row+"&select=data",{headers:H(),cache:"no-store"});
    if(!r.ok) throw new Error("HTTP "+r.status);
    var rows=await r.json();
    if(!rows||!rows[0]) throw new Error("Row bkk22 not found");
    var existing=Array.isArray(rows[0].data)?rows[0].data:[];
    log("Observations in cloud: "+existing.length,"ok");

    var hasW25=existing.filter(function(o){return o.week==="W25";});
    if(hasW25.length>0){
      log("WARNING: "+hasW25.length+" W25 records already exist — aborting to prevent duplicates.","err");
      log("IDs: "+hasW25.map(function(o){return o.id;}).join(", "),"warn");
      document.getElementById("btnImport").disabled=false;
      return;
    }

    var nextId=existing.length+1;
    log("Assigning IDs from "+padId(nextId),"info");

    var newObs=W25_DATA.map(function(o,i){
      return Object.assign({},o,{id:padId(nextId+i)});
    });

    log("Preparing "+newObs.length+" observations:","info");
    newObs.forEach(function(o){
      log("  "+o.id+" ["+o.risk+"] ["+o.obsType+"] "+o.desc.slice(0,65)+"...");
    });

    var merged=existing.concat(newObs);
    log("\nPatching Supabase — total "+merged.length+" observations...","info");

    var p=await fetch(base+"/"+CLOUD.table+"?id=eq."+CLOUD.row,{method:"PATCH",headers:H(),body:JSON.stringify({data:merged})});
    if(!p.ok){var t=await p.text();throw new Error("PATCH HTTP "+p.status+": "+t);}

    log("\n=== SUCCESS ===","ok");
    log("Imported "+newObs.length+" W25 observations.","ok");
    log("IDs: "+newObs[0].id+" -> "+newObs[newObs.length-1].id,"ok");
    log("Total observations now: "+merged.length,"ok");
    log("\nRefresh the main app to confirm.","info");
  }catch(e){
    log("ERROR: "+e.message,"err");
    document.getElementById("btnImport").disabled=false;
  }
}
</script>
